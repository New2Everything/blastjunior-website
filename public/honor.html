<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>荣誉墙 - 兰星少年 HADO 俱乐部</title>
  <meta name="description" content="兰星少年 HADO 俱乐部荣誉成就">
  <meta name="theme-color" content="#FF6B35">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/components/nav-loader.js"></script>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1 class="page-title">🏆 荣誉墙</h1>
      <p class="page-subtitle">汗水与荣耀，见证成长</p>
    </div>

    <div class="section">
      <div class="cards-grid" id="honorsGrid">
        <div class="card" style="text-align:center;color:var(--text-gray);"><span class="spinner"></span>加载中</div>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://blast-homepage-api.kanjiaming2022.workers.dev';

    async function loadHonors() {
      try {
        const res = await fetch(API + '/honors');
        const result = await res.json();
        renderHonors(result.data || []);
      } catch (e) {
        document.getElementById('honorsGrid').innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">🏆</div><div>暂无荣誉记录</div></div>';
      }
    }

    function renderHonors(honors) {
      const grid = document.getElementById('honorsGrid');
      if (!honors.length) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">🏆</div><div>暂无荣誉记录</div></div>';
        return;
      }
      grid.innerHTML = honors.map(h => `
        <div class="card" style="text-align:center;padding:2rem;">
          <div style="font-size:3rem;margin-bottom:1rem;">🏆</div>
          <h3 style="font-weight:700;font-size:1.1rem;margin-bottom:0.5rem;">${h.name || h.title || ''}</h3>
          ${h.season ? `<div style="font-size:0.85rem;color:var(--text-gray);">${h.season}</div>` : ''}
          ${h.description ? `<p style="font-size:0.85rem;color:var(--text-gray);margin-top:0.5rem;">${h.description}</p>` : ''}
        </div>
      `).join('');
    }

    loadHonors();
  </script>
</body>
</html>
