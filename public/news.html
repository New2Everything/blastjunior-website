<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新闻 - 兰星少年 HADO 俱乐部</title>
  <link rel="icon" href="/logo.jpg" type="image/jpeg">
  <meta name="theme-color" content="#0055D4">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/components/nav-loader.js"></script>
  <style>
    .news-list { display: flex; flex-direction: column; gap: 1rem; }
    .news-item { display: flex; gap: 1rem; padding: 1.5rem; transition: transform 0.2s; cursor: pointer; }
    .news-item:hover { transform: translateX(4px); }
    .news-date { font-size: 0.8rem; color: var(--text-gray); margin-bottom: 0.25rem; }
    .news-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 0.5rem; }
    .news-excerpt { font-size: 0.9rem; color: var(--text-gray); line-height: 1.5; }
    .news-tag { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; margin-right: 0.5rem; }
    .news-tag.ai { background: rgba(255,107,53,0.1); color: var(--primary); }
    .news-tag.member { background: rgba(59,130,246,0.1); color: #3b82f6; }
  </style>
</head>
<body>
  <div class="container" style="max-width:800px;">
    <div class="page-header">
      <h1 class="page-title">📰 新闻</h1>
      <p class="page-subtitle">兰星少年 HADO 俱乐部动态</p>
    </div>

    <div id="publishSection" style="display:none;margin-bottom:2rem;">
      <button onclick="showPublishModal()" class="btn btn-primary">📝 发布新闻</button>
    </div>

    <div id="newsList" class="news-list">
      <div class="card" style="text-align:center;color:var(--text-gray);"><span class="spinner"></span>加载中...</div>
    </div>
  </div>

  <div id="publishModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;padding:1rem;">
    <div class="card" style="max-width:600px;width:100%;">
      <h2 style="font-family:var(--font-display);font-size:1.3rem;font-weight:700;margin-bottom:1rem;">📝 发布新闻</h2>
      <form onsubmit="handlePublish(event)">
        <div style="margin-bottom:1rem;">
          <label style="display:block;font-weight:500;margin-bottom:0.5rem;">标题</label>
          <input type="text" name="title" required style="width:100%;padding:0.75rem;border:1px solid var(--border);border-radius:8px;font-size:1rem;">
        </div>
        <div style="margin-bottom:1rem;">
          <label style="display:block;font-weight:500;margin-bottom:0.5rem;">内容</label>
          <textarea name="content" rows="6" required style="width:100%;padding:0.75rem;border:1px solid var(--border);border-radius:8px;font-size:1rem;resize:vertical;"></textarea>
        </div>
        <div style="margin-bottom:1rem;">
          <label style="display:block;font-weight:500;margin-bottom:0.5rem;">配图URL（可选）</label>
          <input type="url" name="image_url" placeholder="https://..." style="width:100%;padding:0.75rem;border:1px solid var(--border);border-radius:8px;font-size:1rem;">
        </div>
        <div style="display:flex;gap:0.75rem;justify-content:flex-end;">
          <button type="button" onclick="document.getElementById('publishModal').style.display='none'" class="btn btn-outline">取消</button>
          <button type="submit" class="btn btn-primary">发布</button>
        </div>
      </form>
    </div>
  </div>

  <div id="newsDetail" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:1000;overflow-y:auto;padding:2rem 1rem;">
    <div style="max-width:700px;margin:0 auto;">
      <button onclick="document.getElementById('newsDetail').style.display='none'" class="btn btn-outline" style="margin-bottom:1rem;">← 返回</button>
      <div id="detailContent"></div>
    </div>
  </div>

  <script>
    const API = 'https://blast-api.kanjiaming2022.workers.dev';

    async function init() {
      const token = localStorage.getItem('blxst_token');
      if (token) {
        try {
          const res = await fetch(API + '/auth/me', { headers: { 'Authorization': 'Bearer ' + token, 'Origin': 'https://blastjunior.com' } });
          const result = await res.json();
          if (result.ok && result.user.status === 'approved') {
            document.getElementById('publishSection').style.display = 'block';
          }
        } catch (e) {}
      }
      loadNews();
    }

    async function loadNews() {
      try {
        const res = await fetch(API + '/news', { headers: { 'Origin': 'https://blastjunior.com' } });
        const data = await res.json();
        // 兼容两种格式：{ok:true, data:[...]} 或 {success:true, data:{data:[...]}}
        const items = data.data?.data || data.data || [];
        renderNews(items);
      } catch (e) {
        document.getElementById('newsList').innerHTML = '<div class="card" style="text-align:center;color:var(--text-gray);">加载失败</div>';
      }
    }

    function renderNews(items) {
      const list = document.getElementById('newsList');
      if (!items.length) {
        list.innerHTML = '<div class="card empty-state"><div class="empty-state-icon">📰</div><div>暂无新闻</div></div>';
        return;
      }
      list.innerHTML = items.map(item => `
        <div class="card news-item" onclick="showDetail(${JSON.stringify(item).replace(/"/g, '&quot;')})">
          ${item.image_url ? `<img src="${item.image_url}" style="width:120px;height:80px;object-fit:cover;border-radius:8px;flex-shrink:0;" onerror="this.style.display='none'">` : ''}
          <div style="flex:1;">
            <div class="news-date">${formatDate(item.published_at || item.created_at)}</div>
            <div class="news-title">${item.is_ai_generated ? '<span class="news-tag ai">AI</span>' : '<span class="news-tag member">成员</span>'}${item.title}</div>
            <div class="news-excerpt">${item.content.substring(0, 80)}...</div>
          </div>
        </div>
      `).join('');
    }

    function showDetail(item) {
      const imgHtml = item.image_url ? `<img src="${item.image_url}" style="width:100%;max-height:400px;object-fit:cover;border-radius:12px;margin-bottom:1.5rem;" onerror="this.style.display='none'">` : '';
      document.getElementById('detailContent').innerHTML = `
        ${imgHtml}
        <div style="font-size:0.85rem;color:var(--text-gray);margin-bottom:0.5rem;">${formatDate(item.published_at || item.created_at)} · ${item.author_name || '未知'}</div>
        <h1 style="font-family:var(--font-display);font-size:2rem;font-weight:900;margin-bottom:1.5rem;">${item.title}</h1>
        <div style="line-height:1.8;font-size:1.05rem;white-space:pre-wrap;">${item.content}</div>
      `;
      document.getElementById('newsDetail').style.display = 'block';
    }

    function formatDate(str) {
      if (!str) return '';
      return new Date(str).toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function showPublishModal() {
      document.getElementById('publishModal').style.display = 'flex';
    }

    async function handlePublish(e) {
      e.preventDefault();
      const form = e.target;
      
      try {
        const res = await fetch(API + '/news', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + localStorage.getItem('blxst_token'), 'Content-Type': 'application/json', 'Origin': 'https://blastjunior.com' },
          body: JSON.stringify({ 
            title: form.title.value, 
            content: form.content.value,
            image_url: form.image_url.value || null
          })
        });
        const result = await res.json();
        
        if (result.pending) {
          alert('新闻已提交，请等待管理员审核');
        } else if (result.ok) {
          alert('新闻发布成功！');
          document.getElementById('publishModal').style.display = 'none';
          form.reset();
          loadNews();
        } else {
          alert(result.error || '发布失败');
        }
      } catch (err) {
        alert('发布失败');
      }
    }

    init();
  </script>
</body>
</html>
