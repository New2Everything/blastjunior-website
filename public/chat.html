<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天室 - 兰星少年 HADO 俱乐部</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B35; --secondary: #00B4D8; --bg-light: #F8FAFC; --bg-white: #FFFFFF; --text-dark: #1E293B; --text-gray: #64748B; --border: #E2E8F0; --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-light); color: var(--text-dark); min-height: 100vh; }
        
        /* 导航 */
        nav { background: var(--bg-white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 64px; }
        .logo { display: flex; align-items: center; gap: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.25rem; text-decoration: none; color: var(--text-dark); }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), #FF8A5C); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; }
        .nav-links { display: flex; gap: 0.5rem; }
        .nav-link { padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; color: var(--text-gray); font-weight: 500; transition: all 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }
        
        /* 主内容 */
        .container { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; }
        
        /* 页面标题 */
        .page-header { text-align: center; margin-bottom: 2rem; }
        .page-title { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 900; margin-bottom: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 0.75rem; }
        .page-subtitle { color: var(--text-gray); font-size: 0.95rem; }
        
        /* 公告提示 */
        .notice { background: linear-gradient(135deg, #FEF3C7, #FDE68A); border: 1px solid #F59E0B; border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1.5rem; display: flex; align-items: flex-start; gap: 0.75rem; }
        .notice-icon { font-size: 1.25rem; }
        .notice-text { font-size: 0.9rem; color: #92400E; line-height: 1.5; }
        
        /* 帖子卡片 */
        .post-card { background: var(--bg-white); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; box-shadow: var(--shadow); transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; text-decoration: none; color: inherit; display: block; }
        .post-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
        
        /* 置顶帖子 */
        .post-card.pinned { border-left: 4px solid var(--primary); background: linear-gradient(135deg, #FFF7ED, #FFEDD5); }
        .post-card.pinned::before { content: '📌 置顶'; display: inline-block; background: var(--primary); color: white; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; margin-bottom: 0.5rem; }
        
        /* 帖子类型标签 */
        .post-type { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; margin-bottom: 0.5rem; text-transform: uppercase; }
        .post-type.ai_news { background: #DBEAFE; color: #1D4ED8; }
        .post-type.manual { background: #D1FAE5; color: #059669; }
        .post-type.system { background: #F3E8FF; color: #7C3AED; }
        
        /* 帖子标题 */
        .post-title { font-family: 'Outfit', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; line-height: 1.4; }
        
        /* 帖子摘要 */
        .post-summary { color: var(--text-gray); font-size: 0.9rem; line-height: 1.5; margin-bottom: 0.75rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* 帖子底部 */
        .post-footer { display: flex; align-items: center; justify-content: space-between; font-size: 0.8rem; color: var(--text-gray); }
        .post-time { display: flex; align-items: center; gap: 0.25rem; }
        .post-link { color: var(--secondary); font-weight: 500; }
        
        /* 加载状态 */
        .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem; color: var(--text-gray); }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 空状态 */
        .empty { text-align: center; padding: 4rem 2rem; color: var(--text-gray); }
        .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
        
        /* 分页 */
        .pagination { display: flex; justify-content: center; gap: 0.5rem; margin-top: 2rem; }
        .page-btn { padding: 0.5rem 1rem; border: 1px solid var(--border); background: var(--bg-white); border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .page-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
        .page-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* 错误状态 */
        .error { text-align: center; padding: 4rem; color: #dc2626; }
        
        /* 帖子详情 */
        .post-detail { background: var(--bg-white); border-radius: var(--radius); padding: 2rem; box-shadow: var(--shadow); }
        .post-detail .back-link { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-gray); text-decoration: none; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .post-detail .back-link:hover { color: var(--primary); }
        .post-detail .post-title { font-size: 1.5rem; }
        .post-detail .post-content { line-height: 1.8; color: #334155; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
        .post-detail .post-content p { margin-bottom: 1rem; }
    </style>
</head>
<body>
    <nav></nav>

    <!-- 赞助商横条 -->
    <style>
    .sponsor-bar { background: linear-gradient(135deg, #1E293B 0%, #334155 100%); padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: center; gap: 1rem; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sponsor-label { font-size: 0.75rem; font-weight: 600; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 0.25rem; }
    .sponsor-label::before { content: "🤝"; }
    .sponsor-list { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .sponsor-item { display: flex; align-items: center; gap: 0.5rem; color: white; text-decoration: none; font-size: 0.9rem; font-weight: 500; padding: 0.4rem 0.75rem; border-radius: 6px; transition: all 0.2s; background: rgba(255,255,255,0.05); }
    .sponsor-item:hover { background: rgba(255,255,255,0.15); transform: translateY(-1px); }
    .sponsor-item.platinum { border-left: 3px solid #E5E4E2; }
    .sponsor-item.platinum .sponsor-tier { color: #E5E4E2; }
    .sponsor-item.gold { border-left: 3px solid #FFD700; }
    .sponsor-item.gold .sponsor-tier { color: #FFD700; }
    .sponsor-item.silver { border-left: 3px solid #C0C0C0; }
    .sponsor-item.silver .sponsor-tier { color: #C0C0C0; }
    .sponsor-logo { width: 24px; height: 24px; border-radius: 4px; object-fit: cover; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; }
    .sponsor-tier { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; opacity: 0.8; }
    .sponsor-empty { color: rgba(255,255,255,0.4); font-size: 0.85rem; }
    @media (max-width: 768px) { .sponsor-bar { padding: 0.6rem 1rem; } .sponsor-label { width: 100%; justify-content: center; margin-bottom: 0.5rem; } .sponsor-list { gap: 0.75rem; } .sponsor-item { font-size: 0.8rem; padding: 0.3rem 0.6rem; } }
    </style>
    <div class="sponsor-bar" id="sponsorBar">
        <div class="sponsor-label">赞助商</div>
        <div class="sponsor-list" id="sponsorList"><span class="sponsor-empty">加载中...</span></div>
    </div>
    <script>
    (function() {
        const API_BASE = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
        const TIER_ORDER = { 'platinum': 1, 'gold': 2, 'silver': 3 };
        async function loadSponsors() {
            try {
                const resp = await fetch(API_BASE + '/sponsors');
                const result = await resp.json();
                if (!result.ok || !result.data || result.data.length === 0) {
                    const homeResp = await fetch(API_BASE + '/');
                    const homeResult = await homeResp.json();
                    const sponsors = homeResult.data?.sponsors || [];
                    renderSponsors(sponsors);
                    return;
                }
                renderSponsors(result.data);
            } catch (e) { console.error('加载赞助商失败:', e); document.getElementById('sponsorList').innerHTML = '<span class="sponsor-empty">暂无赞助商</span>'; }
        }
        function renderSponsors(sponsors) {
            if (!sponsors || sponsors.length === 0) { document.getElementById('sponsorList').innerHTML = '<span class="sponsor-empty">暂无赞助商</span>'; return; }
            const sorted = [...sponsors].sort((a, b) => { const tierA = TIER_ORDER[a.tier?.toLowerCase()] || 99; const tierB = TIER_ORDER[b.tier?.toLowerCase()] || 99; return tierA - tierB; });
            const html = sorted.map(s => { const tier = (s.tier || 'silver').toLowerCase(); return `<a href="${s.website || '#'}" class="sponsor-item ${tier}" ${s.website ? 'target="_blank" rel="noopener"' : ''}><img class="sponsor-logo" src="${s.logo || ''}" alt="${s.name}" onerror="this.style.display='none'"><span>${s.name}</span><span class="sponsor-tier">${tier}</span></a>`; }).join('');
            document.getElementById('sponsorList').innerHTML = html;
        }
        loadSponsors();
    })();
    </script>

    <main

    <main class="container" id="mainContainer">
        <div class="loading">
            <div class="loading-spinner"></div>
            <span>加载中...</span>
        </div>
    </main>

    <script>
        // API配置
        const CHAT_API = 'https://blast-chat-api.kanjiaming2022.workers.dev';
        
        // 当前状态
        let currentPage = 1;
        let totalPosts = 0;
        let pageSize = 20;
        
        // 解析URL判断是列表页还是详情页
        const pathMatch = window.location.pathname.match(/\/chat\/posts\/([^.]+)/);
        const postId = pathMatch ? pathMatch[1] : null;
        
        // 初始化
        if (postId) {
            loadPostDetail(postId);
        } else {
            loadPostList();
        }
        
        // 加载帖子列表
        async function loadPostList() {
            const container = document.getElementById('mainContainer');
            
            try {
                const response = await fetch(`${CHAT_API}/chat/posts?page=${currentPage}&page_size=${pageSize}`);
                const data = await response.json();
                
                if (!data.ok) {
                    throw new Error(data.error || '加载失败');
                }
                
                totalPosts = data.pagination.total;
                renderPostList(container, data.posts, data.pagination);
            } catch (e) {
                container.innerHTML = `
                    <div class="error">
                        <p>加载失败: ${e.message}</p>
                        <button class="page-btn" onclick="loadPostList()" style="margin-top: 1rem;">重试</button>
                    </div>
                `;
            }
        }
        
        // 渲染帖子列表
        function renderPostList(container, posts, pagination) {
            if (!posts || posts.length === 0) {
                container.innerHTML = `
                    <div class="page-header">
                        <h1 class="page-title">🗞️ 聊天室</h1>
                        <p class="page-subtitle">兰星少年俱乐部公告与动态</p>
                    </div>
                    <div class="notice">
                        <span class="notice-icon">ℹ️</span>
                        <span class="notice-text">目前暂无公告。AI会自动发布俱乐部动态、赛报和活动通知，敬请期待！</span>
                    </div>
                    <div class="empty">
                        <div class="empty-icon">📭</div>
                        <p>暂无帖子</p>
                    </div>
                `;
                return;
            }
            
            const postsHTML = posts.map(post => {
                const summary = post.content.length > 100 ? post.content.substring(0, 100) + '...' : post.content;
                const time = new Date(post.created_at).toLocaleString('zh-CN', { 
                    month: 'numeric', 
                    day: 'numeric', 
                    hour: '2-digit', 
                    minute: '2-digit' 
                });
                const typeLabel = {
                    'ai_news': '🤖 AI News',
                    'manual': '✍️ 手动发布',
                    'system': '📢 系统公告'
                }[post.post_type] || '📝 帖子';
                
                return `
                    <a href="/chat/posts/${post.post_id}" class="post-card ${post.is_pinned ? 'pinned' : ''}">
                        <span class="post-type ${post.post_type}">${typeLabel}</span>
                        <h3 class="post-title">${escapeHtml(post.title || '无标题')}</h3>
                        <p class="post-summary">${escapeHtml(summary)}</p>
                        <div class="post-footer">
                            <span class="post-time">🕐 ${time}</span>
                            ${post.target_url ? '<span class="post-link">查看详情 →</span>' : ''}
                        </div>
                    </a>
                `;
            }).join('');
            
            // 分页
            const totalPages = Math.ceil(pagination.total / pagination.page_size);
            let paginationHTML = '';
            if (totalPages > 1) {
                paginationHTML = '<div class="pagination">';
                paginationHTML += `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
                
                // 简单分页显示
                for (let i = 1; i <= totalPages && i <= 5; i++) {
                    paginationHTML += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                }
                
                paginationHTML += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>下一页</button>`;
                paginationHTML += '</div>';
            }
            
            container.innerHTML = `
                <div class="page-header">
                    <h1 class="page-title">🗞️ 聊天室</h1>
                    <p class="page-subtitle">兰星少年俱乐部公告与动态</p>
                </div>
                <div class="notice">
                    <span class="notice-icon">ℹ️</span>
                    <span class="notice-text">本聊天室仅供AI发布公告和动态，成员可浏览查看。如有疑问请联系教练。</span>
                </div>
                <div class="post-list">
                    ${postsHTML}
                </div>
                ${paginationHTML}
            `;
        }
        
        // 加载帖子详情
        async function loadPostDetail(postId) {
            const container = document.getElementById('mainContainer');
            
            try {
                const response = await fetch(`${CHAT_API}/chat/posts/${postId}`);
                const data = await response.json();
                
                if (!data.ok) {
                    throw new Error(data.error || '加载失败');
                }
                
                renderPostDetail(container, data.post);
            } catch (e) {
                container.innerHTML = `
                    <div class="error">
                        <p>加载失败: ${e.message}</p>
                        <a href="/chat.html" class="page-btn" style="display: inline-block; margin-top: 1rem; text-decoration: none;">返回列表</a>
                    </div>
                `;
            }
        }
        
        // 渲染帖子详情
        function renderPostDetail(container, post) {
            const time = new Date(post.created_at).toLocaleString('zh-CN', { 
                year: 'numeric',
                month: 'long', 
                day: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            const typeLabel = {
                'ai_news': '🤖 AI News',
                'manual': '✍️ 手动发布',
                'system': '📢 系统公告'
            }[post.post_type] || '📝 帖子';
            
            container.innerHTML = `
                <div class="post-detail">
                    <a href="/chat.html" class="back-link">← 返回聊天室</a>
                    ${post.is_pinned ? '<span class="post-type" style="background: var(--primary); color: white; margin-bottom: 1rem;">📌 置顶</span>' : ''}
                    <span class="post-type ${post.post_type}">${typeLabel}</span>
                    <h1 class="post-title">${escapeHtml(post.title || '无标题')}</h1>
                    <div class="post-footer" style="margin-top: 1rem;">
                        <span class="post-time">🕐 ${time}</span>
                    </div>
                    <div class="post-content">
                        ${escapeHtml(post.content).replace(/\n/g, '<br>')}
                    </div>
                    ${post.target_url ? `<div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border);">
                        <a href="${escapeHtml(post.target_url)}" style="color: var(--secondary); font-weight: 500; text-decoration: none;">→ 查看相关详情</a>
                    </div>` : ''}
                </div>
            `;
        }
        
        // 跳转到指定页
        function goToPage(page) {
            currentPage = page;
            loadPostList();
            window.scrollTo(0, 0);
        }
        
        // HTML转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
    <script src="/components/nav-loader.js"></script>
</body>
</html>
