<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>照片详情 - 兰星少年 HADO 俱乐部</title>
  <link rel="icon" href="/logo.jpg" type="image/jpeg">
  <meta name="theme-color" content="#0055D4">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/components/nav-loader.js"></script>
</head>
<body>
  <div class="container" style="max-width:900px;">
    <div id="content">
      <div class="card" style="text-align:center;color:var(--text-gray);"><span class="spinner"></span>加载中</div>
    </div>
  </div>

  <script>
    const API = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
    const params = new URLSearchParams(location.search);
    const photoId = params.get('id');

    async function loadPhoto() {
      if (!photoId) {
        document.getElementById('content').innerHTML = '<div class="error-state">缺少照片ID</div>';
        return;
      }
      // 简化版：直接从 gallery 数据中查找
      try {
        const res = await fetch(API + '/gallery');
        const result = await res.json();
        const photos = result.data || [];
        const photo = photos.find(p => p.id == photoId);
        renderPhoto(photo);
      } catch (e) {
        document.getElementById('content').innerHTML = '<div class="error-state">加载失败</div>';
      }
    }

    function renderPhoto(photo) {
      if (!photo) {
        document.getElementById('content').innerHTML = '<div class="error-state">照片不存在</div>';
        return;
      }
      document.title = (photo.title || '照片') + ' - 兰星少年';

      const html = `
        <a href="/gallery" class="btn btn-outline" style="margin-bottom:1rem;">← 返回画廊</a>
        <div class="card" style="overflow:hidden;padding:0;">
          ${photo.cover ? `<img src="${photo.cover}" alt="${photo.title || ''}" style="width:100%;max-height:600px;object-fit:contain;background:#000;">` : '<div style="aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:4rem;background:var(--bg-light);">🖼️</div>'}
          <div style="padding:1.5rem;">
            <h1 style="font-family:var(--font-display);font-size:1.5rem;font-weight:700;margin-bottom:0.5rem;">${photo.title || ''}</h1>
            ${photo.date ? `<div style="font-size:0.9rem;color:var(--text-gray);margin-bottom:1rem;">${photo.date}</div>` : ''}
            ${photo.tags && photo.tags.length ? `<div style="display:flex;gap:0.5rem;flex-wrap:wrap;">${photo.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
          </div>
        </div>
      `;

      document.getElementById('content').innerHTML = html;
    }

    loadPhoto();
  </script>
</body>
</html>
