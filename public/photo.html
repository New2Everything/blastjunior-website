<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照片详情 - 兰星少年 HADO 俱乐部</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B35; --secondary: #00B4D8; --bg-light: #F8FAFC; --bg-white: #FFFFFF; --text-dark: #1E293B; --text-gray: #64748B; --border: #E2E8F0; --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-light); color: var(--text-dark); min-height: 100vh; }
        
        /* 导航 */
        nav { background: var(--bg-white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 64px; }
        .logo { display: flex; align-items: center; gap: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.25rem; text-decoration: none; color: var(--text-dark); }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), #FF8A5C); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; }
        .nav-links { display: flex; gap: 0.5rem; }
        .nav-link { padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; color: var(--text-gray); font-weight: 500; transition: all 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }
        
        /* 主内容 */
        .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
        
        /* 返回按钮 */
        .back-link { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-gray); text-decoration: none; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .back-link:hover { color: var(--primary); }
        
        /* 照片内容 */
        .photo-detail { background: var(--bg-white); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
        .photo-image { width: 100%; max-height: 600px; object-fit: contain; background: #000; }
        .photo-info { padding: 1.5rem; }
        .photo-title { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        .photo-meta { color: var(--text-gray); font-size: 0.9rem; margin-bottom: 1rem; }
        .photo-desc { line-height: 1.6; color: #334155; }
        
        /* 加载状态 */
        .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem; color: var(--text-gray); }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 错误状态 */
        .error { text-align: center; padding: 4rem; color: #dc2626; }
    </style>
</head>
<body>
    <nav></nav>

    <!-- 赞助商横条 -->
    <style>
    .sponsor-bar { background: linear-gradient(135deg, #1E293B 0%, #334155 100%); padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: center; gap: 1rem; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sponsor-label { font-size: 0.75rem; font-weight: 600; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 0.25rem; }
    .sponsor-label::before { content: "🤝"; }
    .sponsor-list { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .sponsor-item { display: flex; align-items: center; gap: 0.5rem; color: white; text-decoration: none; font-size: 0.9rem; font-weight: 500; padding: 0.4rem 0.75rem; border-radius: 6px; transition: all 0.2s; background: rgba(255,255,255,0.05); }
    .sponsor-item:hover { background: rgba(255,255,255,0.15); transform: translateY(-1px); }
    .sponsor-item.platinum { border-left: 3px solid #E5E4E2; }
    .sponsor-item.platinum .sponsor-tier { color: #E5E4E2; }
    .sponsor-item.gold { border-left: 3px solid #FFD700; }
    .sponsor-item.gold .sponsor-tier { color: #FFD700; }
    .sponsor-item.silver { border-left: 3px solid #C0C0C0; }
    .sponsor-item.silver .sponsor-tier { color: #C0C0C0; }
    .sponsor-logo { width: 24px; height: 24px; border-radius: 4px; object-fit: cover; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; }
    .sponsor-tier { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; opacity: 0.8; }
    .sponsor-empty { color: rgba(255,255,255,0.4); font-size: 0.85rem; }
    @media (max-width: 768px) { .sponsor-bar { padding: 0.6rem 1rem; } .sponsor-label { width: 100%; justify-content: center; margin-bottom: 0.5rem; } .sponsor-list { gap: 0.75rem; } .sponsor-item { font-size: 0.8rem; padding: 0.3rem 0.6rem; } }
    </style>
    <div class="sponsor-bar" id="sponsorBar">
        <div class="sponsor-label">赞助商</div>
        <div class="sponsor-list" id="sponsorList"><span class="sponsor-empty">加载中...</span></div>
    </div>
    <script>
    (function() {
        const API_BASE = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
        const TIER_ORDER = { 'platinum': 1, 'gold': 2, 'silver': 3 };
        async function loadSponsors() {
            try {
                const resp = await fetch(API_BASE + '/sponsors');
                const result = await resp.json();
                if (!result.ok || !result.data || result.data.length === 0) {
                    const homeResp = await fetch(API_BASE + '/');
                    const homeResult = await homeResp.json();
                    const sponsors = homeResult.data?.sponsors || [];
                    renderSponsors(sponsors);
                    return;
                }
                renderSponsors(result.data);
            } catch (e) { console.error('加载赞助商失败:', e); document.getElementById('sponsorList').innerHTML = '<span class="sponsor-empty">暂无赞助商</span>'; }
        }
        function renderSponsors(sponsors) {
            if (!sponsors || sponsors.length === 0) { document.getElementById('sponsorList').innerHTML = '<span class="sponsor-empty">暂无赞助商</span>'; return; }
            const sorted = [...sponsors].sort((a, b) => { const tierA = TIER_ORDER[a.tier?.toLowerCase()] || 99; const tierB = TIER_ORDER[b.tier?.toLowerCase()] || 99; return tierA - tierB; });
            const html = sorted.map(s => { const tier = (s.tier || 'silver').toLowerCase(); return `<a href="${s.website || '#'}" class="sponsor-item ${tier}" ${s.website ? 'target="_blank" rel="noopener"' : ''}><img class="sponsor-logo" src="${s.logo || ''}" alt="${s.name}" onerror="this.style.display='none'"><span>${s.name}</span><span class="sponsor-tier">${tier}</span></a>`; }).join('');
            document.getElementById('sponsorList').innerHTML = html;
        }
        loadSponsors();
    })();
    </script>

    <main

    <main class="container">
        <a href="/gallery.html" class="back-link">← 返回画廊</a>
        
        <div id="photoContent">
            <div class="loading">
                <div class="loading-spinner"></div>
                <span>加载中...</span>
            </div>
        </div>
        
        <!-- 评论组件 -->
        <div id="comments-section" data-target-type="photo" data-target-id="1"></div>
    </main>

    <!-- 评论组件 (内联) -->
    <script>
    // 评论API配置
    const COMMENT_API = 'https://blast-comment-api.kanjiaming2022.workers.dev';
    const AUTH_API = 'https://blast-auth-api.kanjiaming2022.workers.dev';
    
    let currentUser = null;
    let currentTargetType = 'photo';
    let currentTargetId = null;
    
    // 从URL获取照片ID
    currentTargetId = window.location.pathname.match(/\/photo\/(\d+)\.html/)?.[1] || 
                      window.location.pathname.match(/(\d+)\.html/)?.[1] || '1';
    
    // 加载照片详情
    async function loadPhoto() {
        const container = document.getElementById('photoContent');
        
        try {
            // 模拟照片数据
            const mockPhoto = {
                id: currentTargetId,
                title: '比赛精彩瞬间',
                date: '2024-12-10',
                url: 'https://blastjunior-media.kanjiaming2022.workers.dev/photos/sample.jpg',
                description: '记录比赛中的精彩瞬间'
            };
            
            // 渲染照片
            container.innerHTML = `
                <div class="photo-detail">
                    <img class="photo-image" src="${mockPhoto.url}" alt="${mockPhoto.title}" onerror="this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\' viewBox=\\'0 0 400 300\\'><rect fill=\\'%23334155\\' width=\\'400\\' height=\\'300\\'/><text x=\\'50%25\\' y=\\'50%25\\' text-anchor=\\'middle\\' fill=\\'white\\' font-size=\\'24\\'>📷 照片</text></svg>'">
                    <div class="photo-info">
                        <h1 class="photo-title">${mockPhoto.title}</h1>
                        <div class="photo-meta">上传于 ${mockPhoto.date}</div>
                        <p class="photo-desc">${mockPhoto.description}</p>
                    </div>
                </div>
            `;
            
            // 初始化评论组件
            initComments('photo', currentTargetId);
            
        } catch (e) {
            console.error('Load photo failed:', e);
            container.innerHTML = '<div class="error">加载失败，请稍后重试</div>';
        }
    }
    
    // 检查用户登录状态
    async function checkUserStatus() {
        const token = localStorage.getItem('blxst_token');
        const loginPrompt = document.getElementById('loginPrompt');
        const inputArea = document.getElementById('inputArea');
        
        if (!token) {
            if (loginPrompt) loginPrompt.style.display = 'block';
            if (inputArea) inputArea.style.display = 'none';
            return;
        }
        
        try {
            const response = await fetch(`${AUTH_API}/profile`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            
            if (data.ok && data.user) {
                currentUser = data.user;
                if (loginPrompt) loginPrompt.style.display = 'none';
                if (inputArea) inputArea.style.display = 'flex';
                
                const userAvatar = document.getElementById('userAvatar');
                const userName = document.getElementById('userName');
                
                if (data.user.avatar_url && userAvatar) userAvatar.src = data.user.avatar_url;
                if (userName) userName.textContent = data.user.username || '用户';
            } else {
                localStorage.removeItem('blxst_token');
                if (loginPrompt) loginPrompt.style.display = 'block';
                if (inputArea) inputArea.style.display = 'none';
            }
        } catch (e) {
            console.error('Check user status failed:', e);
            if (loginPrompt) loginPrompt.style.display = 'block';
            if (inputArea) inputArea.style.display = 'none';
        }
    }
    
    // 加载评论列表
    async function loadComments() {
        const listEl = document.getElementById('commentsList');
        const countEl = document.getElementById('commentsCount');
        
        if (listEl) {
            listEl.innerHTML = `
                <div class="comments-loading">
                    <div class="loading-spinner"></div>
                    <span>加载中...</span>
                </div>
            `;
        }
        
        try {
            const response = await fetch(
                `${COMMENT_API}/comments?target_type=${currentTargetType}&target_id=${currentTargetId}&status=approved`
            );
            const data = await response.json();
            
            if (data.ok) {
                if (countEl) countEl.textContent = data.total || 0;
                renderComments(data.comments || []);
            }
        } catch (e) {
            console.error('Load comments failed:', e);
        }
    }
    
    // 渲染评论
    function renderComments(comments) {
        const listEl = document.getElementById('commentsList');
        if (!listEl) return;
        
        if (!comments || comments.length === 0) {
            listEl.innerHTML = `<div class="comments-empty">暂无评论，快来抢沙发吧~</div>`;
            return;
        }
        
        const html = comments.map(comment => {
            const time = formatTime(comment.created_at);
            const avatar = comment.user.avatar_url || 
                `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23e2e8f0'/><text x='50' y='55' text-anchor='middle' font-size='40'>👤</text></svg>`;
            
            return `
                <div class="comment-item">
                    <div class="comment-avatar">
                        <img src="${avatar}" alt="${comment.user.username}">
                    </div>
                    <div class="comment-body">
                        <div class="comment-header">
                            <span class="comment-username">${escapeHtml(comment.user.username)}</span>
                            <span class="comment-time">${time}</span>
                        </div>
                        <div class="comment-content">${escapeHtml(comment.content)}</div>
                    </div>
                </div>
            `;
        }).join('');
        
        listEl.innerHTML = html;
    }
    
    // 更新字符计数
    function updateCharCount() {
        const input = document.getElementById('commentInput');
        const countEl = document.getElementById('charCount');
        const submitBtn = document.getElementById('btnSubmit');
        
        if (!input || !countEl || !submitBtn) return;
        
        const len = input.value.length;
        countEl.textContent = len;
        submitBtn.disabled = len === 0 || len > 500;
    }
    
    // 提交评论
    async function submitComment() {
        const input = document.getElementById('commentInput');
        const submitBtn = document.getElementById('btnSubmit');
        const content = input?.value.trim();
        
        if (!content || content.length > 500) return;
        
        const token = localStorage.getItem('blxst_token');
        if (!token) {
            alert('请先登录');
            return;
        }
        
        submitBtn.classList.add('loading');
        submitBtn.textContent = '发布中...';
        
        try {
            const response = await fetch(`${COMMENT_API}/comments`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    target_type: currentTargetType,
                    target_id: currentTargetId,
                    content: content
                })
            });
            
            const data = await response.json();
            
            if (data.ok) {
                input.value = '';
                updateCharCount();
                await loadComments();
            } else {
                alert(data.error || '发布失败');
            }
        } catch (e) {
            console.error('Submit comment failed:', e);
            alert('发布失败，请稍后重试');
        } finally {
            submitBtn.classList.remove('loading');
            submitBtn.textContent = '发布评论';
        }
    }
    
    function formatTime(dateStr) {
        const date = new Date(dateStr);
        const now = new Date();
        const diff = now - date;
        const minutes = Math.floor(diff / 60000);
        const hours = Math.floor(diff / 3600000);
        const days = Math.floor(diff / 86400000);
        
        if (minutes < 1) return '刚刚';
        if (minutes < 60) return `${minutes}分钟前`;
        if (hours < 24) return `${hours}小时前`;
        if (days < 7) return `${days}天前`;
        
        return date.toLocaleDateString('zh-CN');
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // 初始化评论组件
    function initComments(targetType, targetId) {
        currentTargetType = targetType;
        currentTargetId = targetId;
        
        // 添加评论组件到页面
        const section = document.getElementById('comments-section');
        if (section) {
            section.innerHTML = getCommentsHTML();
            section.dataset.targetType = targetType;
            section.dataset.targetId = targetId;
        }
        
        // 绑定事件
        const input = document.getElementById('commentInput');
        if (input) input.addEventListener('input', updateCharCount);
        
        const submitBtn = document.getElementById('btnSubmit');
        if (submitBtn) submitBtn.addEventListener('click', submitComment);
        
        // 加载用户和评论
        checkUserStatus();
        loadComments();
    }
    
    function getCommentsHTML() {
        return `
    <div class="blxst-comments" id="blxstComments">
        <div class="comments-header">
            <h3 class="comments-title">💬 评论 <span class="comments-count" id="commentsCount">0</span></h3>
        </div>
        <div class="comments-list" id="commentsList">
            <div class="comments-loading">
                <div class="loading-spinner"></div>
                <span>加载中...</span>
            </div>
        </div>
        <div class="comments-form" id="commentsForm">
            <div class="comments-login-prompt" id="loginPrompt" style="display: none;">
                <p>登录后可以参与评论</p>
                <a href="/login.html" class="btn-login">立即登录</a>
            </div>
            <div class="comments-input-area" id="inputArea" style="display: none;">
                <div class="user-info">
                    <img class="user-avatar" id="userAvatar" src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23ddd'/><text x='50' y='50' text-anchor='middle' dy='.3em' font-size='40'>👤</text></svg>" alt="avatar">
                    <span class="user-name" id="userName">用户名</span>
                </div>
                <textarea class="comment-input" id="commentInput" placeholder="写下你的评论..." maxlength="500"></textarea>
                <div class="comment-input-footer">
                    <span class="char-count"><span id="charCount">0</span>/500</span>
                    <button class="btn-submit" id="btnSubmit" disabled>发布评论</button>
                </div>
            </div>
        </div>
    </div>
    <style>
    .blxst-comments { background: var(--bg-white); border-radius: 16px; padding: 1.5rem; margin-top: 2rem; box-shadow: var(--shadow); font-family: 'Noto Sans SC', sans-serif; }
    .comments-header { margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #e2e8f0; }
    .comments-title { font-size: 1.25rem; font-weight: 700; color: #1e293b; display: flex; align-items: center; gap: 0.5rem; }
    .comments-count { background: #f1f5f9; padding: 0.2rem 0.5rem; border-radius: 12px; font-size: 0.85rem; color: #64748b; }
    .comments-loading { display: flex; align-items: center; justify-content: center; gap: 0.75rem; padding: 2rem; color: #94a3b8; }
    .loading-spinner { width: 20px; height: 20px; border: 2px solid #e2e8f0; border-top-color: #ff6b35; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .comments-list { margin-bottom: 1.5rem; }
    .comment-item { display: flex; gap: 1rem; padding: 1rem 0; border-bottom: 1px solid #f1f5f9; }
    .comment-item:last-child { border-bottom: none; }
    .comment-avatar { width: 40px; height: 40px; border-radius: 50%; background: #f1f5f9; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
    .comment-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .comment-body { flex: 1; min-width: 0; }
    .comment-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
    .comment-username { font-weight: 600; color: #1e293b; font-size: 0.95rem; }
    .comment-time { color: #94a3b8; font-size: 0.8rem; }
    .comment-content { color: #334155; line-height: 1.6; word-break: break-word; }
    .comments-empty { text-align: center; padding: 2rem; color: #94a3b8; }
    .comments-form { border-top: 1px solid #e2e8f0; padding-top: 1.5rem; }
    .comments-login-prompt { text-align: center; padding: 1.5rem; background: #f8fafc; border-radius: 12px; }
    .comments-login-prompt p { color: #64748b; margin-bottom: 1rem; }
    .btn-login { display: inline-block; background: #ff6b35; color: white; padding: 0.75rem 1.5rem; border-radius: 8px; text-decoration: none; font-weight: 500; }
    .btn-login:hover { background: #e55a2b; }
    .comments-input-area { display: flex; flex-direction: column; gap: 1rem; }
    .user-info { display: flex; align-items: center; gap: 0.75rem; }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
    .user-name { font-weight: 600; color: #1e293b; }
    .comment-input { width: 100%; min-height: 100px; padding: 1rem; border: 2px solid #e2e8f0; border-radius: 12px; font-family: inherit; font-size: 0.95rem; resize: vertical; }
    .comment-input:focus { outline: none; border-color: #ff6b35; }
    .comment-input::placeholder { color: #94a3b8; }
    .comment-input-footer { display: flex; justify-content: space-between; align-items: center; }
    .char-count { color: #94a3b8; font-size: 0.85rem; }
    .btn-submit { background: #ff6b35; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .btn-submit:hover:not(:disabled) { background: #e55a2b; }
    .btn-submit:disabled { background: #cbd5e1; cursor: not-allowed; }
    </style>
        `;
    }
    
    // 页面加载
    loadPhoto();
    </script>
    <script src="/components/nav-loader.js"></script>
</body>
</html>
