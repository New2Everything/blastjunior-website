<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI问答 - 兰星少年 HADO 俱乐部</title>
    <!-- DATA_MODULE: ai_chat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B35; --secondary: #00B4D8; --bg-light: #F8FAFC; --bg-white: #FFFFFF; --text-dark: #1E293B; --text-gray: #64748B; --border: #E2E8F0; --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-light); color: var(--text-dark); height: 100vh; display: flex; flex-direction: column; }
        nav { background: var(--bg-white); border-bottom: 1px solid var(--border); }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 64px; }
        .logo { display: flex; align-items: center; gap: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.25rem; text-decoration: none; color: var(--text-dark); }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), #FF8A5C); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; }
        
        /* 聊天容器 */
        .chat-container { flex: 1; max-width: 800px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; padding: 1rem; }
        
        /* 快速问题 */
        .quick-questions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .quick-btn { padding: 0.5rem 1rem; background: var(--bg-white); border: 1px solid var(--border); border-radius: 20px; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; }
        .quick-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
        
        /* 消息列表 */
        .messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; padding: 1rem 0; }
        .message { display: flex; gap: 0.75rem; max-width: 85%; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        
        .message-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; flex-shrink: 0; }
        .message.ai .message-avatar { background: linear-gradient(135deg, var(--primary), #FF8A5C); }
        .message.user .message-avatar { background: var(--secondary); }
        
        .message-content { padding: 0.75rem 1rem; border-radius: 12px; line-height: 1.5; }
        .message.ai .message-content { background: var(--bg-white); border-bottom-left-radius: 4px; }
        .message.user .message-content { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        
        /* 链接样式 */
        .message-content a { color: var(--secondary); text-decoration: underline; }
        
        /* 输入区域 */
        .input-area { display: flex; gap: 0.75rem; padding: 1rem; background: var(--bg-white); border-radius: var(--radius); box-shadow: var(--shadow); }
        .input-field { flex: 1; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; font-family: inherit; }
        .input-field:focus { outline: none; border-color: var(--primary); }
        .send-btn { padding: 0.75rem 1.5rem; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .send-btn:hover { opacity: 0.9; }
        
        /* 加载动画 */
        .typing { display: flex; gap: 0.25rem; padding: 0.75rem 1rem; }
        .typing span { width: 8px; height: 8px; background: var(--text-gray); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="/" class="logo"><div class="logo-icon">💬</div><span>AI 问答助手</span></a>
        </div>
    </nav>

    <!-- 赞助商横条 -->
    <style>
    .sponsor-bar { background: linear-gradient(135deg, #1E293B 0%, #334155 100%); padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: center; gap: 1rem; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sponsor-label { font-size: 0.75rem; font-weight: 600; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 0.25rem; }
    .sponsor-label::before { content: "🤝"; }
    .sponsor-list { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .sponsor-item { display: flex; align-items: center; gap: 0.5rem; color: white; text-decoration: none; font-size: 0.9rem; font-weight: 500; padding: 0.4rem 0.75rem; border-radius: 6px; transition: all 0.2s; background: rgba(255,255,255,0.05); }
    .sponsor-item:hover { background: rgba(255,255,255,0.15); transform: translateY(-1px); }
    .sponsor-item.platinum { border-left: 3px solid #E5E4E2; }
    .sponsor-item.platinum .sponsor-tier { color: #E5E4E2; }
    .sponsor-item.gold { border-left: 3px solid #FFD700; }
    .sponsor-item.gold .sponsor-tier { color: #FFD700; }
    .sponsor-item.silver { border-left: 3px solid #C0C0C0; }
    .sponsor-item.silver .sponsor-tier { color: #C0C0C0; }
    .sponsor-logo { width: 24px; height: 24px; border-radius: 4px; object-fit: cover; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; }
    .sponsor-tier { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; opacity: 0.8; }
    .sponsor-empty { color: rgba(255,255,255,0.4); font-size: 0.85rem; }
    @media (max-width: 768px) { .sponsor-bar { padding: 0.6rem 1rem; } .sponsor-label { width: 100%; justify-content: center; margin-bottom: 0.5rem; } .sponsor-list { gap: 0.75rem; } .sponsor-item { font-size: 0.8rem; padding: 0.3rem 0.6rem; } }
    </style>
    <div class="sponsor-bar" id="sponsorBar">
        <div class="sponsor-label">赞助商</div>
        <div class="sponsor-list" id="sponsorList"><span class="sponsor-empty">加载中...</span></div>
    </div>
    <script>
    (function() {
        const API_BASE = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
        const TIER_ORDER = { 'platinum': 1, 'gold': 2, 'silver': 3 };
        async function loadSponsors() {
            try {
                const resp = await fetch(API_BASE + '/sponsors');
                const result = await resp.json();
                if (!result.ok || !result.data || result.data.length === 0) {
                    const homeResp = await fetch(API_BASE + '/');
                    const homeResult = await homeResp.json();
                    const sponsors = homeResult.data?.sponsors || [];
                    renderSponsors(sponsors);
                    return;
                }
                renderSponsors(result.data);
            } catch (e) { console.error('加载赞助商失败:', e); document.getElementById('sponsorList').innerHTML = '<span class="sponsor-empty">暂无赞助商</span>'; }
        }
        function renderSponsors(sponsors) {
            if (!sponsors || sponsors.length === 0) { document.getElementById('sponsorList').innerHTML = '<span class="sponsor-empty">暂无赞助商</span>'; return; }
            const sorted = [...sponsors].sort((a, b) => { const tierA = TIER_ORDER[a.tier?.toLowerCase()] || 99; const tierB = TIER_ORDER[b.tier?.toLowerCase()] || 99; return tierA - tierB; });
            const html = sorted.map(s => { const tier = (s.tier || 'silver').toLowerCase(); return `<a href="${s.website || '#'}" class="sponsor-item ${tier}" ${s.website ? 'target="_blank" rel="noopener"' : ''}><img class="sponsor-logo" src="${s.logo || ''}" alt="${s.name}" onerror="this.style.display='none'"><span>${s.name}</span><span class="sponsor-tier">${tier}</span></a>`; }).join('');
            document.getElementById('sponsorList').innerHTML = html;
        }
        loadSponsors();
    })();
    </script>

    <main

    <div class="chat-container">
        <!-- 快速问题 -->
        <div class="quick-questions">
            <button class="quick-btn" onclick="ask('如何加入俱乐部？')">如何加入？</button>
            <button class="quick-btn" onclick="ask('比赛时间？')">比赛时间</button>
            <button class="quick-btn" onclick="ask('训练安排？')">训练安排</button>
            <button class="quick-btn" onclick="ask('如何查看积分？')">查看积分</button>
            <button class="quick-btn" onclick="ask('联系方式？')">联系方式</button>
        </div>
        
        <!-- 消息 -->
        <div class="messages" id="messages">
            <div class="message ai">
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    你好！我是兰星少年的AI助手，可以帮你解答关于俱乐部的问题。<br><br>
                    你可以点击上方的问题快速提问，或者直接输入你的问题。
                </div>
            </div>
        </div>
        
        <!-- 输入 -->
        <div class="input-area">
            <input type="text" class="input-field" id="userInput" placeholder="输入你的问题..." onkeypress="if(event.key==='Enter')sendMessage()">
            <button class="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
    const messages = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    
    // 问答知识库
    const knowledge = {
        '加入': {
            answer: '加入兰星少年HADO俱乐部非常简单！',
            links: [
                { text: '→ 填写加入申请表', url: '/join' },
                { text: '→ 了解训练安排', url: '/topics.html' }
            ]
        },
        '如何': {
            answer: '加入我们有两种方式：',
            links: [
                { text: '→ 在线报名', url: '/join' },
                { text: '→ 了解新星计划', url: '/topics.html' }
            ]
        },
        '比赛': {
            answer: '比赛信息可以在以下页面查看：',
            links: [
                { text: '→ 赛程页面', url: '/matches' },
                { text: '→ 积分榜', url: '/standings' }
            ]
        },
        '时间': {
            answer: '赛季比赛通常在周末进行，具体时间请查看：',
            links: [
                { text: '→ 赛程安排', url: '/matches' },
                { text: '→ 轮次复盘', url: '/rounds.html' }
            ]
        },
        '训练': {
            answer: '我们提供科学的训练体系：',
            links: [
                { text: '→ 训练营专题', url: '/topics.html' },
                { text: '→ 轮次数据', url: '/rounds.html' }
            ]
        },
        '积分': {
            answer: '查看积分榜：',
            links: [
                { text: '→ 积分榜', url: '/standings' }
            ]
        },
        '联系': {
            answer: '联系我们：',
            links: [
                { text: '→ 加入我们', url: '/join' }
            ]
        },
        '战队': {
            answer: '查看战队信息：',
            links: [
                { text: '→ 战队列表', url: '/teams' },
                { text: '→ 战队荣誉', url: '/honor' }
            ]
        },
        '选手': {
            answer: '查看选手信息：',
            links: [
                { text: '→ 选手列表', url: '/players' }
            ]
        },
        '默认': {
            answer: '我可以帮你解答关于俱乐部的问题，请尝试点击上方的快捷问题。',
            links: [
                { text: '→ 首页', url: '/' },
                { text: '→ 赛程', url: '/matches' },
                { text: '→ 积分榜', url: '/standings' }
            ]
        }
    };
    
    function ask(question) {
        userInput.value = question;
        sendMessage();
    }
    
    function sendMessage() {
        const question = userInput.value.trim();
        if (!question) return;
        
        // 添加用户消息
        addMessage(question, 'user');
        userInput.value = '';
        
        // 显示加载
        showTyping();
        
        // 模拟AI回复
        setTimeout(() => {
            hideTyping();
            const answer = getAnswer(question);
            addMessage(answer.text, 'ai', answer.links);
        }, 800);
    }
    
    function getAnswer(question) {
        for (const key in knowledge) {
            if (question.includes(key)) {
                return knowledge[key];
            }
        }
        return knowledge['默认'];
    }
    
    function addMessage(text, type, links = []) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        
        let content = text;
        if (links && links.length > 0) {
            content += '<br><br>' + links.map(l => `<a href="${l.url}">${l.text}</a>`).join('<br>');
        }
        
        div.innerHTML = `
            <div class="message-avatar">${type === 'ai' ? '🤖' : '👤'}</div>
            <div class="message-content">${content}</div>
        `;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }
    
    function showTyping() {
        const div = document.createElement('div');
        div.className = 'message ai';
        div.id = 'typing';
        div.innerHTML = `
            <div class="message-avatar">🤖</div>
            <div class="message-content">
                <div class="typing"><span></span><span></span><span></span></div>
            </div>
        `;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }
    
    function hideTyping() {
        const typing = document.getElementById('typing');
        if (typing) typing.remove();
    }
    </script>
    <script src="/components/nav-loader.js"></script>
</body>
</html>
