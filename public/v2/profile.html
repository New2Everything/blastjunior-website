<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 - BLXST</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👤</text></svg>">
</head>
<body>
  <header class="header">
    <a href="v2/index.html" class="header-logo">⚔️ BLXST</a>
    <nav class="nav-links">
      <a href="v2/index.html" class="nav-link">首页</a>
      <a href="v2/events.html" class="nav-link">赛事</a>
      <a href="v2/teams.html" class="nav-link">战队</a>
      <a href="v2/players.html" class="nav-link">选手</a>
    </nav>
  </header>

  <main class="main-content" style="padding-top: 100px;">
    <section class="section" style="max-width: 800px;">
      <h2 class="section-title" style="margin-bottom: 32px;">个人中心</h2>
      
      <div style="background: var(--color-bg-mid); border-radius: 16px; padding: 32px; border: 1px solid var(--color-border); margin-bottom: 24px;">
        <div style="text-align: center; margin-bottom: 24px;">
          <div style="width: 100px; height: 100px; border-radius: 50%; background: var(--color-bg-light); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 48px;">
            👤
          </div>
          <h3 style="margin-bottom: 8px;">请先登录</h3>
          <p style="color: var(--color-text-secondary); font-size: 14px;">登录后可查看个人数据、比赛记录</p>
        </div>
        
        <div style="display: flex; gap: 16px; justify-content: center;">
          <a href="login.html" class="btn btn-primary">登录</a>
          <a href="register.html" class="btn btn-secondary">注册</a>
        </div>
      </div>
      
      <div style="background: var(--color-bg-mid); border-radius: 16px; padding: 24px; border: 1px solid var(--color-border);">
        <h3 style="margin-bottom: 16px;">快速入口</h3>
        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;">
          <a href="v2/parent.html" style="display: block; padding: 20px; background: var(--color-bg-light); border-radius: 12px; text-decoration: none; color: var(--color-text-primary);">
            <div style="font-size: 32px; margin-bottom: 8px;">👶</div>
            <div style="font-weight: 600;">家长入口</div>
            <div style="font-size: 12px; color: var(--color-text-secondary);">查看孩子比赛记录</div>
          </a>
          <a href="#" style="display: block; padding: 20px; background: var(--color-bg-light); border-radius: 12px; text-decoration: none; color: var(--color-text-primary);">
            <div style="font-size: 32px; margin-bottom: 8px;">📸</div>
            <div style="font-weight: 600;">我的上传</div>
            <div style="font-size: 12px; color: var(--color-text-secondary);">管理已上传内容</div>
          </a>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-copyright">© 2026 兰星少年俱乐部</div>
  </footer>
</body>
</html>
