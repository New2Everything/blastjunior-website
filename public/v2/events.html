<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赛事中心 - BLXST</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
</head>
<body>
  <header class="header">
    <a href="v2/index.html" class="header-logo">
      <svg viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="2"/>
        <circle cx="16" cy="16" r="6" fill="#FF6B35"/>
      </svg>
      BLXST
    </a>
    <nav class="nav-links">
      <a href="v2/index.html" class="nav-link">首页</a>
      <a href="v2/events.html" class="nav-link active">赛事</a>
      <a href="v2/teams.html" class="nav-link">战队</a>
      <a href="v2/players.html" class="nav-link">选手</a>
      <a href="v2/gallery.html" class="nav-link">图库</a>
      <a href="v2/news.html" class="nav-link">新闻</a>
      <a href="v2/sponsors.html" class="nav-link">赞助</a>
    </nav>
    <div class="header-right">
      <a href="v2/profile.html" class="nav-link">👤</a>
    </div>
  </header>

  <main class="main-content" style="padding-top: 100px;">
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">赛事中心</h2>
      </div>
      
      <div style="margin-bottom: 24px; display: flex; gap: 12px;">
        <button class="btn btn-primary" onclick="filterEvents('all')">全部</button>
        <button class="btn btn-secondary" onclick="filterEvents('league')">联赛</button>
        <button class="btn btn-secondary" onclick="filterEvents('cup')">杯赛</button>
        <button class="btn btn-secondary" onclick="filterEvents('international')">国际赛</button>
      </div>

      <div class="events-grid" id="events-grid">
        <div class="loading"><div class="loading-spinner"></div></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-links">
      <a href="#" class="footer-link">关于我们</a>
      <a href="v2/sponsors.html" class="footer-link">赞助合作</a>
    </div>
    <div class="footer-copyright">© 2026 兰星少年俱乐部</div>
  </footer>

  <script>
    const API_BASE = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
    let allEvents = [];

    async function init() {
      const res = await fetch(API_BASE + '/matches');
      const data = await res.json();
      
      if (data.ok && data.data) {
        allEvents = data.data;
        renderEvents(allEvents);
      } else {
        document.getElementById('events-grid').innerHTML = '<div class="empty-state"><div class="empty-state-text">暂无赛事数据</div></div>';
      }
    }

    function renderEvents(events) {
      const container = document.getElementById('events-grid');
      
      if (!events || events.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-text">暂无赛事</div></div>';
        return;
      }
      
      container.innerHTML = events.map(event => `
        <div class="event-card">
          <span class="event-badge ${event.status === 'ongoing' ? 'ongoing' : 'finished'}">
            ${event.status === 'ongoing' ? '🔥 进行中' : '✅ 已结束'}
          </span>
          <h3 class="event-title">${event.event_name || 'HADO赛事'}</h3>
          <div class="event-meta">
            <span>📅 ${event.start_date || '2025'}</span>
            <span>👥 ${event.teams || '多'}支战队</span>
          </div>
          <div style="margin-top: 16px; display: flex; gap: 12px;">
            <a href="v2/standings.html" class="btn btn-primary" style="padding: 8px 16px; font-size: 12px;">积分榜</a>
            <a href="v2/events.html" class="btn btn-secondary" style="padding: 8px 16px; font-size: 12px;">赛程</a>
          </div>
        </div>
      `).join('');
    }

    function filterEvents(type) {
      if (type === 'all') {
        renderEvents(allEvents);
      } else {
        renderEvents(allEvents);
      }
    }

    init();
  </script>
</body>
</html>
