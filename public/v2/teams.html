<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>战队中心 - BLXST</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
</head>
<body>
  <header class="header">
    <a href="v2/index.html" class="header-logo">
      <svg viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="2"/>
        <circle cx="16" cy="16" r="6" fill="#FF6B35"/>
      </svg>
      BLXST
    </a>
    <nav class="nav-links">
      <a href="v2/index.html" class="nav-link">首页</a>
      <a href="v2/events.html" class="nav-link">赛事</a>
      <a href="v2/teams.html" class="nav-link active">战队</a>
      <a href="v2/players.html" class="nav-link">选手</a>
      <a href="v2/gallery.html" class="nav-link">图库</a>
      <a href="v2/news.html" class="nav-link">新闻</a>
      <a href="v2/sponsors.html" class="nav-link">赞助</a>
    </nav>
    <div class="header-right">
      <a href="v2/profile.html" class="nav-link">👤</a>
    </div>
  </header>

  <main class="main-content" style="padding-top: 100px;">
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">战队中心</h2>
        <span style="color: var(--color-text-secondary);" id="team-count">108支战队</span>
      </div>

      <div style="margin-bottom: 24px;">
        <input type="text" id="search-input" placeholder="🔍 搜索战队..." 
          style="width: 100%; max-width: 400px; padding: 12px 16px; border-radius: 12px; 
                 border: 1px solid var(--color-border); background: var(--color-bg-mid); 
                 color: var(--color-text-primary); font-size: 14px;"
          oninput="filterTeams()">
      </div>

      <div class="teams-grid" id="teams-grid">
        <div class="loading"><div class="loading-spinner"></div></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-links">
      <a href="#" class="footer-link">关于我们</a>
      <a href="v2/sponsors.html" class="footer-link">赞助合作</a>
    </div>
    <div class="footer-copyright">© 2026 兰星少年俱乐部</div>
  </footer>

  <script>
    const API_BASE = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
    let allTeams = [];

    async function init() {
      const res = await fetch(API_BASE + '/teams');
      const data = await res.json();
      
      const container = document.getElementById('teams-grid');
      
      if (data.ok && data.data) {
        allTeams = data.data;
        document.getElementById('team-count').textContent = allTeams.length + '支战队';
        renderTeams(allTeams);
      } else {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-text">暂无战队</div></div>';
      }
    }

    function renderTeams(teams) {
      const container = document.getElementById('teams-grid');
      
      if (!teams || teams.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-text">未找到战队</div></div>';
        return;
      }
      
      container.innerHTML = teams.map((team, i) => `
        <div class="team-card" onclick="location.href='v2/team-detail.html?id=${team.id}'">
          <div class="team-avatar-large">🛡️</div>
          <div class="team-name">${team.name}</div>
          <div class="team-rank">#${i + 1}</div>
        </div>
      `).join('');
    }

    function filterTeams() {
      const query = document.getElementById('search-input').value.toLowerCase();
      const filtered = allTeams.filter(team => 
        team.name.toLowerCase().includes(query)
      );
      renderTeams(filtered);
    }

    init();
  </script>
</body>
</html>
