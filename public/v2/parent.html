<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家长中心 - BLXST</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👶</text></svg>">
</head>
<body>
  <header class="header">
    <a href="v2/index.html" class="header-logo">⚔️ BLXST</a>
  </header>

  <main class="main-content" style="padding-top: 100px;">
    <section class="section" style="max-width: 800px;">
      <a href="v2/profile.html" class="section-link" style="margin-bottom: 24px; display: inline-block;">← 返回个人中心</a>
      
      <h2 class="section-title" style="margin-bottom: 32px;">👶 家长中心</h2>
      
      <!-- 搜索孩子 -->
      <div style="background: var(--color-bg-mid); border-radius: 16px; padding: 24px; border: 1px solid var(--color-border); margin-bottom: 24px;">
        <h3 style="margin-bottom: 16px;">🔍 查找孩子的比赛记录</h3>
        <div style="display: flex; gap: 12px;">
          <input type="text" id="search-name" placeholder="输入孩子昵称或姓名..." 
            style="flex: 1; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--color-border); 
                   background: var(--color-bg-light); color: var(--color-text-primary); font-size: 14px;">
          <button class="btn btn-primary" onclick="searchPlayer()">搜索</button>
        </div>
      </div>
      
      <!-- 孩子列表 -->
      <div style="margin-bottom: 24px;">
        <h3 style="margin-bottom: 16px;">或选择孩子：</h3>
        <div class="players-grid" id="children-grid">
          <div class="loading"><div class="loading-spinner"></div></div>
        </div>
      </div>
      
      <!-- 比赛汇总 -->
      <div id="summary-section" style="display: none;">
        <h2 class="section-title" style="margin-bottom: 24px;" id="summary-title">孩子的比赛汇总</h2>
        
        <div style="background: var(--color-bg-mid); border-radius: 16px; padding: 24px; border: 1px solid var(--color-border); margin-bottom: 24px;">
          <h3 style="margin-bottom: 16px;">赛季总览</h3>
          <div class="stats-bar">
            <div class="stat-card">
              <div class="stat-info">
                <div class="stat-number" id="stat-matches">-</div>
                <div class="stat-label">总场次</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-info">
                <div class="stat-number" id="stat-points">-</div>
                <div class="stat-label">总得分</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-info">
                <div class="stat-number" style="color: var(--color-primary);" id="stat-avg">-</div>
                <div class="stat-label">场均得分</div>
              </div>
            </div>
          </div>
        </div>
        
        <div style="background: var(--color-bg-mid); border-radius: 16px; padding: 24px; border: 1px solid var(--color-border); margin-bottom: 24px;">
          <h3 style="margin-bottom: 16px;">📅 队伍历史</h3>
          <div id="team-history-list">
            <div class="loading"><div class="loading-spinner"></div></div>
          </div>
        </div>
        
        <button class="btn btn-primary" style="width: 100%; margin-bottom: 24px;" onclick="shareToWechat()">📤 分享到微信</button>
        
        <div style="background: var(--color-bg-mid); border-radius: 16px; padding: 24px; border: 1px solid var(--color-border);">
          <h3 style="margin-bottom: 16px;">🔔 通知订阅</h3>
          <div style="display: flex; flex-direction: column; gap: 12px;">
            <label style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
              <input type="checkbox" checked> 比赛结果推送
            </label>
            <label style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
              <input type="checkbox"> 新赛事提醒
            </label>
            <label style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
              <input type="checkbox"> 成长报告推送
            </label>
          </div>
          <button class="btn btn-primary" style="width: 100%; margin-top: 16px;">立即订阅</button>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-copyright">© 2026 兰星少年俱乐部</div>
  </footer>

  <script>
    const API_BASE = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
    let allPlayers = [];
    let currentPlayerId = null;

    // 初始化加载选手列表
    async function init() {
      try {
        const res = await fetch(API_BASE + '/players');
        const data = await res.json();
        
        const container = document.getElementById('children-grid');
        
        if (data.ok && data.data && data.data.length > 0) {
          allPlayers = data.data.slice(0, 8); // 只显示前8个
          renderChildrenList(allPlayers);
        } else {
          container.innerHTML = '<div class="empty-state"><div class="empty-state-text">暂无选手数据</div></div>';
        }
      } catch (e) {
        console.error(e);
        document.getElementById('children-grid').innerHTML = '<div class="empty-state"><div class="empty-state-text">加载失败</div></div>';
      }
    }

    function renderChildrenList(players) {
      const container = document.getElementById('children-grid');
      
      if (!players || players.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-text">暂无选手</div></div>';
        return;
      }
      
      container.innerHTML = players.map(player => `
        <div class="player-card" onclick="showParentView('${player.id}')">
          <div class="player-avatar">👤</div>
          <div class="player-name">${player.nickname || player.name || '选手'}</div>
          <div class="player-realname">${player.real_name || ''}</div>
          <div style="color: var(--color-text-secondary); font-size: 12px;">${player.gender || '-'}</div>
        </div>
      `).join('');
    }

    function searchPlayer() {
      const name = document.getElementById('search-name').value.trim();
      if (!name) return;
      
      // 在列表中搜索
      const found = allPlayers.find(p => 
        (p.name && p.name.includes(name)) || 
        (p.nickname && p.nickname.includes(name)) ||
        (p.real_name && p.real_name.includes(name))
      );
      
      if (found) {
        showParentView(found.id);
      } else {
        alert('未找到该选手');
      }
    }
    
    async function showParentView(playerId) {
      currentPlayerId = playerId;
      document.getElementById('summary-section').style.display = 'block';
      
      try {
        const res = await fetch(API_BASE + '/players/' + playerId);
        const data = await res.json();
        
        if (data.ok && data.data) {
          const player = data.data;
          
          // 更新标题
          const displayName = player.nickname || player.name || player.real_name || '选手';
          document.getElementById('summary-title').textContent = displayName + ' 的比赛汇总';
          
          // 更新统计数据
          if (player.internal_stats) {
            document.getElementById('stat-matches').textContent = player.internal_stats.matches || '-';
            document.getElementById('stat-points').textContent = player.internal_stats.total_points || '-';
            document.getElementById('stat-avg').textContent = player.internal_stats.avg_points || '-';
          } else if (player.internal_rank) {
            document.getElementById('stat-points').textContent = player.internal_rank.total_points || '-';
          } else {
            document.getElementById('stat-matches').textContent = '-';
            document.getElementById('stat-points').textContent = '-';
            document.getElementById('stat-avg').textContent = '-';
          }
          
          // 更新队伍历史
          const historyContainer = document.getElementById('team-history-list');
          if (player.team_history && player.team_history.length > 0) {
            historyContainer.innerHTML = player.team_history.map(th => `
              <div style="padding: 12px 0; border-bottom: 1px solid var(--color-border);">
                <div style="font-weight: 600;">${th.team_name || '-'}</div>
                <div style="color: var(--color-text-secondary); font-size: 14px;">
                  ${th.season_name || th.season_id || '-'}
                  ${th.isLeague ? ' 🏆 联赛' : ''} ${th.isCup ? ' 🥇 杯赛' : ''}
                </div>
              </div>
            `).join('');
          } else {
            historyContainer.innerHTML = '<div style="color: var(--color-text-secondary);">暂无队伍历史</div>';
          }
          
          window.scrollTo({ top: 300, behavior: 'smooth' });
        } else {
          alert('选手不存在');
        }
      } catch (e) {
        console.error(e);
        alert('加载失败');
      }
    }
    
    function shareToWechat() {
      alert('分享功能开发中...');
    }

    init();
  </script>
</body>
</html>
