<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新闻资讯 - BLXST</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📰</text></svg>">
</head>
<body>
  <header class="header">
    <a href="v2/index.html" class="header-logo">
      <svg viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="2"/>
        <circle cx="16" cy="16" r="6" fill="#FF6B35"/>
      </svg>
      BLXST
    </a>
    <nav class="nav-links">
      <a href="v2/index.html" class="nav-link">首页</a>
      <a href="v2/events.html" class="nav-link">赛事</a>
      <a href="v2/teams.html" class="nav-link">战队</a>
      <a href="v2/players.html" class="nav-link">选手</a>
      <a href="v2/gallery.html" class="nav-link">图库</a>
      <a href="v2/news.html" class="nav-link active">新闻</a>
      <a href="v2/sponsors.html" class="nav-link">赞助</a>
    </nav>
    <div class="header-right">
      <a href="v2/profile.html" class="nav-link">👤</a>
    </div>
  </header>

  <main class="main-content" style="padding-top: 100px;">
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">新闻资讯</h2>
      </div>

      <div style="margin-bottom: 24px; display: flex; gap: 12px;">
        <button class="btn btn-primary" onclick="filterNews('all')">全部</button>
        <button class="btn btn-secondary" onclick="filterNews('event')">🏆 赛事报道</button>
        <button class="btn btn-secondary" onclick="filterNews('club')">📢 俱乐部</button>
        <button class="btn btn-secondary" onclick="filterNews('ai')">🤖 AI资讯</button>
      </div>

      <div class="news-grid" id="news-grid">
        <div class="loading"><div class="loading-spinner"></div></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-links">
      <a href="#" class="footer-link">关于我们</a>
      <a href="v2/sponsors.html" class="footer-link">赞助合作</a>
    </div>
    <div class="footer-copyright">© 2026 兰星少年俱乐部</div>
  </footer>

  <script>
    const API_BASE = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
    let allNews = [];

    async function init() {
      const res = await fetch(API_BASE + '/news');
      const data = await res.json();
      
      const container = document.getElementById('news-grid');
      
      if (data.ok && data.data && data.data.length > 0) {
        allNews = data.data;
        renderNews(allNews);
      } else {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-text">暂无新闻</div></div>';
      }
    }

    function renderNews(news) {
      const container = document.getElementById('news-grid');
      
      if (!news || news.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-text">暂无新闻</div></div>';
        return;
      }
      
      container.innerHTML = news.map(item => {
        const cat = item.category || 'event';
        const catClass = (item.author && item.author.includes('AI')) ? 'ai' : (cat === 'club' ? 'club' : 'event');
        const catText = (item.author && item.author.includes('AI')) ? '🤖 AI资讯' : (cat === 'club' ? '📢 俱乐部' : '🏆 赛事报道');
        
        return `
          <div class="news-card">
            <div class="news-image">📰</div>
            <div class="news-content">
              <span class="news-category ${catClass}">${catText}</span>
              <h3 class="news-title">${item.title}</h3>
              <div class="news-meta">
                <span>📅 ${item.published_at?.split(' ')[0] || '2026'}</span>
                <span>👤 ${item.author || '官方'}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function filterNews(type) {
      if (type === 'all') {
        renderNews(allNews);
      } else {
        const filtered = allNews.filter(item => {
          if (type === 'ai') return item.author && item.author.includes('AI');
          return item.category === type;
        });
        renderNews(filtered);
      }
    }

    init();
  </script>
</body>
</html>
