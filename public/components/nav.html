<script>
// Dark mode toggle
(function() {
    const toggle = document.getElementById("darkModeToggle");
    if (!toggle) return;
    
    const saved = localStorage.getItem("darkMode");
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    const isDark = saved ? saved === "dark" : prefersDark;
    
    function setDark(enabled) {
        document.documentElement.classList.toggle("dark", enabled);
        toggle.textContent = enabled ? "☀️" : "🌙";
        localStorage.setItem("darkMode", enabled ? "dark" : "light");
    }
    
    setDark(isDark);
    toggle.addEventListener("click", () => setDark(!document.documentElement.classList.contains("dark")));
})();
</script>

<script>
// 自动高亮当前页面导航
(function() {
  const path = window.location.pathname;
  const page = path === '/' ? 'home' : path.replace(/^\//, '').split('/')[0];
  
  document.querySelectorAll('.nav-link').forEach(link => {
    if (link.dataset.page === page) {
      link.classList.add('active');
    }
  });
})();
</script>
