<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家长中心 - 兰星少年 HADO 俱乐部</title>
  <meta name="description" content="查看您孩子的训练和比赛数据">
  <meta name="theme-color" content="#FF6B35">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/components/nav-loader.js"></script>
</head>
<body>
  <div class="container" style="max-width:900px;">
    <div class="page-header">
      <h1 class="page-title">👨‍👩‍👧 家长中心</h1>
      <p class="page-subtitle">查看孩子的训练和比赛数据</p>
    </div>

    <div class="section">
      <div class="card" style="margin-bottom:1.5rem;">
        <h2 style="font-family:var(--font-display);font-size:1.2rem;font-weight:700;margin-bottom:1rem;">选择选手</h2>
        <div id="playerSelect">
          <div style="text-align:center;color:var(--text-gray);"><span class="spinner"></span>加载选手...</div>
        </div>
      </div>

      <div id="playerData" style="display:none;">
        <!-- 选手数据卡片 -->
        <div class="card" style="margin-bottom:1.5rem;">
          <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border);">
            <div style="width:64px;height:64px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;color:white;">🏅</div>
            <div>
              <h3 style="font-weight:700;font-size:1.2rem;" id="selectedPlayerName">-</h3>
              <p style="font-size:0.9rem;color:var(--text-gray);" id="selectedPlayerTeam">-</p>
            </div>
          </div>

          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;">
            <div style="text-align:center;padding:1rem;background:var(--bg-light);border-radius:8px;">
              <div style="font-family:var(--font-display);font-size:2rem;font-weight:900;color:var(--primary);" id="playerGoals">-</div>
              <div style="font-size:0.85rem;color:var(--text-gray);">进球</div>
            </div>
            <div style="text-align:center;padding:1rem;background:var(--bg-light);border-radius:8px;">
              <div style="font-family:var(--font-display);font-size:2rem;font-weight:900;color:var(--primary);" id="playerAssists">-</div>
              <div style="font-size:0.85rem;color:var(--text-gray);">助攻</div>
            </div>
            <div style="text-align:center;padding:1rem;background:var(--bg-light);border-radius:8px;">
              <div style="font-family:var(--font-display);font-size:2rem;font-weight:900;color:var(--primary);" id="playerSaves">-</div>
              <div style="font-size:0.85rem;color:var(--text-gray);">扑救</div>
            </div>
          </div>
        </div>

        <div style="text-align:center;margin-top:1rem;">
          <a href="/players" class="btn btn-outline">查看所有选手</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://blast-homepage-api.kanjiaming2022.workers.dev';

    async function loadPlayers() {
      try {
        const res = await fetch(API + '/players');
        const result = await res.json();
        renderPlayerSelect(result.data || []);
      } catch (e) {
        document.getElementById('playerSelect').innerHTML = '<div style="color:#dc2626;">加载失败</div>';
      }
    }

    function renderPlayerSelect(players) {
      const el = document.getElementById('playerSelect');
      if (!players.length) {
        el.innerHTML = '<div style="color:var(--text-gray);">暂无可选选手</div>';
        return;
      }
      el.innerHTML = `
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1rem;">
          ${players.map(p => `
            <div class="card" style="text-align:center;cursor:pointer;padding:1rem;" onclick="selectPlayer('${p.id || p.player_id}', '${p.nickname || p.name || ''}', '${p.team_name || ''}', ${p.goals || 0}, ${p.assists || 0}, ${p.saves || 0})">
              <div style="width:48px;height:48px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:50%;margin:0 auto 0.5rem;display:flex;align-items:center;justify-content:center;font-size:1.25rem;color:white;">🏅</div>
              <div style="font-weight:600;font-size:0.9rem;">${p.nickname || p.name || ''}</div>
              ${p.team_name ? `<div style="font-size:0.75rem;color:var(--text-gray);">${p.team_name}</div>` : ''}
            </div>
          `).join('')}
        </div>
      `;
    }

    function selectPlayer(id, name, team, goals, assists, saves) {
      document.getElementById('selectedPlayerName').textContent = name;
      document.getElementById('selectedPlayerTeam').textContent = team || '未分配战队';
      document.getElementById('playerGoals').textContent = goals;
      document.getElementById('playerAssists').textContent = assists;
      document.getElementById('playerSaves').textContent = saves;
      document.getElementById('playerData').style.display = 'block';
      document.getElementById('playerData').scrollIntoView({ behavior: 'smooth' });
    }

    loadPlayers();
  </script>
</body>
</html>
