<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机海报生成器 - 兰星少年 HADO 俱乐部</title>
    <!-- DATA_MODULE: random_poster -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Outfit:wght@500;700;900;bold&family=ZCOOL+KuaiLe&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root { --primary: #FF6B35; --secondary: #00B4D8; --bg-light: #F8FAFC; --bg-white: #FFFFFF; --text-dark: #1E293B; --text-gray: #64748B; --border: #E2E8F0; --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-light); color: var(--text-dark); min-height: 100vh; }
        nav { background: var(--bg-white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 64px; }
        .logo { display: flex; align-items: center; gap: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.25rem; text-decoration: none; color: var(--text-dark); }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), #FF8A5C); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; }
        .nav-links { display: flex; gap: 0.5rem; }
        .nav-link { padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; color: var(--text-gray); font-weight: 500; transition: all 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        .page-header { margin-bottom: 2rem; text-align: center; }
        .page-title { font-family: 'Outfit', sans-serif; font-size: 2.5rem; font-weight: 900; margin-bottom: 0.5rem; background: linear-gradient(135deg, var(--primary), #FF8A5C); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .page-subtitle { color: var(--text-gray); font-size: 1.1rem; }
        
        .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: start; }
        @media (max-width: 900px) { .main-content { grid-template-columns: 1fr; } }
        
        /* 操作面板 */
        .control-panel { background: var(--bg-white); border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow); }
        .panel-title { font-weight: 600; font-size: 1.1rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        
        .btn-group { display: flex; flex-direction: column; gap: 0.75rem; }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 1rem 1.5rem; border: none; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.2s; text-decoration: none; }
        .btn-random { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-random:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4); }
        .btn-save { background: linear-gradient(135deg, var(--primary), #FF8A5C); color: white; }
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 107, 53, 0.4); }
        .btn-icon { font-size: 1.2rem; }
        
        .tips { margin-top: 1.5rem; padding: 1rem; background: linear-gradient(135deg, #f0f9ff, #e0f2fe); border-radius: 12px; border-left: 4px solid var(--secondary); }
        .tips-title { font-weight: 600; color: var(--secondary); margin-bottom: 0.5rem; }
        .tips-text { font-size: 0.9rem; color: var(--text-gray); line-height: 1.6; }
        
        /* 海报预览 */
        .preview-section { position: sticky; top: 80px; }
        .poster-container { background: var(--bg-white); border-radius: var(--radius); padding: 1rem; box-shadow: var(--shadow); }
        .poster-wrapper { width: 100%; aspect-ratio: 3/4; border-radius: 16px; overflow: hidden; position: relative; }
        
        /* 海报本体 - 各种样式 */
        .poster { width: 100%; height: 100%; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        
        /* 随机渐变背景 */
        .poster::before { content: ''; position: absolute; inset: 0; z-index: 0; }
        
        /* 布局1: 单图全屏 */
        .layout-single .poster-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        .layout-single .poster-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 2rem; z-index: 1; }
        
        /* 布局2: 双图并排 */
        .layout-dual { flex-direction: row; }
        .layout-dual .poster-img-container { flex: 1; position: relative; }
        .layout-dual .poster-img { width: 100%; height: 100%; object-fit: cover; }
        .layout-dual .poster-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 1.5rem; z-index: 1; }
        
        /* 布局3:  图上字下 */
        .layout-stack .poster-img-container { flex: 1; position: relative; }
        .layout-stack .poster-img { width: 100%; height: 70%; object-fit: cover; }
        .layout-stack .poster-content { flex: 0 0 30%; padding: 1.5rem; display: flex; flex-direction: column; justify-content: center; }
        
        /* 布局4: 大小图 */
        .layout-asymmetric { display: grid; grid-template-columns: 2fr 1fr; grid-template-rows: 1fr 1fr; }
        .layout-asymmetric .poster-img-container:nth-child(1) { grid-row: span 2; }
        .layout-asymmetric .poster-img { width: 100%; height: 100%; object-fit: cover; }
        .layout-asymmetric .poster-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 1.5rem; z-index: 1; }
        
        /* 内容样式 */
        .poster-title { font-family: 'Outfit', 'ZCOOL KuaiLe', 'Ma Shan Zheng', sans-serif; font-weight: 900; font-size: 2rem; text-shadow: 2px 2px 8px rgba(0,0,0,0.3); line-height: 1.3; }
        .poster-subtitle { font-size: 1rem; opacity: 0.9; margin-top: 0.5rem; text-shadow: 1px 1px 4px rgba(0,0,0,0.3); }
        .poster-logo { position: absolute; top: 1rem; right: 1rem; background: rgba(255,255,255,0.95); padding: 0.5rem 1rem; border-radius: 20px; font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.85rem; color: var(--text-dark); box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 2; }
        
        /* 装饰元素 */
        .poster-decoration { position: absolute; font-size: 3rem; opacity: 0.3; }
        .deco-1 { top: 10%; left: 10%; }
        .deco-2 { bottom: 20%; right: 10%; }
        
        /* 加载状态 */
        .loading-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; z-index: 10; }
        .loading-spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--text-dark); color: white; padding: 1rem 2rem; border-radius: 12px; font-weight: 500; z-index: 1000; opacity: 0; transition: all 0.3s; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>
    <nav></nav>

    <!-- 赞助商横条 -->
    <style>
    .sponsor-bar { background: linear-gradient(135deg, #1E293B 0%, #334155 100%); padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: center; gap: 1rem; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sponsor-label { font-size: 0.75rem; font-weight: 600; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 0.25rem; }
    .sponsor-label::before { content: "🤝"; }
    .sponsor-list { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .sponsor-item { display: flex; align-items: center; gap: 0.5rem; color: white; text-decoration: none; font-size: 0.9rem; font-weight: 500; padding: 0.4rem 0.75rem; border-radius: 6px; transition: all 0.2s; background: rgba(255,255,255,0.05); }
    .sponsor-item:hover { background: rgba(255,255,255,0.15); transform: translateY(-1px); }
    .sponsor-item.platinum { border-left: 3px solid #E5E4E2; }
    .sponsor-item.platinum .sponsor-tier { color: #E5E4E2; }
    .sponsor-item.gold { border-left: 3px solid #FFD700; }
    .sponsor-item.gold .sponsor-tier { color: #FFD700; }
    .sponsor-item.silver { border-left: 3px solid #C0C0C0; }
    .sponsor-item.silver .sponsor-tier { color: #C0C0C0; }
    .sponsor-logo { width: 24px; height: 24px; border-radius: 4px; object-fit: cover; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; }
    .sponsor-tier { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; opacity: 0.8; }
    .sponsor-empty { color: rgba(255,255,255,0.4); font-size: 0.85rem; }
    @media (max-width: 768px) { .sponsor-bar { padding: 0.6rem 1rem; } .sponsor-label { width: 100%; justify-content: center; margin-bottom: 0.5rem; } .sponsor-list { gap: 0.75rem; } .sponsor-item { font-size: 0.8rem; padding: 0.3rem 0.6rem; } }
    </style>
    <div class="sponsor-bar" id="sponsorBar">
        <div class="sponsor-label">赞助商</div>
        <div class="sponsor-list" id="sponsorList"><span class="sponsor-empty">加载中...</span></div>
    </div>
    <script>
    (function() {
        const API_BASE = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
        const TIER_ORDER = { 'platinum': 1, 'gold': 2, 'silver': 3 };
        async function loadSponsors() {
            try {
                const resp = await fetch(API_BASE + '/sponsors');
                const result = await resp.json();
                if (!result.ok || !result.data || result.data.length === 0) {
                    const homeResp = await fetch(API_BASE + '/');
                    const homeResult = await homeResp.json();
                    const sponsors = homeResult.data?.sponsors || [];
                    renderSponsors(sponsors);
                    return;
                }
                renderSponsors(result.data);
            } catch (e) { console.error('加载赞助商失败:', e); document.getElementById('sponsorList').innerHTML = '<span class="sponsor-empty">暂无赞助商</span>'; }
        }
        function renderSponsors(sponsors) {
            if (!sponsors || sponsors.length === 0) { document.getElementById('sponsorList').innerHTML = '<span class="sponsor-empty">暂无赞助商</span>'; return; }
            const sorted = [...sponsors].sort((a, b) => { const tierA = TIER_ORDER[a.tier?.toLowerCase()] || 99; const tierB = TIER_ORDER[b.tier?.toLowerCase()] || 99; return tierA - tierB; });
            const html = sorted.map(s => { const tier = (s.tier || 'silver').toLowerCase(); return `<a href="${s.website || '#'}" class="sponsor-item ${tier}" ${s.website ? 'target="_blank" rel="noopener"' : ''}><img class="sponsor-logo" src="${s.logo || ''}" alt="${s.name}" onerror="this.style.display='none'"><span>${s.name}</span><span class="sponsor-tier">${tier}</span></a>`; }).join('');
            document.getElementById('sponsorList').innerHTML = html;
        }
        loadSponsors();
    })();
    </script>

    <main class="container">
        <div class="page-header">
            <h1 class="page-title">🎲 随机海报生成器</h1>
            <p class="page-subtitle">点击按钮，每次都是独一无二的趣味海报！</p>
        </div>
        
        <div class="main-content">
            <!-- 操作面板 -->
            <div class="control-panel">
                <div class="panel-title">🎮 操作</div>
                <div class="btn-group">
                    <button class="btn btn-random" onclick="generateRandomPoster()">
                        <span class="btn-icon">🎲</span>
                        生成随机海报
                    </button>
                    <button class="btn btn-save" onclick="downloadPoster()">

                        保存为图片

                <div class="tips">
                    <div class="tips-title">💡 提示</div>
                    <div class="tips-text">
                        • 每次生成都会随机选择图片、配色、文案和布局<br>
                        • 点击"生成随机海报"可以重新生成<br>
                        • 点击"保存为图片"即可下载海报
                    </div>
                </div>
            </div>
            
            <!-- 预览区 -->
            <div class="preview-section">
                <div class="poster-container">
                    <div class="poster-wrapper">
                        <div class="poster" id="poster">
                            <div class="loading-overlay" id="loadingOverlay">
                                <div class="loading-spinner"></div>
                            </div>
                            <div class="poster-img-container" id="posterImages"></div>
                            <div class="poster-content" id="posterContent">
                                <div class="poster-logo">📷 兰星少年</div>
                                <div class="poster-title" id="posterTitle">点击生成海报</div>
                                <div class="poster-subtitle" id="posterSubtitle">让每一次都是惊喜！</div>
                            </div>
                            <div class="poster-decoration deco-1" id="deco1">⭐</div>
                            <div class="poster-decoration deco-2" id="deco2">🔥</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <script>
    const API_BASE = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
    let photos = [];
    let isGenerating = false;
    
    // 随机渐变背景色库
    const gradientPresets = [
        'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
        'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
        'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
        'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
        'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
        'linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)',
        'linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)',
        'linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)',
        'linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%)',
        'linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%)',
        'linear-gradient(135deg, #ff6b35 0%, #f7931e 100%)',
        'linear-gradient(135deg, #00b4d8 0%, #48c9b0 100%)',
    ];
    
    // 趣味文案库
    const textPresets = [
        { title: '🏆 冠军时刻', subtitle: '荣耀，属于坚持的我们' },
        { title: '⚡ 能量全开', subtitle: 'Ready to Battle!' },
        { title: '🎯 精准打击', subtitle: '每一发都命中目标' },
        { title: '🔥 火力全开', subtitle: '让对手颤抖吧！' },
        { title: '💪 战力爆表', subtitle: '超越极限的战斗' },
        { title: '🌟 星耀时刻', subtitle: '你是最亮的星' },
        { title: '🏃 速度与激情', subtitle: '快到飞起！' },
        { title: '🛡️ 铜墙铁壁', subtitle: '防守的艺术' },
        { title: '🎮 游戏人生', subtitle: '快乐最重要' },
        { title: '✨ 闪耀瞬间', subtitle: '绽放你的光芒' },
        { title: '🚀 起飞了', subtitle: '冲上云霄' },
        { title: '💥 爆炸输出', subtitle: '伤害拉满' },
        { title: '🏅 奖牌收割机', subtitle: '荣誉收割中' },
        { title: '🎪 马戏团之王', subtitle: '秀翻全场' },
        { title: '🌈 彩虹屁', subtitle: '今日份快乐' },
        { title: '🐼 熊猫出击', subtitle: '萌翻了！' },
        { title: '🦁 雄狮怒吼', subtitle: '王者降临' },
        { title: '🌊 海浪之力', subtitle: '势不可挡' },
        { title: '⚔️ 巅峰对决', subtitle: '强者之战' },
        { title: '🎪 欢乐派对', subtitle: '燥起来！' },
        { title: '💫 星光璀璨', subtitle: '你是最棒的！' },
        { title: '🏆 传奇诞生', subtitle: '书写你的故事' },
        { title: '🎯 一击必杀', subtitle: '准到没朋友' },
        { title: '🔥 燃起来了', subtitle: '热血沸腾' },
        { title: '🌙 夜间模式', subtitle: '越夜越精彩' },
    ];
    
    // 装饰emoji库
    const decorationEmojis = ['⭐', '🔥', '💥', '⚡', '🎯', '🏆', '💪', '🌟', '✨', '🎪', '🎭', '🎨', '🦁', '🐯', '🦅', '🐲'];
    
    // 字体库
    const fontFamilies = [
        "'Outfit', sans-serif",
        "'ZCOOL KuaiLe', cursive",
        "'Ma Shan Zheng', cursive",
        "'Noto Sans SC', sans-serif"
    ];
    
    // 布局类型
    const layoutTypes = ['layout-single', 'layout-dual', 'layout-stack', 'layout-asymmetric'];
    
    // 加载照片
    async function loadPhotos() {
        try {
            const res = await fetch(`${API_BASE}/gallery`);
            const data = await res.json();
            if (data.ok && data.data && data.data.length > 0) {
                photos = data.data;
                generateRandomPoster(); // 加载后自动生成
            } else {
                // 没有照片时使用占位图
                photos = [];
                generateWithPlaceholder();
            }
        } catch(e) {
            console.error('加载照片失败:', e);
            generateWithPlaceholder();
        }
    }
    
    function generateWithPlaceholder() {
        // 使用placeholder图片
        const placeholder = 'https://placehold.co/600x800/667eea/ffffff?text=📷+兰星少年';
        showPoster([placeholder]);
    }
    
    // 随机获取N张不重复的照片
    function getRandomPhotos(n) {
        if (photos.length === 0) {
            return Array(n).fill('https://placehold.co/600x800/667eea/ffffff?text=📷+兰星少年');
        }
        const shuffled = [...photos].sort(() => 0.5 - Math.random());
        return shuffled.slice(0, Math.min(n, photos.length)).map(p => p.cover);
    }
    
    // 显示海报
    function showPoster(imageUrls) {
        const poster = document.getElementById('poster');
        const imgContainer = document.getElementById('posterImages');
        
        // 随机布局
        const layout = layoutTypes[Math.floor(Math.random() * layoutTypes.length)];
        poster.className = `poster ${layout}`;
        
        // 随机背景
        const gradient = gradientPresets[Math.floor(Math.random() * gradientPresets.length)];
        poster.style.background = gradient;
        
        // 随机字体
        const font = fontFamilies[Math.floor(Math.random() * fontFamilies.length)];
        document.getElementById('posterTitle').style.fontFamily = font;
        
        // 随机文案
        const text = textPresets[Math.floor(Math.random() * textPresets.length)];
        document.getElementById('posterTitle').textContent = text.title;
        document.getElementById('posterSubtitle').textContent = text.subtitle;
        
        // 渲染图片
        let imgHtml = '';
        if (layout === 'layout-single') {
            imgHtml = `<img class="poster-img" src="${imageUrls[0]}" alt="海报图片">`;
        } else if (layout === 'layout-dual') {
            imgHtml = imageUrls.slice(0, 2).map(url => `<div class="poster-img-container"><img class="poster-img" src="${url}" alt=""></div>`).join('');
        } else if (layout === 'layout-stack') {
            imgHtml = `<div class="poster-img-container"><img class="poster-img" src="${imageUrls[0]}" alt=""></div>`;
        } else if (layout === 'layout-asymmetric') {
            imgHtml = imageUrls.slice(0, 3).map(url => `<div class="poster-img-container"><img class="poster-img" src="${url}" alt=""></div>`).join('');
        }
        imgContainer.innerHTML = imgHtml;
        
        // 随机装饰
        const deco1 = decorationEmojis[Math.floor(Math.random() * decorationEmojis.length)];
        const deco2 = decorationEmojis[Math.floor(Math.random() * decorationEmojis.length)];
        document.getElementById('deco1').textContent = deco1;
        document.getElementById('deco2').textContent = deco2;
        
        // 隐藏loading
        document.getElementById('loadingOverlay').style.display = 'none';
    }
    
    // 生成随机海报
    async function generateRandomPoster() {
        if (isGenerating) return;
        isGenerating = true;
        
        document.getElementById('loadingOverlay').style.display = 'flex';
        
        // 模拟一点延迟，让用户感觉在生成
        await new Promise(resolve => setTimeout(resolve, 300));
        
        // 随机选择1-3张图片
        const numImages = Math.floor(Math.random() * 3) + 1; // 1-3
        const selectedPhotos = getRandomPhotos(numImages);
        
        showPoster(selectedPhotos);
        
        isGenerating = false;
    }
    
    // 下载海报
    async function downloadPoster() {
        const poster = document.getElementById('poster');
        
        showToast('📸 正在生成图片...');
        
        try {
            const canvas = await html2canvas(poster, {
                scale: 2,
                backgroundColor: null,
                useCORS: true,
                allowTaint: true,
                logging: false
            });
            
            // 转换为blob并下载
            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `兰星少年海报_${Date.now()}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                showToast('✅ 海报保存成功！');
            }, 'image/png');
            
        } catch(e) {
            console.error('生成图片失败:', e);
            showToast('❌ 保存失败，请重试');
        }
    }
    
    // 显示提示
    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }
    
    // 初始化
    loadPhotos();
    </script>
    <script src="/components/nav-loader.js"></script>
</body>
