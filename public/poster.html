            inset: 0;
            width: 100%;

            filter: brightness(0.9) contrast(1.05);

            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);

            bottom: 0;
            left: 0;
            right: 0;
            padding: 2.5rem;
            z-index: 1;

            display: flex;
            flex-direction: column;
            justify-content: center;

            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;

            height: 100%;

    <style>

    @media (max-width: 768px) { .sponsor-bar { padding: 0.6rem 1rem; } .sponsor-label { width: 100%; justify-content: center; margin-bottom: 0.5rem; } .sponsor-list { gap: 0.75rem; } .sponsor-item { font-size: 0.8rem; padding: 0.3rem 0.6rem; } }

    <div class="sponsor-bar" id="sponsorBar">

    </div>
    <script>
    (function() {
        const API_BASE = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
        const TIER_ORDER = { 'platinum': 1, 'gold': 2, 'silver': 3 };
        async function loadSponsors() {
            try {
                const resp = await fetch(API_BASE + '/sponsors');
                const result = await resp.json();
                if (!result.ok || !result.data || result.data.length === 0) {
                    const homeResp = await fetch(API_BASE + '/');
                    const homeResult = await homeResp.json();
                    const sponsors = homeResult.data?.sponsors || [];
                    renderSponsors(sponsors);
                    return;
                }
                renderSponsors(result.data);
            } catch (e) { console.error('加载赞助商失败:', e); document.getElementById('sponsorList').innerHTML = '<span class="sponsor-empty">暂无赞助商</span>'; }
        }
        function renderSponsors(sponsors) {
            if (!sponsors || sponsors.length === 0) { document.getElementById('sponsorList').innerHTML = '<span class="sponsor-empty">暂无赞助商</span>'; return; }
            const sorted = [...sponsors].sort((a, b) => { const tierA = TIER_ORDER[a.tier?.toLowerCase()] || 99; const tierB = TIER_ORDER[b.tier?.toLowerCase()] || 99; return tierA - tierB; });
            const html = sorted.map(s => { const tier = (s.tier || 'silver').toLowerCase(); return `<a href="${s.website || '#'}" class="sponsor-item ${tier}" ${s.website ? 'target="_blank" rel="noopener"' : ''}><img class="sponsor-logo" src="${s.logo || ''}" alt="${s.name}" onerror="this.style.display='none'"><span>${s.name}</span><span class="sponsor-tier">${tier}</span></a>`; }).join('');
            document.getElementById('sponsorList').innerHTML = html;
        }
        loadSponsors();
    })();
    </script>

        { title: '💙 兰星精神', subtitle: '蓝色星辰，无限可能' }
    ];
    
    // HADO相关高级文案
    const textPresets = [
        // 战斗主题
        { title: '⚔️ 巅峰对决', subtitle: '狭路相逢，勇者胜' },
        { title: '🏆 冠军之路', subtitle: '每一步都是荣耀' },

        // 团队精神
        { title: '🤝 团队协作', subtitle: '1+1>2 的力量' },

        { title: '🏅 荣誉时刻', subtitle: '记录每一次辉煌' },

    // 标签选项
    const tagOptions = ['HADO', '兰星少年', '战斗', '冠军', '荣耀', '团队', '热血', '未来', 'AR运动', '新星'];
    
    // 加载照片
    // ⚠️ 修复记录(2026-03-24): 之前for循环串行请求每张照片的tags导致17秒加载
    // 修复: 首屏只加载标签列表，不加载每张照片的tags，改为selectTag时按需预加载
    async function loadPhotos() {
        try {
            // 并行加载照片和标签列表
            const [photoRes, tagsRes] = await Promise.all([
                fetch(`${API_BASE}/gallery`),
                fetch(`${API_BASE}/tags`)
            ]);
            
            const photoData = await photoRes.json();
            const tagsData = await tagsRes.json();
            
            if (photoData.ok && photoData.data && photoData.data.length > 0) {
                photos = photoData.data;
                
                // 只加载标签列表，不加载每张照片的标签（按需加载）
                allTags = tagsData.data || [];
                
                // 渲染标签选择器
                renderTagSelector();
                
                generateRandomPoster();
            } else {
                photos = [];
                generateWithPlaceholder();
            }
        } catch(e) {
            console.error('加载失败:', e);
            generateWithPlaceholder();
        }
    }
    
    // 渲染标签选择器
    function renderTagSelector() {
        const container = document.getElementById('tagOptions');
        
        // "全部"选项
        let html = `<span class="tag-option all active" onclick="selectTag(null)">全部</span>`;
        
        // 标签选项
        allTags.forEach(tag => {
            html += `<span class="tag-option" style="background: ${tag.color}" onclick="selectTag(${tag.id})">${tag.name}</span>`;
        });
        
        container.innerHTML = html;
    }
    
    // 按需加载单张照片的标签
    async function loadPhotoTags(photoId) {
        if (photoTagsMap[photoId]) return photoTagsMap[photoId];
        try {
            const res = await fetch(`${API_BASE}/photo/${photoId}/tags`);
            const data = await res.json();
            photoTagsMap[photoId] = data.data || [];
        } catch (e) {
            photoTagsMap[photoId] = [];
        }
        return photoTagsMap[photoId];
    }
    
    // 批量预加载指定照片的标签（用于筛选）
    async function preloadPhotoTags(photoIds) {
        const promises = photoIds.map(id => loadPhotoTags(id));
        await Promise.all(promises);
    }
    
    function getFilteredPhotos() {
        if (!selectedTagId) {
            return photos;
        }
        // 返回有该标签的照片
        return photos.filter(p => {
            const tags = photoTagsMap[p.id] || [];
            return tags.some(t => t.id === selectedTagId);
        });
    }
    
    // 选择标签时预加载相关照片的标签
    function selectTag(tagId) {
        selectedTagId = tagId;
        
        // 更新UI
        document.querySelectorAll('.tag-option').forEach(el => el.classList.remove('active'));
        if (tagId === null) {
            document.querySelector('.tag-option.all').classList.add('active');
        } else {
            const tag = allTags.find(t => t.id === tagId);
            if (tag) {
                const options = document.querySelectorAll('.tag-option');
                options.forEach(el => {
                    if (el.textContent === tag.name) el.classList.add('active');
                });
            }
        }
        
        // 预加载所有照片的标签（后台并行）
        if (tagId !== null) {
            preloadPhotoTags(photos.map(p => p.id));
        }
        
        // 重新生成海报
        generateRandomPoster();
    }
    
    function generateWithPlaceholder() {
        const placeholder = 'https://placehold.co/600x800/1a1a2e/ffffff?text=HADO';
        showPoster(placeholder);
    }
    
    // 随机获取一张高质量照片（考虑标签筛选）
    function getRandomPhoto() {
        const filtered = getFilteredPhotos();
        if (filtered.length === 0) {
            // 如果筛选后没有照片，回退到全部
            if (photos.length === 0) {
                return 'https://placehold.co/600x800/1a1a2e/ffffff?text=HADO';
            }
            const shuffled = [...photos].sort(() => 0.5 - Math.random());
            return shuffled[0].full_url || shuffled[0].cover;
        }
        const shuffled = [...filtered].sort(() => 0.5 - Math.random());
        return shuffled[0].full_url || shuffled[0].cover;
    }
    
    // 显示海报
    function showPoster(imageUrl, style = null) {
        const poster = document.getElementById('poster');
        
        // 默认样式
        const defaultStyle = {
            bgGradient: 'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)',
            textPreset: defaultTextPreset
        };
        const currentStyle = style || defaultStyle;
        
        // 随机选择布局
        const layout = layoutTypes[Math.floor(Math.random() * layoutTypes.length)];
        
        // 重置类名
        poster.className = 'poster ' + layout;
        
        // 设置背景渐变
        const bgEl = poster.querySelector('.poster-bg');
        if (bgEl) {
            bgEl.style.background = currentStyle.bgGradient;
        }
        
        // 根据布局调整元素显示
        if (layout === 'layout-magazine') {
            // 杂志风：图片在上半部分
            poster.innerHTML = `
                <div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>
                <div class="poster-bg" style="background: ${currentStyle.bgGradient}"></div>
                <div class="poster-img-wrap"><img class="poster-main-img" id="posterImg" src="${imageUrl}" alt=""></div>
                <div class="poster-content">
                    <div class="poster-brand"><div class="poster-brand-icon">🎯</div><span class="poster-brand-text">兰星少年</span></div>
                    <div class="accent-line"></div>
                    <div class="poster-headline" id="posterTitle"></div>
                    <div class="poster-sub" id="posterSubtitle"></div>
                </div>
            `;
        } else if (layout === 'layout-collage') {
            // 拼贴风：2x2网格
            const imgs = getCollageImages(imageUrl);
            poster.innerHTML = `
                <div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>
                <div class="poster-bg" style="background: ${currentStyle.bgGradient}"></div>
                <div class="poster-img-wrap"><img class="poster-main-img" src="${imgs[0]}" alt=""></div>
                <div class="poster-img-wrap"><img class="poster-main-img" src="${imgs[1]}" alt=""></div>
                <div class="poster-img-wrap"><img class="poster-main-img" src="${imgs[2]}" alt=""></div>
                <div class="poster-content">
                    <div class="poster-brand"><div class="poster-brand-icon">🎯</div><span class="poster-brand-text">兰星少年</span></div>
                    <div class="accent-line"></div>
                    <div class="poster-headline" id="posterTitle"></div>
                    <div class="poster-sub" id="posterSubtitle"></div>
                </div>
            `;
        } else if (layout === 'layout-minimal') {
            // 简洁风
            poster.innerHTML = `
                <div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>
                <div class="poster-bg" style="background: ${currentStyle.bgGradient}"></div>
                <img class="poster-main-img" id="posterImg" src="${imageUrl}" alt="">
                <div class="poster-overlay" id="posterOverlay"></div>
                <div class="poster-brand"><div class="poster-brand-icon">🎯</div><span class="poster-brand-text">兰星少年</span></div>
                <div class="poster-tag" id="posterTag">HADO</div>
                <div class="poster-content">
                    <div class="accent-line"></div>
                    <div class="poster-headline" id="posterTitle"></div>
                    <div class="poster-sub" id="posterSubtitle"></div>
                </div>
            `;
        } else {
            // cinema / darkfilm - 需要设置背景
            const overlay = document.getElementById('posterOverlay');
            overlay.style.display = (layout === 'layout-cinema') ? 'block' : 'none';
            
            // 设置背景元素
            let bgElement = poster.querySelector('.poster-bg');
            if (!bgElement) {
                bgElement = document.createElement('div');
                bgElement.className = 'poster-bg';
                poster.insertBefore(bgElement, poster.firstChild);
            }
            bgElement.style.background = currentStyle.bgGradient;
        }
        
        // 使用标签对应的文案（如果没有则用默认）
        const textPreset = currentStyle.textPreset || defaultTextPreset;
        const text = textPreset[Math.floor(Math.random() * textPreset.length)];
        
        // 获取title元素（可能在新的innerHTML中）
        const titleEl = document.getElementById('posterTitle');
        const subtitleEl = document.getElementById('posterSubtitle');
        const tagEl = document.getElementById('posterTag');
        
        if (titleEl) titleEl.textContent = text.title;
        if (subtitleEl) subtitleEl.textContent = text.subtitle;
        
        // 标签显示选中的标签名
        if (tagEl) {
            if (selectedTagId) {
                const tag = allTags.find(t => t.id === selectedTagId);
                tagEl.textContent = tag ? tag.name : 'HADO';
            } else {
                tagEl.textContent = tagOptions[Math.floor(Math.random() * tagOptions.length)];
            }
        }
        
        // 隐藏loading
        const loading = document.getElementById('loadingOverlay');
        if (loading) loading.style.display = 'none';
    }
    
    // 获取拼贴图片
    function getCollageImages(mainImg) {
        if (photos.length < 3) {
            return [mainImg, mainImg, mainImg];
        }
        const shuffled = [...photos].sort(() => 0.5 - Math.random());
        return [
            shuffled[0]?.full_url || mainImg,
            shuffled[1]?.full_url || mainImg,
            shuffled[2]?.full_url || mainImg
        ];
    }
    
    // 生成随机海报
    async function generateRandomPoster() {
        if (isGenerating) return;
        isGenerating = true;
        
        const loading = document.getElementById('loadingOverlay');
        if (loading) loading.style.display = 'flex';
        
        await new Promise(resolve => setTimeout(resolve, 300));
        
        const photo = getRandomPhoto();
        
        // 根据标签获取配色和文案
        const currentStyle = selectedTagId && tagStyles[selectedTagId] 
            ? tagStyles[selectedTagId] 
            : { 
                bgGradient: 'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)',
                textPreset: defaultTextPreset
              };
        
        showPoster(photo, currentStyle);
        
        isGenerating = false;
    }
    
    // 下载海报
    async function downloadPoster() {
        const poster = document.getElementById('poster');
        
        showToast('📸 正在生成图片...');
        
        try {
            const canvas = await html2canvas(poster, {
                scale: 3,
                backgroundColor: null,
                useCORS: true,
                allowTaint: true,
                logging: false
            });
            
            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `兰星少年海报_${Date.now()}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                showToast('✅ 海报保存成功！');
            }, 'image/png');
            
        } catch(e) {
            console.error('生成图片失败:', e);
            showToast('❌ 保存失败，请重试');
        }
    }
    
    // 显示提示
    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }
    
    // 初始化
    loadPhotos();
