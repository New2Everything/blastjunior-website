<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兰星少年 HADO 俱乐部</title>
    <!-- DATA_MODULE: i18n -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B35; --secondary: #00B4D8; --bg-light: #F8FAFC; --bg-white: #FFFFFF; --text-dark: #1E293B; --text-gray: #64748B; --border: #E2E8F0; --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', 'Noto Sans JP', 'Noto Sans', sans-serif; background: var(--bg-light); color: var(--text-dark); }
        
        /* 语言切换 */
        .lang-switch { position: fixed; top: 1rem; right: 1rem; z-index: 1000; display: flex; gap: 0.5rem; background: var(--bg-white); padding: 0.5rem; border-radius: 8px; box-shadow: var(--shadow); }
        .lang-btn { padding: 0.4rem 0.8rem; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; transition: all 0.2s; background: transparent; color: var(--text-gray); }
        .lang-btn.active { background: var(--primary); color: white; }
        
        nav { background: var(--bg-white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 64px; }
        .logo { display: flex; align-items: center; gap: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.25rem; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), #FF8A5C); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; }
        .nav-links { display: flex; gap: 0.5rem; }
        .nav-link { padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; color: var(--text-gray); font-weight: 500; transition: all 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        
        .page-header { text-align: center; padding: 3rem 1rem; }
        .page-title { font-family: 'Outfit', sans-serif; font-size: 2.5rem; font-weight: 900; margin-bottom: 0.5rem; }
        .page-subtitle { color: var(--text-gray); font-size: 1.1rem; }
        
        /* 语言内容卡片 */
        .lang-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
        .lang-card { background: var(--bg-white); border-radius: var(--radius); padding: 2rem; box-shadow: var(--shadow); text-align: center; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
        .lang-card:hover { transform: translateY(-4px); border-color: var(--primary); }
        .lang-card.active { border-color: var(--primary); background: linear-gradient(135deg, #fff5f2, #fff); }
        .lang-flag { font-size: 3rem; margin-bottom: 1rem; }
        .lang-name { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        .lang-native { color: var(--text-gray); }
    </style>
</head>
<body>
    <!-- 语言切换器 -->
    <div class="lang-switch">
        <button class="lang-btn active" onclick="setLang('zh')">中文</button>
        <button class="lang-btn" onclick="setLang('en')">English</button>
        <button class="lang-btn" onclick="setLang('ja')">日本語</button>
    </div>

    <nav></nav>

    <!-- 赞助商横条 -->
    <style>
    .sponsor-bar { background: linear-gradient(135deg, #1E293B 0%, #334155 100%); padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: center; gap: 1rem; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sponsor-label { font-size: 0.75rem; font-weight: 600; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 0.25rem; }
    .sponsor-label::before { content: "🤝"; }
    .sponsor-list { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .sponsor-item { display: flex; align-items: center; gap: 0.5rem; color: white; text-decoration: none; font-size: 0.9rem; font-weight: 500; padding: 0.4rem 0.75rem; border-radius: 6px; transition: all 0.2s; background: rgba(255,255,255,0.05); }
    .sponsor-item:hover { background: rgba(255,255,255,0.15); transform: translateY(-1px); }
    .sponsor-item.platinum { border-left: 3px solid #E5E4E2; }
    .sponsor-item.platinum .sponsor-tier { color: #E5E4E2; }
    .sponsor-item.gold { border-left: 3px solid #FFD700; }
    .sponsor-item.gold .sponsor-tier { color: #FFD700; }
    .sponsor-item.silver { border-left: 3px solid #C0C0C0; }
    .sponsor-item.silver .sponsor-tier { color: #C0C0C0; }
    .sponsor-logo { width: 24px; height: 24px; border-radius: 4px; object-fit: cover; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; }
    .sponsor-tier { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; opacity: 0.8; }
    .sponsor-empty { color: rgba(255,255,255,0.4); font-size: 0.85rem; }
    @media (max-width: 768px) { .sponsor-bar { padding: 0.6rem 1rem; } .sponsor-label { width: 100%; justify-content: center; margin-bottom: 0.5rem; } .sponsor-list { gap: 0.75rem; } .sponsor-item { font-size: 0.8rem; padding: 0.3rem 0.6rem; } }
    </style>
    <div class="sponsor-bar" id="sponsorBar">
        <div class="sponsor-label">赞助商</div>
        <div class="sponsor-list" id="sponsorList"><span class="sponsor-empty">加载中...</span></div>
    </div>
    <script>
    (function() {
        const API_BASE = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
        const TIER_ORDER = { 'platinum': 1, 'gold': 2, 'silver': 3 };
        async function loadSponsors() {
            try {
                const resp = await fetch(API_BASE + '/sponsors');
                const result = await resp.json();
                if (!result.ok || !result.data || result.data.length === 0) {
                    const homeResp = await fetch(API_BASE + '/');
                    const homeResult = await homeResp.json();
                    const sponsors = homeResult.data?.sponsors || [];
                    renderSponsors(sponsors);
                    return;
                }
                renderSponsors(result.data);
            } catch (e) { console.error('加载赞助商失败:', e); document.getElementById('sponsorList').innerHTML = '<span class="sponsor-empty">暂无赞助商</span>'; }
        }
        function renderSponsors(sponsors) {
            if (!sponsors || sponsors.length === 0) { document.getElementById('sponsorList').innerHTML = '<span class="sponsor-empty">暂无赞助商</span>'; return; }
            const sorted = [...sponsors].sort((a, b) => { const tierA = TIER_ORDER[a.tier?.toLowerCase()] || 99; const tierB = TIER_ORDER[b.tier?.toLowerCase()] || 99; return tierA - tierB; });
            const html = sorted.map(s => { const tier = (s.tier || 'silver').toLowerCase(); return `<a href="${s.website || '#'}" class="sponsor-item ${tier}" ${s.website ? 'target="_blank" rel="noopener"' : ''}><img class="sponsor-logo" src="${s.logo || ''}" alt="${s.name}" onerror="this.style.display='none'"><span>${s.name}</span><span class="sponsor-tier">${tier}</span></a>`; }).join('');
            document.getElementById('sponsorList').innerHTML = html;
        }
        loadSponsors();
    })();
    </script>

    <main

    <main class="container">
        <div class="page-header">
            <h1 class="page-title" data-i18n="welcome">欢迎来到</h1>
            <p class="page-subtitle" data-i18n="subtitle">HADO 青少年俱乐部</p>
        </div>
        
        <div class="lang-grid">
            <div class="lang-card active" onclick="setLang('zh')">
                <div class="lang-flag">🇨🇳</div>
                <div class="lang-name">中文</div>
                <div class="lang-native">简体中文</div>
            </div>
            <div class="lang-card" onclick="setLang('en')">
                <div class="lang-flag">🇺🇸</div>
                <div class="lang-name">English</div>
                <div class="lang-native">English</div>
            </div>
            <div class="lang-card" onclick="setLang('ja')">
                <div class="lang-flag">🇯🇵</div>
                <div class="lang-name">日本語</div>
                <div class="lang-native">日本語</div>
            </div>
        </div>
    </main>

    <script>
    const translations = {
        zh: {
            club_name: '兰星少年',
            nav_home: '首页',
            nav_matches: '赛程',
            nav_standings: '积分榜',
            nav_teams: '战队',
            nav_players: '选手',
            nav_gallery: '画廊',
            nav_join: '加入',
            welcome: '欢迎来到',
            subtitle: 'HADO 青少年俱乐部'
        },
        en: {
            club_name: 'Lanxing Junior',
            nav_home: 'Home',
            nav_matches: 'Matches',
            nav_standings: 'Standings',
            nav_teams: 'Teams',
            nav_players: 'Players',
            nav_gallery: 'Gallery',
            nav_join: 'Join',
            welcome: 'Welcome to',
            subtitle: 'HADO Junior Club'
        },
        ja: {
            club_name: '蘭星ジュニア',
            nav_home: 'ホーム',
            nav_matches: 'マッチ',
            nav_standings: '順位',
            nav_teams: 'チーム',
            nav_players: 'プレイヤー',
            nav_gallery: 'ギャラリー',
            nav_join: '参加',
            welcome: 'ようこそ',
            subtitle: 'HADO ジュニアクラブ'
        }
    };
    
    function setLang(lang) {
        // 保存语言
        localStorage.setItem('lang', lang);
        
        // 更新按钮
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.lang-card').forEach(card => card.classList.remove('active'));
        
        // 找到对应按钮并激活
        const btns = document.querySelectorAll('.lang-btn');
        const cards = document.querySelectorAll('.lang-card');
        if (lang === 'zh') { btns[0].classList.add('active'); cards[0].classList.add('active'); }
        else if (lang === 'en') { btns[1].classList.add('active'); cards[1].classList.add('active'); }
        else if (lang === 'ja') { btns[2].classList.add('active'); cards[2].classList.add('active'); }
        
        // 更新文本
        const t = translations[lang];
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (t[key]) el.textContent = t[key];
        });
    }
    
    // 初始化
    const savedLang = localStorage.getItem('lang') || 'zh';
    setLang(savedLang);
    </script>
    <script src="/components/nav-loader.js"></script>
</body>
</html>
