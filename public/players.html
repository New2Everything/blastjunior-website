<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>选手 - 兰星少年 HADO 俱乐部</title>
  <meta name="description" content="兰星少年 HADO 俱乐部选手介绍">
  <link rel="icon" href="/logo.jpg" type="image/jpeg">
  <meta name="theme-color" content="#0055D4">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/components/nav-loader.js"></script>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1 class="page-title">🏅 选手</h1>
      <p class="page-subtitle">俱乐部旗下优秀选手</p>
    </div>

    <div class="section">
      <div class="cards-grid" id="playersGrid">
        <div class="card" style="text-align:center;color:var(--text-gray);"><span class="spinner"></span>加载中</div>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://blast-homepage-api.kanjiaming2022.workers.dev';

    async function loadPlayers() {
      try {
        const res = await fetch(API + '/players');
        const result = await res.json();
        renderPlayers(result.data || []);
      } catch (e) {
        document.getElementById('playersGrid').innerHTML = '<div class="error-state" style="grid-column:1/-1;">加载失败</div>';
      }
    }

    function renderPlayers(players) {
      const grid = document.getElementById('playersGrid');
      if (!players.length) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">🏅</div><div>暂无选手</div></div>';
        return;
      }
      grid.innerHTML = players.map(p => `
        <a href="/player-detail.html?id=${p.id || p.player_id}" class="card" style="display:block;text-decoration:none;color:inherit;text-align:center;padding:1.5rem;">
          <div style="width:72px;height:72px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:50%;margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;font-size:2rem;color:white;">🏅</div>
          <h3 style="font-weight:700;font-size:1.1rem;">${p.name || p.nickname || p.player_name || ''}</h3>
          ${p.title ? `<div style="font-size:0.85rem;color:var(--primary);margin-top:0.25rem;">${p.title}</div>` : ''}
          ${p.goals !== undefined ? `<div style="font-size:0.8rem;color:var(--text-gray);margin-top:0.5rem;">进球: ${p.goals} | 助攻: ${p.assists || 0}</div>` : ''}
        </a>
      `).join('');
    }

    loadPlayers();
  </script>
</body>
</html>
