<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>徽章中心 - 兰星少年 HADO 俱乐部</title>
    <!-- DATA_MODULE: badges -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B35; --secondary: #00B4D8; --bg-light: #F8FAFC; --bg-white: #FFFFFF; --text-dark: #1E293B; --text-gray: #64748B; --border: #E2E8F0; --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px; --gold: #FFD700; --silver: #C0C0C0; --bronze: #CD7F32; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-light); color: var(--text-dark); }
        nav { background: var(--bg-white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; align justify-content: space-items: center;-between; padding: 0 1.5rem; height: 64px; }
        .logo { display: flex; align-items: center; gap: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.25rem; text-decoration: none; color: var(--text-dark); }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), #FF8A5C); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; }
        .nav-links { display: flex; gap: 0.5rem; }
        .nav-link { padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; color: var(--text-gray); font-weight: 500; transition: all 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 1.5rem; }
        .page-header { text-align: center; margin-bottom: 2rem; }
        .page-title { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 900; margin-bottom: 0.5rem; }
        
        /* 用户进度 */
        .user-progress { background: linear-gradient(135deg, var(--primary), #FF8A5C); border-radius: var(--radius); padding: 1.5rem; color: white; margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .progress-info h2 { font-family: 'Outfit', sans-serif; font-size: 1.5rem; margin-bottom: 0.25rem; }
        .progress-stats { display: flex; gap: 2rem; }
        .progress-stat { text-align: center; }
        .progress-stat-value { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 700; }
        .progress-stat-label { font-size: 0.85rem; opacity: 0.9; }
        
        /* 徽章分类 */
        .badge-section { margin-bottom: 2rem; }
        .section-title { font-family: 'Outfit', sans-serif; font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        
        .badge-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; }
        .badge-card { background: var(--bg-white); border-radius: var(--radius); padding: 1rem; text-align: center; box-shadow: var(--shadow); transition: all 0.2s; }
        .badge-card:hover { transform: translateY(-4px); }
        .badge-card.locked { opacity: 0.5; }
        
        .badge-icon { width: 60px; height: 60px; margin: 0 auto 0.5rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .badge-icon.gold { background: linear-gradient(135deg, #FFD700, #FFA500); }
        .badge-icon.silver { background: linear-gradient(135deg, #C0C0C0, #A0A0A0); }
        .badge-icon.bronze { background: linear-gradient(135deg, #CD7F32, #B87333); }
        .badge-icon.default { background: var(--border); }
        
        .badge-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.25rem; }
        .badge-desc { font-size: 0.75rem; color: var(--text-gray); }
        .badge-status { margin-top: 0.5rem; font-size: 0.75rem; padding: 0.25rem 0.5rem; border-radius: 4px; }
        .badge-status.earned { background: #dcfce7; color: #166534; }
        .badge-status.locked { background: #f1f5f9; color: #64748B; }
    </style>
</head>
<body>
    <nav></nav>

    <!-- 赞助商横条 -->
    <style>
    .sponsor-bar { background: linear-gradient(135deg, #1E293B 0%, #334155 100%); padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: center; gap: 1rem; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sponsor-label { font-size: 0.75rem; font-weight: 600; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 0.25rem; }
    .sponsor-label::before { content: "🤝"; }
    .sponsor-list { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .sponsor-item { display: flex; align-items: center; gap: 0.5rem; color: white; text-decoration: none; font-size: 0.9rem; font-weight: 500; padding: 0.4rem 0.75rem; border-radius: 6px; transition: all 0.2s; background: rgba(255,255,255,0.05); }
    .sponsor-item:hover { background: rgba(255,255,255,0.15); transform: translateY(-1px); }
    .sponsor-item.platinum { border-left: 3px solid #E5E4E2; }
    .sponsor-item.platinum .sponsor-tier { color: #E5E4E2; }
    .sponsor-item.gold { border-left: 3px solid #FFD700; }
    .sponsor-item.gold .sponsor-tier { color: #FFD700; }
    .sponsor-item.silver { border-left: 3px solid #C0C0C0; }
    .sponsor-item.silver .sponsor-tier { color: #C0C0C0; }
    .sponsor-logo { width: 24px; height: 24px; border-radius: 4px; object-fit: cover; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; }
    .sponsor-tier { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; opacity: 0.8; }
    .sponsor-empty { color: rgba(255,255,255,0.4); font-size: 0.85rem; }
    @media (max-width: 768px) { .sponsor-bar { padding: 0.6rem 1rem; } .sponsor-label { width: 100%; justify-content: center; margin-bottom: 0.5rem; } .sponsor-list { gap: 0.75rem; } .sponsor-item { font-size: 0.8rem; padding: 0.3rem 0.6rem; } }
    </style>
    <div class="sponsor-bar" id="sponsorBar">
        <div class="sponsor-label">赞助商</div>
        <div class="sponsor-list" id="sponsorList"><span class="sponsor-empty">加载中...</span></div>
    </div>
    <script>
    (function() {
        const API_BASE = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
        const TIER_ORDER = { 'platinum': 1, 'gold': 2, 'silver': 3 };
        async function loadSponsors() {
            try {
                const resp = await fetch(API_BASE + '/sponsors');
                const result = await resp.json();
                if (!result.ok || !result.data || result.data.length === 0) {
                    const homeResp = await fetch(API_BASE + '/');
                    const homeResult = await homeResp.json();
                    const sponsors = homeResult.data?.sponsors || [];
                    renderSponsors(sponsors);
                    return;
                }
                renderSponsors(result.data);
            } catch (e) { console.error('加载赞助商失败:', e); document.getElementById('sponsorList').innerHTML = '<span class="sponsor-empty">暂无赞助商</span>'; }
        }
        function renderSponsors(sponsors) {
            if (!sponsors || sponsors.length === 0) { document.getElementById('sponsorList').innerHTML = '<span class="sponsor-empty">暂无赞助商</span>'; return; }
            const sorted = [...sponsors].sort((a, b) => { const tierA = TIER_ORDER[a.tier?.toLowerCase()] || 99; const tierB = TIER_ORDER[b.tier?.toLowerCase()] || 99; return tierA - tierB; });
            const html = sorted.map(s => { const tier = (s.tier || 'silver').toLowerCase(); return `<a href="${s.website || '#'}" class="sponsor-item ${tier}" ${s.website ? 'target="_blank" rel="noopener"' : ''}><img class="sponsor-logo" src="${s.logo || ''}" alt="${s.name}" onerror="this.style.display='none'"><span>${s.name}</span><span class="sponsor-tier">${tier}</span></a>`; }).join('');
            document.getElementById('sponsorList').innerHTML = html;
        }
        loadSponsors();
    })();
    </script>

    <main

    <main class="container">
        <div class="page-header">
            <h1 class="page-title">🎖️ 徽章中心</h1>
            <p style="color: var(--text-gray);">完成挑战，解锁徽章</p>
        </div>
        
        <!-- 用户进度 -->
        <div class="user-progress">
            <div class="progress-info">
                <h2>你的徽章</h2>
                <p>继续加油，解锁更多徽章！</p>
            </div>
            <div class="progress-stats">
                <div class="progress-stat">
                    <div class="progress-stat-value" id="earnedCount">3</div>
                    <div class="progress-stat-label">已获得</div>
                </div>
                <div class="progress-stat">
                    <div class="progress-stat-value" id="totalCount">12</div>
                    <div class="progress-stat-label">总徽章</div>
                </div>
            </div>
        </div>
        
        <!-- 首胜徽章 -->
        <div class="badge-section">
            <div class="section-title">🏆 比赛成就</div>
            <div class="badge-grid">
                <div class="badge-card">
                    <div class="badge-icon gold">🥇</div>
                    <div class="badge-name">首胜</div>
                    <div class="badge-desc">获得第一场胜利</div>
                    <div class="badge-status earned">已获得</div>
                </div>
                <div class="badge-card">
                    <div class="badge-icon gold">🔥</div>
                    <div class="badge-name">三连胜</div>
                    <div class="badge-desc">连续获得3场胜利</div>
                    <div class="badge-status earned">已获得</div>
                </div>
                <div class="badge-card">
                    <div class="badge-icon gold">⚡</div>
                    <div class="badge-name">五连胜</div>
                    <div class="badge-desc">连续获得5场胜利</div>
                    <div class="badge-status locked">未获得</div>
                </div>
                <div class="badge-card">
                    <div class="badge-icon silver">👑</div>
                    <div class="badge-name">冠军</div>
                    <div class="badge-desc">获得赛事冠军</div>
                    <div class="badge-status earned">已获得</div>
                </div>
            </div>
        </div>
        
        <!-- 训练徽章 -->
        <div class="badge-section">
            <div class="section-title">🎯 训练成就</div>
            <div class="badge-grid">
                <div class="badge-card">
                    <div class="badge-icon bronze">💪</div>
                    <div class="badge-name">首次训练</div>
                    <div class="badge-desc">完成第一次训练</div>
                    <div class="badge-status earned">已获得</div>
                </div>
                <div class="badge-card">
                    <div class="badge-icon bronze">📅</div>
                    <div class="badge-name">坚持不懈</div>
                    <div class="badge-desc">连续7天训练</div>
                    <div class="badge-status locked">未获得</div>
                </div>
                <div class="badge-card">
                    <div class="badge-icon silver">🏃</div>
                    <div class="badge-name">训练达人</div>
                    <div class="badge-desc">完成30次训练</div>
                    <div class="badge-status locked">未获得</div>
                </div>
            </div>
        </div>
        
        <!-- 里程碑徽章 -->
        <div class="badge-section">
            <div class="section-title">⭐ 里程碑</div>
            <div class="badge-grid">
                <div class="badge-card">
                    <div class="badge-icon default">🌟</div>
                    <div class="badge-name">新星</div>
                    <div class="badge-desc">注册成为会员</div>
                    <div class="badge-status earned">已获得</div>
                </div>
                <div class="badge-card">
                    <div class="badge-icon bronze">📷</div>
                    <div class="badge-name">摄影师</div>
                    <div class="badge-desc">上传第一张照片</div>
                    <div class="badge-status locked">未获得</div>
                </div>
                <div class="badge-card">
                    <div class="badge-icon silver">🤝</div>
                    <div class="badge-name">社交达人</div>
                    <div class="badge-desc">分享10次</div>
                    <div class="badge-status locked">未获得</div>
                </div>
                <div class="badge-card">
                    <div class="badge-icon gold">🎖️</div>
                    <div class="badge-name">全成就</div>
                    <div class="badge-desc">解锁所有徽章</div>
                    <div class="badge-status locked">未获得</div>
                </div>
            </div>
        </div>
    </main>
    <script src="/components/nav-loader.js"></script>
</body>
</html>
