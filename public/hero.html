<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英雄详情 - 兰星少年 HADO 俱乐部</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B35; --primary-light: #FF8A5C; --secondary: #00B4D8; --bg-light: #F8FAFC; --bg-white: #FFFFFF; --text-dark: #1E293B; --text-gray: #64748B; --border: #E2E8F0; --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-light); color: var(--text-dark); }
        
        /* Hero Type Colors */
        .type-tank { --type-color: #00B4D8; --type-bg: rgba(0,180,216,0.15); }
        .type-healer { --type-color: #10B981; --type-bg: rgba(16,185,129,0.15); }
        .type-curse { --type-color: #8B5CF6; --type-bg: rgba(139,92,246,0.15); }
        .type-buff { --type-color: #FF6B35; --type-bg: rgba(255,107,53,0.15); }
        .type-pierce { --type-color: #EF4444; --type-bg: rgba(239,68,68,0.15); }
        .type-drone { --type-color: #06B6D4; --type-bg: rgba(6,182,212,0.15); }
        .type-aoe { --type-color: #F59E0B; --type-bg: rgba(245,158,11,0.15); }
        
        nav { background: var(--bg-white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 64px; }
        .logo { display: flex; align-items: center; gap: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.25rem; text-decoration: none; color: var(--text-dark); }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; }
        .nav-links { display: flex; gap: 0.5rem; }
        .nav-link { padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; color: var(--text-gray); font-weight: 500; transition: all 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }
        
        .container { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
        
        /* Hero Header */
        .hero-header { background: linear-gradient(135deg, var(--type-color, var(--primary)), var(--primary-light)); border-radius: var(--radius); padding: 2.5rem; color: white; text-align: center; margin-bottom: 1.5rem; position: relative; overflow: hidden; }
        .hero-header::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%); }
        .hero-avatar { width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; margin: 0 auto 1rem; border: 4px solid rgba(255,255,255,0.3); position: relative; }
        .hero-name { font-family: 'Outfit', sans-serif; font-size: 2.5rem; font-weight: 900; margin-bottom: 0.5rem; position: relative; }
        .hero-type-badge { display: inline-block; background: rgba(255,255,255,0.25); padding: 0.4rem 1rem; border-radius: 50px; font-size: 0.9rem; font-weight: 600; position: relative; }
        
        /* Section */
        .section { background: var(--bg-white); border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow); margin-bottom: 1.5rem; }
        .section-title { font-family: 'Outfit', sans-serif; font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        
        /* Skills */
        .skills-list { display: flex; flex-direction: column; gap: 1rem; }
        .skill-item { display: flex; align-items: flex-start; gap: 1rem; padding: 1rem; background: var(--bg-light); border-radius: 12px; border-left: 4px solid var(--type-color, var(--primary)); }
        .skill-icon { width: 50px; height: 50px; background: var(--type-bg); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; flex-shrink: 0; }
        .skill-info { flex: 1; }
        .skill-name { font-weight: 700; font-size: 1.1rem; margin-bottom: 0.25rem; }
        .skill-desc { font-size: 0.9rem; color: var(--text-gray); line-height: 1.5; }
        
        /* Play Style */
        .playstyle-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; }
        .playstyle-card { padding: 1.25rem; background: var(--bg-light); border-radius: 12px; text-align: center; }
        .playstyle-icon { font-size: 2rem; margin-bottom: 0.75rem; }
        .playstyle-title { font-weight: 700; font-size: 1rem; margin-bottom: 0.5rem; color: var(--type-color, var(--primary)); }
        .playstyle-desc { font-size: 0.85rem; color: var(--text-gray); line-height: 1.5; }
        
        /* Tips */
        .tips-list { display: flex; flex-direction: column; gap: 0.75rem; }
        .tip-item { display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.75rem; background: var(--bg-light); border-radius: 8px; }
        .tip-icon { font-size: 1.25rem; }
        .tip-text { font-size: 0.9rem; color: var(--text-gray); line-height: 1.5; }
        
        /* Back Button */
        .back-btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.5rem; background: var(--bg-white); border: 1px solid var(--border); border-radius: 8px; text-decoration: none; color: var(--text-gray); font-weight: 500; margin-bottom: 1rem; transition: all 0.2s; }
        .back-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
        
        .loading { text-align: center; padding: 3rem; color: var(--text-gray); }
        .not-found { text-align: center; padding: 3rem; }
        .not-found h2 { font-size: 1.5rem; margin-bottom: 1rem; }
        .not-found a { color: var(--primary); }
    </style>
</head>
<body>
    <nav></nav>

    // Get hero ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const heroId = urlParams.get('id');

    // Render Hero
    function renderHero() {
        const container = document.getElementById('heroContent');
        const hero = heroes.find(h => h.id === heroId);
        
        if (!hero) {
            container.innerHTML = `
                <div class="not-found">
                    <h2>😢 英雄未找到</h2>
                    <p>您要查看的英雄不存在</p>
                    <a href="/heroes.html" class="back-btn" style="margin-top:1rem;">← 返回英雄列表</a>
                </div>
            `;
            return;
        }
        
        // Set page title
        document.title = `${hero.name} - 英雄详情 - 兰星少年 HADO 俱乐部`;
        
        // Set type styles
        document.body.className = `type-${hero.type}`;
        
        container.innerHTML = `
            <a href="/heroes.html" class="back-btn">← 返回英雄列表</a>
            
            <div class="hero-header">
                <div class="hero-avatar">${hero.icon}</div>
                <div class="hero-name">${hero.name}</div>
                <div class="hero-type-badge">${hero.typeName}</div>
            </div>
            
            <div class="section">
                <div class="section-title">📝 英雄简介</div>
                <p style="color: var(--text-gray); line-height: 1.6;">${hero.desc}</p>
            </div>
            
            <div class="section">
                <div class="section-title">✨ 技能介绍</div>
                <div class="skills-list">
                    ${hero.skills.map(skill => `
                        <div class="skill-item">
                            <div class="skill-icon">${hero.icon}</div>
                            <div class="skill-info">
                                <div class="skill-name">${skill.name}</div>
                                <div class="skill-desc">${skill.desc}</div>
                            </div>
                        </div>

                </div>
            </div>
            
            <div class="section">
                <div class="section-title">🎮 适合打法</div>
                <div class="playstyle-grid">
                    ${hero.playstyles.map(ps => `
                        <div class="playstyle-card">
                            <div class="playstyle-icon">${ps.icon}</div>
                            <div class="playstyle-title">${ps.title}</div>
                            <div class="playstyle-desc">${ps.desc}</div>

    renderHero();

    <script src="/components/nav-loader.js"></script>
</body>
</html>
