<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>战队详情 - 兰星少年 HADO 俱乐部</title>
  <meta name="theme-color" content="#FF6B35">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/components/nav-loader.js"></script>
</head>
<body>
  <div class="container">
    <div id="content">
      <div class="card" style="text-align:center;color:var(--text-gray);"><span class="spinner"></span>加载中</div>
    </div>
  </div>

  <script>
    const API = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
    const params = new URLSearchParams(location.search);
    const teamId = params.get('id');

    async function loadTeam() {
      if (!teamId) {
        document.getElementById('content').innerHTML = '<div class="error-state">缺少战队ID</div>';
        return;
      }
      try {
        const res = await fetch(API + '/team/' + teamId);
        const result = await res.json();
        if (!result.ok) throw new Error(result.error);
        renderTeam(result.data);
      } catch (e) {
        document.getElementById('content').innerHTML = '<div class="error-state">加载失败: ' + e.message + '</div>';
      }
    }

    function renderTeam(team) {
      if (!team) {
        document.getElementById('content').innerHTML = '<div class="error-state">战队不存在</div>';
        return;
      }
      document.title = (team.name || team.canonical_name || '战队') + ' - 兰星少年';

      const html = `
        <div class="page-header">
          <div style="width:80px;height:80px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:50%;margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:white;">🔥</div>
          <h1 class="page-title">${team.name || team.canonical_name || ''}</h1>
          ${team.club_id ? `<p class="page-subtitle">${team.club_id}</p>` : ''}
        </div>

        <div class="section">
          <h2 class="section-title" style="margin-bottom:1rem;">🏅 荣誉</h2>
          <div class="cards-grid">
            ${team.honors && team.honors.length ? team.honors.map(h => `
              <div class="card" style="text-align:center;">
                <div style="font-size:2rem;margin-bottom:0.5rem;">🏆</div>
                <div style="font-weight:600;">${h.name || ''}</div>
                ${h.season ? `<div style="font-size:0.8rem;color:var(--text-gray);">${h.season}</div>` : ''}
              </div>
            `).join('') : '<div class="empty-state" style="grid-column:1/-1;"><div>暂无荣誉</div></div>'}
          </div>
        </div>

        <div class="section">
          <h2 class="section-title" style="margin-bottom:1rem;">👥 阵容</h2>
          <div class="cards-grid">
            ${team.roster && team.roster.length ? team.roster.map(p => `
              <a href="/player-detail.html?id=${p.player_id}" class="card" style="display:block;text-decoration:none;color:inherit;text-align:center;">
                <div style="width:56px;height:56px;background:linear-gradient(135deg,var(--secondary),#0099cc);border-radius:50%;margin:0 auto 0.75rem;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:white;">🏅</div>
                <div style="font-weight:600;">${p.nickname || p.name || ''}</div>
                ${p.role ? `<div style="font-size:0.8rem;color:var(--text-gray);">${p.role}</div>` : ''}
              </a>
            `).join('') : '<div class="empty-state" style="grid-column:1/-1;"><div>暂无阵容</div></div>'}
          </div>
        </div>

        <div style="text-align:center;margin-top:2rem;">
          <a href="/teams" class="btn btn-outline">← 返回战队列表</a>
        </div>
      `;

      document.getElementById('content').innerHTML = html;
    }

    loadTeam();
  </script>
</body>
</html>
