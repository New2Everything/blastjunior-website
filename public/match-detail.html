<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>比赛详情 - 兰星少年 HADO 俱乐部</title>
  <link rel="icon" href="/logo.jpg" type="image/jpeg">
  <meta name="theme-color" content="#0055D4">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/components/nav-loader.js"></script>
</head>
<body>
  <div class="container">
    <div id="content">
      <div class="card" style="text-align:center;color:var(--text-gray);"><span class="spinner"></span>加载中</div>
    </div>
  </div>

  <script>
    const API = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
    const params = new URLSearchParams(location.search);
    const matchId = params.get('id');

    async function loadMatch() {
      if (!matchId) {
        document.getElementById('content').innerHTML = '<div class="error-state">缺少比赛ID</div>';
        return;
      }
      try {
        const res = await fetch(API + '/matches/' + matchId);
        const result = await res.json();
        if (!result.ok) throw new Error(result.error);
        renderMatch(result.data);
      } catch (e) {
        document.getElementById('content').innerHTML = '<div class="error-state">加载失败</div>';
      }
    }

    function renderMatch(match) {
      if (!match) {
        document.getElementById('content').innerHTML = '<div class="error-state">比赛不存在</div>';
        return;
      }
      document.title = (match.league || '比赛') + ' - 兰星少年';

      const statusText = match.status === 'finished' ? '已结束' : match.status === 'ongoing' ? '进行中' : '未开始';
      const statusClass = match.status === 'finished' ? 'var(--secondary)' : 'var(--primary)';

      const html = `
        <div class="page-header">
          <span class="tag" style="font-size:1rem;padding:0.5rem 1rem;margin-bottom:1rem;">${match.league || '联赛'}</span>
          <h1 class="page-title">${match.team1_name || ''} vs ${match.team2_name || ''}</h1>
          ${match.group_name ? `<p class="page-subtitle">${match.group_name} 组</p>` : ''}
        </div>

        <div class="section">
          <div class="card" style="text-align:center;padding:2rem;">
            <div style="display:flex;align-items:center;justify-content:center;gap:2rem;font-family:var(--font-display);font-size:3rem;font-weight:900;">
              <span>${match.score1 ?? '-'}</span>
              <span style="color:var(--text-gray);font-size:1.5rem;">:</span>
              <span>${match.score2 ?? '-'}</span>
            </div>
            <div style="margin-top:1rem;font-size:0.9rem;color:var(--text-gray);">
              ${match.match_time ? new Date(match.match_time).toLocaleString('zh-CN') : ''}
            </div>
            <div style="margin-top:0.5rem;">
              <span class="tag">${statusText}</span>
            </div>
          </div>
        </div>

        <div style="text-align:center;margin-top:2rem;">
          <a href="/matches" class="btn btn-outline">← 返回赛程</a>
        </div>
      `;

      document.getElementById('content').innerHTML = html;
    }

    loadMatch();
  </script>
</body>
</html>
