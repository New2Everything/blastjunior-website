<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>现场大屏 - 兰星少年 HADO 俱乐部</title>
    <!-- DATA_MODULE: big_screen -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B35; --secondary: #00B4D8; --bg-dark: #0f172a; --text-light: #f1f5f9; --text-gray: #94a3b8; --border: #334155; --gold: #fbbf24; --silver: #cbd5e1; --bronze: #d97706; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-dark); color: var(--text-light); overflow: hidden; }
        
        .screen { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto 1fr auto; height: 100vh; padding: 1rem; gap: 1rem; }
        
        /* 顶部标题 */
        .header { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 1rem; background: rgba(255,255,255,0.05); border-radius: 12px; }
        .logo { display: flex; align-items: center; gap: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.5rem; }
        .logo-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--primary), #FF8A5C); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .datetime { font-size: 1.1rem; color: var(--text-gray); font-family: 'Outfit', sans-serif; }
        
        /* 左侧：积分榜 */
        .standings-panel { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 1rem; overflow: hidden; }
        .panel-title { font-family: 'Outfit', sans-serif; font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        
        .standings-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .standing-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; background: rgba(255,255,255,0.05); border-radius: 8px; }
        .standing-rank { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; }
        .standing-rank.gold { background: linear-gradient(135deg, var(--gold), #f59e0b); color: #000; }
        .standing-rank.silver { background: linear-gradient(135deg, var(--silver), #94a3b8); color: #000; }
        .standing-rank.bronze { background: linear-gradient(135deg, var(--bronze), #b45309); color: #fff; }
        .standing-rank.normal { background: var(--border); }
        .standing-name { flex: 1; font-weight: 500; }
        .standing-points { font-family: 'Outfit', sans-serif; font-size: 1.25rem; font-weight: 700; color: var(--primary); }
        
        /* 右侧：轮次榜单 */
        .rounds-panel { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 1rem; overflow: hidden; }
        
        .round-item { padding: 0.75rem; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 0.75rem; }
        .round-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
        .round-title { font-weight: 600; }
        .round-date { color: var(--text-gray); font-size: 0.85rem; }
        .round-players { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .player-badge { padding: 0.25rem 0.5rem; background: rgba(255,255,255,0.1); border-radius: 4px; font-size: 0.8rem; }
        .player-badge.first { background: var(--gold); color: #000; }
        
        /* 底部：荣誉滚动 */
        .honors-panel { grid-column: 1 / -1; background: rgba(255,255,255,0.03); border-radius: 12px; padding: 1rem; }
        .honors-scroll { display: flex; gap: 1rem; overflow-x: auto; padding: 0.5rem 0; }
        .honor-item { flex-shrink: 0; padding: 0.75rem 1.25rem; background: linear-gradient(135deg, var(--primary), #FF8A5C); border-radius: 8px; text-align: center; min-width: 150px; }
        .honor-rank { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 900; }
        .honor-team { font-size: 0.9rem; opacity: 0.9; }
        .honor-event { font-size: 0.75rem; color: var(--text-gray); margin-top: 0.25rem; }
        
        /* 自动滚动 */
        .honors-scroll { animation: scroll 30s linear infinite; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        .honors-panel:hover .honors-scroll { animation-play-state: paused; }
        
        /* 加载 */
        .loading { text-align: center; padding: 2rem; color: var(--text-gray); }
    </style>
</head>
<body>
    <div class="screen">
        <!-- 顶部 -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">📷</div>
                <span>兰星少年 HADO 俱乐部</span>
            </div>
            <div class="datetime" id="datetime"></div>
        </div>
        
        <!-- 左：积分榜 -->
        <div class="standings-panel">
            <div class="panel-title">🏆 积分榜</div>
            <div class="standings-list" id="standingsList">
                <div class="loading">加载中...</div>
            </div>
        </div>
        
        <!-- 右：轮次 -->
        <div class="rounds-panel">
            <div class="panel-title">⚡ 内部联赛轮次</div>
            <div class="standings-list" id="roundsList">
                <div class="loading">加载中...</div>
            </div>
        </div>
        
        <!-- 底部：荣誉 -->
        <div class="honors-panel">
            <div class="panel-title">🎖️ 荣誉墙</div>
            <div class="honors-scroll" id="honorsList">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script>
    const API_BASE = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
    
    // 更新时间
    function updateTime() {
        const now = new Date();
        const date = now.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
        const time = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('datetime').textContent = `${date} ${time}`;
    }
    updateTime();
    setInterval(updateTime, 1000);
    
    // 积分榜
    async function loadStandings() {
        try {
            const res = await fetch(`${API_BASE}/standings-v2`);
            const data = await res.json();
            if (data.ok && data.data) {
                const html = data.data.slice(0, 6).map(s => {
                    let rankClass = 'normal';
                    if (s.rank === 1) rankClass = 'gold';
                    else if (s.rank === 2) rankClass = 'silver';
                    else if (s.rank === 3) rankClass = 'bronze';
                    return `
                        <div class="standing-item">
                            <div class="standing-rank ${rankClass}">${s.rank}</div>
                            <span class="standing-name">${s.team}</span>
                            <span class="standing-points">${s.points}</span>
                        </div>
                    `;
                }).join('');
                document.getElementById('standingsList').innerHTML = html;
            }
        } catch(e) { document.getElementById('standingsList').innerHTML = '<div class="loading">加载失败</div>'; }
    }
    
    // 轮次
    async function loadRounds() {
        try {
            const res = await fetch(`${API_BASE}/internal-rounds`);
            const data = await res.json();
            if (data.ok && data.data) {
                const html = data.data.slice(0, 3).map((r, idx) => {
                    const top3 = (r.topPlayers || []).slice(0, 3);
                    return `
                        <div class="round-item">
                            <div class="round-header">
                                <span class="round-title">第${idx + 1}轮</span>
                                <span class="round-date">${r.round_date}</span>
                            </div>
                            <div class="round-players">
                                ${top3.map((p, i) => `<span class="player-badge ${i===0?'first':''}">${p.name} ${p.points}分</span>`).join('')}
                            </div>
                        </div>
                    `;
                }).join('');
                document.getElementById('roundsList').innerHTML = html;
            }
        } catch(e) { document.getElementById('roundsList').innerHTML = '<div class="loading">加载失败</div>'; }
    }
    
    // 荣誉
    async function loadHonors() {
        try {
            const res = await fetch(`${API_BASE}/honors`);
            const data = await res.json();
            if (data.ok && data.data) {
                // 复制一份实现无缝滚动
                const items = [...data.data, ...data.data];
                const html = items.slice(0, 10).map(h => `
                    <div class="honor-item">
                        <div class="honor-rank">#${h.final_rank}</div>
                        <div class="honor-team">${h.country_name || '兰星少年'}</div>
                        <div class="honor-event">${h.season_id || '2025'}</div>
                    </div>
                `).join('');
                document.getElementById('honorsList').innerHTML = html;
            }
        } catch(e) { document.getElementById('honorsList').innerHTML = '<div class="loading">加载失败</div>'; }
    }
    
    loadStandings();
    loadRounds();
    loadHonors();
    
    // 每30秒刷新
    setInterval(() => { loadStandings(); loadRounds(); loadHonors(); }, 30000);
    </script>
    <script src="/components/nav-loader.js"></script>
</body>
</html>
