<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="兰星少年 HADO 俱乐部 - 专业HADO运动战队">
  <meta name="theme-color" content="#FF6B35">
  <title>兰星少年 HADO 俱乐部</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/components/nav-loader.js"></script>
</head>
<body>
  <div class="container">
    <!-- Hero -->
    <section style="background:linear-gradient(135deg,var(--primary),var(--primary-light));padding:3rem 1.5rem;border-radius:var(--radius);margin-bottom:2rem;text-align:center;color:white;">
      <h1 style="font-family:var(--font-display);font-size:2.5rem;font-weight:900;margin-bottom:0.5rem;">⚡ 兰星少年 HADO 俱乐部</h1>
      <p style="font-size:1.1rem;opacity:0.9;margin-bottom:1.5rem;">燃烧你的能量，追逐冠军梦想！</p>
      <div style="display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;">
        <span class="tag" style="background:rgba(255,255,255,0.2);">🏓 HADO</span>
        <span class="tag" style="background:rgba(255,255,255,0.2);">⚔️ 对战</span>
        <span class="tag" style="background:rgba(255,255,255,0.2);">🏆 联赛</span>
      </div>
    </section>

    <!-- 快速入口 -->
    <section class="section">
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;">
        <a href="/teams" class="card" style="display:block;text-decoration:none;color:inherit;text-align:center;padding:1.5rem;">
          <div style="font-size:2.5rem;margin-bottom:0.5rem;">🔥</div>
          <div style="font-weight:700;">战队</div>
        </a>
        <a href="/members" class="card" style="display:block;text-decoration:none;color:inherit;text-align:center;padding:1.5rem;">
          <div style="font-size:2.5rem;margin-bottom:0.5rem;">👥</div>
          <div style="font-weight:700;">成员</div>
        </a>
        <a href="/standings" class="card" style="display:block;text-decoration:none;color:inherit;text-align:center;padding:1.5rem;">
          <div style="font-size:2.5rem;margin-bottom:0.5rem;">📊</div>
          <div style="font-weight:700;">积分榜</div>
        </a>
        <a href="/gallery" class="card" style="display:block;text-decoration:none;color:inherit;text-align:center;padding:1.5rem;">
          <div style="font-size:2.5rem;margin-bottom:0.5rem;">📸</div>
          <div style="font-weight:700;">画廊</div>
        </a>
      </div>
    </section>

    <!-- 战队列表 -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">🔥 战队</h2>
        <a href="/teams" class="section-more">更多 ></a>
      </div>
      <div class="cards-grid" id="teamsGrid">
        <div class="card" style="text-align:center;color:var(--text-gray);"><span class="spinner"></span>加载中</div>
      </div>
    </section>

    <!-- 俱乐部成员 -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">👥 俱乐部成员</h2>
        <a href="/members" class="section-more">更多 ></a>
      </div>
      <div class="cards-grid" id="membersGrid">
        <div class="card" style="text-align:center;color:var(--text-gray);"><span class="spinner"></span>加载中</div>
      </div>
    </section>

    <!-- 积分榜 -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">📊 赛季积分</h2>
        <a href="/standings" class="section-more">更多 ></a>
      </div>
      <div id="scoresWrap">
        <div class="card" style="text-align:center;color:var(--text-gray);"><span class="spinner"></span>加载中</div>
      </div>
    </section>
  </div>

  <footer style="background:var(--bg-white);border-top:1px solid var(--border);padding:2rem;text-align:center;color:var(--text-gray);margin-top:3rem;">
    <p style="font-size:0.9rem;">© 2024 兰星少年 HADO 俱乐部 · <a href="https://blastjunior.com" style="color:var(--primary);">blastjunior.com</a></p>
  </footer>

  <script>
    const API = 'https://blast-api.kanjiaming2022.workers.dev';

    async function loadHome() {
      try {
        const [teamsRes, membersRes, seasonsRes] = await Promise.all([
          fetch(API + '/teams', { headers: { 'Origin': 'https://blastjunior.com' } }),
          fetch(API + '/members', { headers: { 'Origin': 'https://blastjunior.com' } }),
          fetch(API + '/seasons', { headers: { 'Origin': 'https://blastjunior.com' } })
        ]);
        
        const teamsData = await teamsRes.json();
        const membersData = await membersRes.json();
        const seasonsData = await seasonsRes.json();

        renderTeams(teamsData.data || []);
        renderMembers(membersData.data || []);
        
        const seasons = seasonsData.data || [];
        if (seasons.length > 0) {
          const ongoing = seasons.find(s => s.status === 'ongoing') || seasons[0];
          loadScores(ongoing.id);
        } else {
          document.getElementById('scoresWrap').innerHTML = '<div class="card"><div class="empty-state"><div class="empty-state-icon">📊</div><div>暂无赛季数据</div></div></div>';
        }
      } catch (e) {
        console.error('加载失败:', e);
      }
    }

    async function loadScores(seasonId) {
      try {
        const res = await fetch(API + '/seasons/' + seasonId + '/scores', { headers: { 'Origin': 'https://blastjunior.com' } });
        const data = await res.json();
        renderScores(data.data || []);
      } catch (e) {
        document.getElementById('scoresWrap').innerHTML = '<div class="card"><div class="error-state">加载失败</div></div>';
      }
    }

    function renderTeams(teams) {
      const grid = document.getElementById('teamsGrid');
      if (!teams.length) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">🔥</div><div>暂无战队</div></div>';
        return;
      }
      grid.innerHTML = teams.slice(0, 4).map(t => `
        <a href="/teams" class="card" style="display:block;text-decoration:none;color:inherit;text-align:center;padding:1.5rem;">
          <div style="font-size:2rem;margin-bottom:0.5rem;">🔥</div>
          <h3 style="font-weight:700;font-size:1rem;">${t.name}</h3>
          <p style="font-size:0.8rem;color:var(--text-gray);margin-top:0.25rem;">队长: ${t.captain_name || '未知'} · ${t.member_count || 0}人</p>
        </a>
      `).join('');
    }

    function renderMembers(members) {
      const grid = document.getElementById('membersGrid');
      if (!members.length) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">👥</div><div>暂无成员</div></div>';
        return;
      }
      
      const roleLabels = {
        'leader': '🏆',
        'admin': '⚙️',
        'member': '👤',
        'support': '🔧',
        'sponsor': '💰'
      };

      grid.innerHTML = members.slice(0, 4).map(m => `
        <div class="card" style="text-align:center;padding:1.25rem;">
          <div style="width:48px;height:48px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:50%;margin:0 auto 0.75rem;display:flex;align-items:center;justify-content:center;font-size:1.25rem;color:white;">
            ${m.avatar ? '<img src="'+m.avatar+'" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">' : (roleLabels[m.role] || '👤')}
          </div>
          <h3 style="font-weight:600;font-size:0.9rem;">${m.nickname || m.real_name || '未知'}</h3>
          ${m.real_name && m.nickname ? '<p style="font-size:0.75rem;color:var(--text-gray);">'+m.real_name+'</p>' : ''}
        </div>
      `).join('');
    }

    function renderScores(scores) {
      const wrap = document.getElementById('scoresWrap');
      if (!scores.length) {
        wrap.innerHTML = '<div class="card"><div class="empty-state"><div class="empty-state-icon">📊</div><div>暂无积分数据</div></div></div>';
        return;
      }
      
      wrap.innerHTML = '<div class="card" style="overflow-x:auto;"><table><thead><tr><th>#</th><th>战队</th><th>胜</th><th>平</th><th>负</th><th>积分</th></tr></thead><tbody>' +
        scores.slice(0, 5).map((s, i) => '<tr><td><strong>'+(i+1)+'</strong></td><td>'+s.team_name+'</td><td>'+s.wins+'</td><td>'+s.draws+'</td><td>'+s.losses+'</td><td><strong style="color:var(--primary);">'+s.points+'</strong></td></tr>').join('') +
        '</tbody></table></div>';
    }

    loadHome();
  </script>
</body>
</html>
