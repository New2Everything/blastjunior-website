<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="兰星少年 HADO 俱乐部 - 专业HADO运动战队">
  <meta name="theme-color" content="#FF6B35">
  <title>兰星少年 HADO 俱乐部</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/components/nav-loader.js"></script>
  <script src="/components/ai-residents.js"></script>
  <style>
    .chat-section { background: var(--bg-white); border-radius: var(--radius); padding: 1rem; box-shadow: var(--shadow); }
    .chat-title { font-family: var(--font-display); font-weight: 700; font-size: 1rem; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
    .chat-messages { max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem; }
    .chat-msg { display: flex; gap: 0.5rem; padding: 0.5rem; border-radius: 8px; background: var(--bg-light); }
    .chat-msg.own { background: rgba(255,107,53,0.1); }
    .chat-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg,var(--primary),var(--primary-light)); display: flex; align-items: center; justify-content: center; color: white; font-size: 0.75rem; flex-shrink: 0; }
    .chat-content { flex: 1; min-width: 0; }
    .chat-name { font-weight: 600; font-size: 0.8rem; color: var(--text-gray); }
    .chat-text { font-size: 0.9rem; word-break: break-all; }
    .chat-input-area { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
    .chat-input { flex: 1; padding: 0.5rem; border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem; }
    .chat-send { padding: 0.5rem 1rem; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .chat-send:hover { opacity: 0.9; }
    .pending-badge { background: #F59E0B; color: white; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; margin-left: 0.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Hero -->
    <section style="background:linear-gradient(135deg,var(--primary),var(--primary-light));padding:3rem 1.5rem;border-radius:var(--radius);margin-bottom:2rem;text-align:center;color:white;">
      <h1 style="font-family:var(--font-display);font-size:2.5rem;font-weight:900;margin-bottom:0.5rem;">⚡ 兰星少年 HADO 俱乐部</h1>
      <p style="font-size:1.1rem;opacity:0.9;margin-bottom:1.5rem;">燃烧你的能量，追逐冠军梦想！</p>
      <div style="display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;">
        <span class="tag" style="background:rgba(255,255,255,0.2);">🏓 HADO</span>
        <span class="tag" style="background:rgba(255,255,255,0.2);">⚔️ 对战</span>
        <span class="tag" style="background:rgba(255,255,255,0.2);">🏆 联赛</span>
      </div>
    </section>

    <div style="display:grid;grid-template-columns:1fr 320px;gap:1.5rem;" class="main-layout">
      <main>
        <!-- 快速入口 -->
        <section class="section">
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem;">
            <a href="/teams" class="card" style="display:block;text-decoration:none;color:inherit;text-align:center;padding:1.5rem;">
              <div style="font-size:2.5rem;margin-bottom:0.5rem;">🔥</div>
              <div style="font-weight:700;">战队</div>
            </a>
            <a href="/members" class="card" style="display:block;text-decoration:none;color:inherit;text-align:center;padding:1.5rem;">
              <div style="font-size:2.5rem;margin-bottom:0.5rem;">👥</div>
              <div style="font-weight:700;">成员</div>
            </a>
            <a href="/standings" class="card" style="display:block;text-decoration:none;color:inherit;text-align:center;padding:1.5rem;">
              <div style="font-size:2.5rem;margin-bottom:0.5rem;">📊</div>
              <div style="font-weight:700;">积分榜</div>
            </a>
            <a href="/gallery" class="card" style="display:block;text-decoration:none;color:inherit;text-align:center;padding:1.5rem;">
              <div style="font-size:2.5rem;margin-bottom:0.5rem;">📸</div>
              <div style="font-weight:700;">画廊</div>
            </a>
          </div>
        </section>

        <!-- 战队列表 -->
        <section class="section">
          <div class="section-header">
            <h2 class="section-title">🔥 战队</h2>
            <a href="/teams" class="section-more">更多 ></a>
          </div>
          <div class="cards-grid" id="teamsGrid">
            <div class="card" style="text-align:center;color:var(--text-gray);"><span class="spinner"></span>加载中</div>
          </div>
        </section>

        <!-- 积分榜 -->
        <section class="section">
          <div class="section-header">
            <h2 class="section-title">📊 赛季积分</h2>
            <a href="/standings" class="section-more">更多 ></a>
          </div>
          <div id="scoresWrap">
            <div class="card" style="text-align:center;color:var(--text-gray);"><span class="spinner"></span>加载中</div>
          </div>
        </section>
      </main>

      <aside>
        <!-- 聊天室 -->
        <div class="chat-section" id="chatSection">
          <div class="chat-title">💬 俱乐部聊天室 <span id="chatStatus"></span></div>
          <div id="aiModeToggle" style="margin-bottom:0.5rem;display:flex;align-items:center;gap:0.5rem;">
            <select id="aiResidentSelect" onchange="switchAIRresident(this.value)" style="flex:1;padding:0.3rem;border:1px solid var(--border);border-radius:4px;font-size:0.8rem;">
              <option value="">🔵 以游客身份</option>
              ${AIResidents.getAll().map(r => `<option value="${r.id}">${r.emoji} ${r.name}</option>`).join('')}
            </select>
            <span id="aiResidentBadge" style="display:none;background:#6366f1;color:white;padding:0.2rem 0.5rem;border-radius:1rem;font-size:0.7rem;">🔵 AI模式</span>
          </div>
          <div class="chat-messages" id="chatMessages"></div>
          <div class="chat-input-area" id="chatInputArea">
            <input type="text" class="chat-input" id="chatInput" placeholder="说点什么..." onkeypress="if(event.key==='Enter')sendMessage()">
            <button class="chat-send" onclick="sendMessage()">发送</button>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <footer style="background:var(--bg-white);border-top:1px solid var(--border);padding:2rem;text-align:center;color:var(--text-gray);margin-top:3rem;">
    <p style="font-size:0.9rem;">© 2024 兰星少年 HADO 俱乐部 · <a href="https://blastjunior.com" style="color:var(--primary);">blastjunior.com</a></p>
  </footer>

  <script>
    const API = 'https://blast-api.kanjiaming2022.workers.dev';
    let currentUser = null;
    let currentAIRresident = null;

    async function init() {
      const token = localStorage.getItem('blxst_token');
      if (token) {
        try {
          const res = await fetch(API + '/auth/me', {
            headers: { 'Authorization': 'Bearer ' + token, 'Origin': 'https://blastjunior.com' }
          });
          const result = await res.json();
          if (result.ok) {
            currentUser = result.user;
            updateChatStatus();
          }
        } catch (e) {}
      }
      loadHome();
      loadChat();
    }

    function updateChatStatus() {
      const statusEl = document.getElementById('chatStatus');
      const inputArea = document.getElementById('chatInputArea');
      const chatInput = document.getElementById('chatInput');
      
      if (!currentUser) {
        statusEl.textContent = '';
        chatInput.placeholder = '登录后即可发言';
        chatInput.disabled = true;
      } else if (currentUser.status !== 'approved') {
        statusEl.innerHTML = '<span class="pending-badge">审核中</span>';
        chatInput.placeholder = '账号审核中，无法发言';
        chatInput.disabled = true;
      } else {
        statusEl.textContent = '';
        chatInput.disabled = false;
      }
    }

    async function loadHome() {
      try {
        const [teamsRes, seasonsRes] = await Promise.all([
          fetch(API + '/teams', { headers: { 'Origin': 'https://blastjunior.com' } }),
          fetch(API + '/seasons', { headers: { 'Origin': 'https://blastjunior.com' } })
        ]);
        
        const teamsData = await teamsRes.json();
        const seasonsData = await seasonsRes.json();

        renderTeams(teamsData.data || []);
        
        const seasons = seasonsData.data || [];
        if (seasons.length > 0) {
          const ongoing = seasons.find(s => s.status === 'ongoing') || seasons[0];
          loadScores(ongoing.id);
        } else {
          document.getElementById('scoresWrap').innerHTML = '<div class="card"><div class="empty-state"><div class="empty-state-icon">📊</div><div>暂无赛季数据</div></div></div>';
        }
      } catch (e) {
        console.error('加载失败:', e);
      }
    }

    async function loadScores(seasonId) {
      try {
        const res = await fetch(API + '/seasons/' + seasonId + '/scores', { headers: { 'Origin': 'https://blastjunior.com' } });
        const data = await res.json();
        renderScores(data.data || []);
      } catch (e) {
        document.getElementById('scoresWrap').innerHTML = '<div class="card"><div class="error-state">加载失败</div></div>';
      }
    }

    async function loadChat() {
      try {
        const res = await fetch(API + '/chat', { headers: { 'Origin': 'https://blastjunior.com' } });
        const data = await res.json();
        renderChat(data.data || []);
      } catch (e) {
        document.getElementById('chatMessages').innerHTML = '<div style="text-align:center;color:var(--text-gray);padding:1rem;">加载失败</div>';
      }
    }

    async function sendMessage() {
      // AI居民模式
      if (currentAIRresident) {
        const input = document.getElementById('chatInput');
        const content = input.value.trim();
        if (!content) return;
        
        const el = document.getElementById('chatMessages');
        const aiResponse = AIResidents.generateMessage(currentAIRresident, content);
        
        // 显示用户消息
        el.innerHTML += `<div class="chat-msg own">
          <div class="chat-avatar" style="background:linear-gradient(135deg,var(--primary),var(--primary-light));">我</div>
          <div class="chat-content">
            <div class="chat-name">我</div>
            <div class="chat-text">${escapeHtml(content)}</div>
          </div>
        </div>`;
        
        // 模拟AI回复
        setTimeout(() => {
          el.innerHTML += `<div class="chat-msg">
            <div class="chat-avatar" style="background:linear-gradient(135deg,${currentAIRresident.color},${currentAIRresident.color}88);">${currentAIRresident.emoji}</div>
            <div class="chat-content">
              <div class="chat-name">${currentAIRresident.name} <span style="background:#6366f1;color:white;padding:0.1rem 0.3rem;border-radius:1rem;font-size:0.65rem;margin-left:0.3rem;">🔵 AI居民</span></div>
              <div class="chat-text">${escapeHtml(aiResponse)}</div>
            </div>
          </div>`;
          el.scrollTop = el.scrollHeight;
        }, 500);
        
        input.value = '';
        return;
      }
      
      if (!currentUser || currentUser.status !== 'approved') {
        alert('请先登录并等待账号审核通过');
        return;
      }
      
      const input = document.getElementById('chatInput');
      const content = input.value.trim();
      if (!content) return;

      try {
        const res = await fetch(API + '/chat', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + localStorage.getItem('blxst_token'), 'Content-Type': 'application/json', 'Origin': 'https://blastjunior.com' },
          body: JSON.stringify({ content })
        });
        const result = await res.json();
        
        if (!result.ok) {
          alert(result.error || '发送失败');
          return;
        }
        
        input.value = '';
        loadChat();
      } catch (e) {
        alert('发送失败');
      }
    }

    function renderTeams(teams) {
      const grid = document.getElementById('teamsGrid');
      if (!teams.length) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">🔥</div><div>暂无战队</div></div>';
        return;
      }
      grid.innerHTML = teams.slice(0, 4).map(t => `
        <a href="/teams" class="card" style="display:block;text-decoration:none;color:inherit;text-align:center;padding:1.5rem;">
          <div style="font-size:2rem;margin-bottom:0.5rem;">🔥</div>
          <h3 style="font-weight:700;font-size:1rem;">${t.name}</h3>
          <p style="font-size:0.8rem;color:var(--text-gray);margin-top:0.25rem;">队长: ${t.captain_name || '未知'} · ${t.member_count || 0}人</p>
        </a>
      `).join('');
    }

    function renderScores(scores) {
      const wrap = document.getElementById('scoresWrap');
      if (!scores.length) {
        wrap.innerHTML = '<div class="card"><div class="empty-state"><div class="empty-state-icon">📊</div><div>暂无积分数据</div></div></div>';
        return;
      }
      
      wrap.innerHTML = '<div class="card" style="overflow-x:auto;"><table><thead><tr><th>#</th><th>战队</th><th>积分</th></tr></thead><tbody>' +
        scores.slice(0, 5).map((s, i) => '<tr><td><strong>'+(i+1)+'</strong></td><td>'+(s.team_name||'未知')+'</td><td><strong style="color:var(--primary);">'+(s.points||0)+'</strong></td></tr>').join('') +
        '</tbody></table></div>';
    }

    function switchAIRresident(id) {
      if (!id) {
        currentAIRresident = null;
        document.getElementById('aiResidentBadge').style.display = 'none';
        document.getElementById('chatInput').placeholder = '说点什么...';
        updateChatStatus();
        return;
      }
      currentAIRresident = AIResidents.getAll().find(r => r.id === id);
      if (currentAIRresident) {
        AIResidents.setCurrent(id);
        document.getElementById('aiResidentBadge').style.display = 'inline-block';
        document.getElementById('aiResidentBadge').textContent = `🔵 ${currentAIRresident.emoji} ${currentAIRresident.name}在线`;
        document.getElementById('chatInput').placeholder = currentAIRresident.tagline;
      }
    }

    function renderChat(messages) {
      const el = document.getElementById('chatMessages');
      if (!messages.length && !currentAIRresident) {
        el.innerHTML = '<div style="text-align:center;color:var(--text-gray);padding:1rem;">暂无消息，快来发言吧！</div>';
        return;
      }
      
      let html = '';
      
      // 如果有AI居民在聊天，显示一些AI消息
      if (currentAIRresident) {
        const aiGreetings = [
          `大家好！我是${currentAIRresident.name}！${currentAIRresident.tagline}`,
          `${currentAIRresident.emoji} 哟，我来啦~`,
          `${currentAIRresident.name}报道！有什么有趣的话题吗？`
        ];
        const randomGreeting = aiGreetings[Math.floor(Math.random() * aiGreetings.length)];
        html += `<div class="chat-msg">
          <div class="chat-avatar" style="background:linear-gradient(135deg,${currentAIRresident.color},${currentAIRresident.color}88);">${currentAIRresident.emoji}</div>
          <div class="chat-content">
            <div class="chat-name">${currentAIRresident.name} <span style="background:#6366f1;color:white;padding:0.1rem 0.3rem;border-radius:1rem;font-size:0.65rem;margin-left:0.3rem;">🔵 AI居民</span></div>
            <div class="chat-text">${escapeHtml(randomGreeting)}</div>
          </div>
        </div>`;
      }
      
      // 真实消息
      html += messages.map(m => {
        const isOwn = currentUser && m.user_id === currentUser.id;
        return `<div class="chat-msg ${isOwn ? 'own' : ''}">
          <div class="chat-avatar">${(m.nickname || '?').charAt(0).toUpperCase()}</div>
          <div class="chat-content">
            <div class="chat-name">${m.nickname || '匿名'}</div>
            <div class="chat-text">${escapeHtml(m.content)}</div>
          </div>
        </div>`;
      }).join('');
      
      el.innerHTML = html;
      el.scrollTop = el.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    init();
    setInterval(loadChat, 10000);
  </script>
</body>
</html>
