<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="兰星少年 HADO 俱乐部 - 专业HADO运动战队，培训与比赛资讯">
  <meta name="theme-color" content="#FF6B35">
  <title>兰星少年 HADO 俱乐部 - 官网</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/components/nav-loader.js"></script>
</head>
<body>
  <div class="container">
    <!-- Hero -->
    <section class="hero" style="background:linear-gradient(135deg,var(--primary),var(--primary-light));padding:3rem 1.5rem;border-radius:var(--radius);margin-bottom:2rem;text-align:center;color:white;">
      <h1 style="font-family:var(--font-display);font-size:2.5rem;font-weight:900;margin-bottom:0.5rem;">⚡ 兰星少年 HADO 俱乐部</h1>
      <p style="font-size:1.1rem;opacity:0.9;margin-bottom:1.5rem;">燃烧你的能量，追逐冠军梦想！</p>
      <div style="display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;">
        <span class="tag" style="background:rgba(255,255,255,0.2);">🏓 HADO</span>
        <span class="tag" style="background:rgba(255,255,255,0.2);">⚔️ 对战</span>
        <span class="tag" style="background:rgba(255,255,255,0.2);">🏆 联赛</span>
      </div>
    </section>

    <!-- Stats -->
    <section class="section">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;max-width:600px;margin:0 auto 2rem;" id="statsGrid">
        <div class="card" style="text-align:center;">
          <div style="font-family:var(--font-display);font-size:2rem;font-weight:900;color:var(--primary);" id="statTeams">-</div>
          <div style="font-size:0.85rem;color:var(--text-gray);">战队</div>
        </div>
        <div class="card" style="text-align:center;">
          <div style="font-family:var(--font-display);font-size:2rem;font-weight:900;color:var(--primary);" id="statPlayers">-</div>
          <div style="font-size:0.85rem;color:var(--text-gray);">选手</div>
        </div>
        <div class="card" style="text-align:center;">
          <div style="font-family:var(--font-display);font-size:2rem;font-weight:900;color:var(--primary);" id="statSeasons">-</div>
          <div style="font-size:0.85rem;color:var(--text-gray);">赛季</div>
        </div>
      </div>
    </section>

    <!-- News -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">📰 最新动态</h2>
        <a href="/news" class="section-more">更多 ></a>
      </div>
      <div class="cards-grid" id="newsGrid">
        <div class="card" style="text-align:center;color:var(--text-gray);"><span class="spinner"></span>加载中</div>
      </div>
    </section>

    <!-- Matches -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">🏆 赛程</h2>
        <a href="/matches" class="section-more">更多 ></a>
      </div>
      <div id="matchesGrid">
        <div class="card" style="text-align:center;color:var(--text-gray);"><span class="spinner"></span>加载中</div>
      </div>
    </section>

    <!-- Teams -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">🔥 战队</h2>
        <a href="/teams" class="section-more">更多 ></a>
      </div>
      <div class="cards-grid" id="teamsGrid">
        <div class="card" style="text-align:center;color:var(--text-gray);"><span class="spinner"></span>加载中</div>
      </div>
    </section>

    <!-- Sponsors -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">🤝 合作伙伴</h2>
      </div>
      <div class="cards-grid" id="sponsorsGrid">
        <div class="empty-state" style="grid-column:1/-1;">
          <div class="empty-state-icon">🤝</div>
          <div>暂无赞助商</div>
        </div>
      </div>
    </section>
  </div>

  <!-- Footer -->
  <footer style="background:var(--bg-white);border-top:1px solid var(--border);padding:2rem;text-align:center;color:var(--text-gray);margin-top:3rem;">
    <p style="font-size:0.9rem;">© 2024 兰星少年 HADO 俱乐部 · <a href="https://blastjunior.com" style="color:var(--primary);">blastjunior.com</a></p>
  </footer>

  <script>
    const API = 'https://blast-homepage-api.kanjiaming2022.workers.dev';

    async function loadHome() {
      try {
        const [homeRes, newsRes, teamsRes] = await Promise.all([
          fetch(API + '/'),
          fetch(API + '/news'),
          fetch(API + '/teams')
        ]);
        const home = await homeRes.json();
        const news = await newsRes.json();
        const teams = await teamsRes.json();

        // Stats - 来自数据库真实数据
        if (home.data?.stats) {
          document.getElementById('statTeams').textContent = home.data.stats.totalTeams || '-';
          document.getElementById('statPlayers').textContent = home.data.stats.totalPlayers || '-';
          document.getElementById('statSeasons').textContent = home.data.stats.totalSeasons || '-';
        }

        // News
        renderNews(news.data || []);

        // Teams
        renderTeams(teams.data || []);

        // Sponsors
        renderSponsors(home.data?.sponsors || []);

      } catch (e) {
        console.error('加载失败:', e);
        ['newsGrid', 'teamsGrid', 'sponsorsGrid'].forEach(id => {
          document.getElementById(id).innerHTML = '<div class="error-state">加载失败</div>';
        });
      }
    }

    function renderNews(news) {
      const grid = document.getElementById('newsGrid');
      if (!news.length) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">📰</div><div>暂无新闻</div></div>';
        return;
      }
      grid.innerHTML = news.slice(0, 6).map(n => `
        <a href="/news?id=${n.id}" class="card" style="display:block;text-decoration:none;color:inherit;">
          <span class="tag">${n.category || '动态'}</span>
          <h3 style="font-weight:600;margin:0.5rem 0;line-height:1.4;">${n.title || ''}</h3>
          <p style="font-size:0.85rem;color:var(--text-gray);line-height:1.5;">${(n.content || '').substring(0, 80)}...</p>
          <div style="font-size:0.75rem;color:var(--text-gray);margin-top:0.75rem;">${n.published_at ? new Date(n.published_at).toLocaleDateString('zh-CN') : ''}</div>
        </a>
      `).join('');
    }

    function renderTeams(teams) {
      const grid = document.getElementById('teamsGrid');
      if (!teams.length) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">🔥</div><div>暂无战队</div></div>';
        return;
      }
      grid.innerHTML = teams.slice(0, 6).map(t => `
        <a href="/team-detail.html?id=${t.id}" class="card" style="display:block;text-decoration:none;color:inherit;text-align:center;padding:1.5rem;">
          <div style="font-size:2.5rem;margin-bottom:0.75rem;">🔥</div>
          <h3 style="font-weight:700;font-size:1.1rem;">${t.name || t.canonical_name || ''}</h3>
          ${t.club_id ? `<p style="font-size:0.8rem;color:var(--text-gray);margin-top:0.25rem;">${t.club_id}</p>` : ''}
        </a>
      `).join('');
    }

    function renderSponsors(sponsors) {
      const grid = document.getElementById('sponsorsGrid');
      if (!sponsors.length) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">🤝</div><div>暂无赞助商</div></div>';
        return;
      }
      grid.innerHTML = sponsors.map(s => `
        <div class="card" style="display:flex;align-items:center;gap:1rem;">
          <div style="width:48px;height:48px;background:var(--bg-light);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;">🤝</div>
          <div>
            <div style="font-weight:600;">${s.name || ''}</div>
            ${s.tier ? `<div style="font-size:0.75rem;color:var(--primary);text-transform:uppercase;">${s.tier}</div>` : ''}
          </div>
        </div>
      `).join('');
    }

    loadHome();
  </script>
</body>
</html>
