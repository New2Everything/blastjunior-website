<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新闻动态 - 兰星少年 HADO 俱乐部</title>
  <meta name="description" content="兰星少年 HADO 俱乐部最新动态">
  <meta name="theme-color" content="#FF6B35">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/components/nav-loader.js"></script>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1 class="page-title">📰 新闻动态</h1>
      <p class="page-subtitle">了解俱乐部最新资讯</p>
    </div>

    <div class="section">
      <div class="cards-grid" id="newsGrid">
        <div class="card" style="text-align:center;color:var(--text-gray);"><span class="spinner"></span>加载中</div>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://blast-homepage-api.kanjiaming2022.workers.dev';

    async function loadNews() {
      try {
        const res = await fetch(API + '/news');
        const result = await res.json();
        renderNews(result.data || []);
      } catch (e) {
        document.getElementById('newsGrid').innerHTML = '<div class="error-state" style="grid-column:1/-1;">加载失败</div>';
      }
    }

    function renderNews(news) {
      const grid = document.getElementById('newsGrid');
      if (!news.length) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">📰</div><div>暂无新闻</div></div>';
        return;
      }
      grid.innerHTML = news.map(n => `
        <a href="/news?id=${n.id}" class="card" style="display:block;text-decoration:none;color:inherit;">
          <span class="tag">${n.category || '动态'}</span>
          <h3 style="font-weight:600;margin:0.5rem 0;font-size:1.05rem;line-height:1.4;">${n.title || ''}</h3>
          <p style="font-size:0.85rem;color:var(--text-gray);line-height:1.5;">${(n.content || '').substring(0, 100)}...</p>
          <div style="font-size:0.75rem;color:var(--text-gray);margin-top:0.75rem;">${n.published_at ? new Date(n.published_at).toLocaleDateString('zh-CN') : ''}</div>
        </a>
      `).join('');
    }

    loadNews();
  </script>
</body>
</html>
