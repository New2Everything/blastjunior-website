<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专题 - 兰星少年 HADO 俱乐部</title>
    <!-- DATA_MODULE: topics -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B35; --secondary: #00B4D8; --bg-light: #F8FAFC; --bg-white: #FFFFFF; --text-dark: #1E293B; --text-gray: #64748B; --border: #E2E8F0; --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-light); color: var(--text-dark); }
        nav { background: var(--bg-white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 64px; }
        .logo { display: flex; align-items: center; gap: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.25rem; text-decoration: none; color: var(--text-dark); }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), #FF8A5C); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; }
        .nav-links { display: flex; gap: 0.5rem; }
        .nav-link { padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; color: var(--text-gray); font-weight: 500; transition: all 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        .page-header { margin-bottom: 2rem; }
        .page-title { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 900; margin-bottom: 0.5rem; }
        
        /* 专题卡片网格 */
        .topics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        
        .topic-card { background: var(--bg-white); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); cursor: pointer; transition: transform 0.2s; }
        .topic-card:hover { transform: translateY(-4px); }
        
        .topic-cover { height: 180px; display: flex; align-items: center; justify-content: center; font-size: 4rem; }
        .topic-cover.purple { background: linear-gradient(135deg, #667eea, #764ba2); }
        .topic-cover.star { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .topic-cover.training { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .topic-cover.parent { background: linear-gradient(135deg, #43e97b, #38f9d7); }
        
        .topic-content { padding: 1.5rem; }
        .topic-title { font-family: 'Outfit', sans-serif; font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
        .topic-desc { color: var(--text-gray); font-size: 0.9rem; line-height: 1.5; }
        .topic-tag { display: inline-block; margin-top: 1rem; padding: 0.25rem 0.75rem; background: var(--bg-light); border-radius: 20px; font-size: 0.8rem; color: var(--text-gray); }
        
        /* 专题详情 */
        .topic-detail { display: none; }
        .topic-detail.active { display: block; }
        .back-btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: var(--bg-white); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; margin-bottom: 1.5rem; text-decoration: none; color: var(--text-dark); }
        .back-btn:hover { background: var(--bg-light); }
        
        .topic-detail-content { background: var(--bg-white); border-radius: var(--radius); padding: 2rem; box-shadow: var(--shadow); }
        .topic-detail h2 { font-family: 'Outfit', sans-serif; font-size: 1.5rem; margin-bottom: 1rem; }
        .topic-detail p { line-height: 1.8; color: var(--text-gray); margin-bottom: 1rem; }
        .topic-detail ul { margin-left: 1.5rem; margin-bottom: 1rem; }
        .topic-detail li { margin-bottom: 0.5rem; line-height: 1.6; }
    </style>
</head>
<body>
    <nav></nav>

    <!-- 赞助商横条 -->
    <style>
    .sponsor-bar { background: linear-gradient(135deg, #1E293B 0%, #334155 100%); padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: center; gap: 1rem; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sponsor-label { font-size: 0.75rem; font-weight: 600; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 0.25rem; }
    .sponsor-label::before { content: "🤝"; }
    .sponsor-list { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .sponsor-item { display: flex; align-items: center; gap: 0.5rem; color: white; text-decoration: none; font-size: 0.9rem; font-weight: 500; padding: 0.4rem 0.75rem; border-radius: 6px; transition: all 0.2s; background: rgba(255,255,255,0.05); }
    .sponsor-item:hover { background: rgba(255,255,255,0.15); transform: translateY(-1px); }
    .sponsor-item.platinum { border-left: 3px solid #E5E4E2; }
    .sponsor-item.platinum .sponsor-tier { color: #E5E4E2; }
    .sponsor-item.gold { border-left: 3px solid #FFD700; }
    .sponsor-item.gold .sponsor-tier { color: #FFD700; }
    .sponsor-item.silver { border-left: 3px solid #C0C0C0; }
    .sponsor-item.silver .sponsor-tier { color: #C0C0C0; }
    .sponsor-logo { width: 24px; height: 24px; border-radius: 4px; object-fit: cover; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; }
    .sponsor-tier { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; opacity: 0.8; }
    .sponsor-empty { color: rgba(255,255,255,0.4); font-size: 0.85rem; }
    @media (max-width: 768px) { .sponsor-bar { padding: 0.6rem 1rem; } .sponsor-label { width: 100%; justify-content: center; margin-bottom: 0.5rem; } .sponsor-list { gap: 0.75rem; } .sponsor-item { font-size: 0.8rem; padding: 0.3rem 0.6rem; } }
    </style>
    <div class="sponsor-bar" id="sponsorBar">
        <div class="sponsor-label">赞助商</div>
        <div class="sponsor-list" id="sponsorList"><span class="sponsor-empty">加载中...</span></div>
    </div>
    <script>
    (function() {
        const API_BASE = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
        const TIER_ORDER = { 'platinum': 1, 'gold': 2, 'silver': 3 };
        async function loadSponsors() {
            try {
                const resp = await fetch(API_BASE + '/sponsors');
                const result = await resp.json();
                if (!result.ok || !result.data || result.data.length === 0) {
                    const homeResp = await fetch(API_BASE + '/');
                    const homeResult = await homeResp.json();
                    const sponsors = homeResult.data?.sponsors || [];
                    renderSponsors(sponsors);
                    return;
                }
                renderSponsors(result.data);
            } catch (e) { console.error('加载赞助商失败:', e); document.getElementById('sponsorList').innerHTML = '<span class="sponsor-empty">暂无赞助商</span>'; }
        }
        function renderSponsors(sponsors) {
            if (!sponsors || sponsors.length === 0) { document.getElementById('sponsorList').innerHTML = '<span class="sponsor-empty">暂无赞助商</span>'; return; }
            const sorted = [...sponsors].sort((a, b) => { const tierA = TIER_ORDER[a.tier?.toLowerCase()] || 99; const tierB = TIER_ORDER[b.tier?.toLowerCase()] || 99; return tierA - tierB; });
            const html = sorted.map(s => { const tier = (s.tier || 'silver').toLowerCase(); return `<a href="${s.website || '#'}" class="sponsor-item ${tier}" ${s.website ? 'target="_blank" rel="noopener"' : ''}><img class="sponsor-logo" src="${s.logo || ''}" alt="${s.name}" onerror="this.style.display='none'"><span>${s.name}</span><span class="sponsor-tier">${tier}</span></a>`; }).join('');
            document.getElementById('sponsorList').innerHTML = html;
        }
        loadSponsors();
    })();
    </script>

    <main

    <main class="container">
        <!-- 专题列表 -->
        <div id="topicsList" class="page-header">
            <h1 class="page-title">📚 专题</h1>
            <p style="color: var(--text-gray); margin-bottom: 1.5rem;">探索兰星少年的故事</p>
            
            <div class="topics-grid">
                <div class="topic-card" onclick="showTopic('purple-dragon')">
                    <div class="topic-cover purple">🐉</div>
                    <div class="topic-content">
                        <h3 class="topic-title">紫龙之路</h3>
                        <p class="topic-desc">记录兰星少年HADO战队的成长历程，从初创到崛起的每一步</p>
                        <span class="topic-tag">战队故事</span>
                    </div>
                </div>
                
                <div class="topic-card" onclick="showTopic('star-plan')">
                    <div class="topic-cover star">⭐</div>
                    <div class="topic-content">
                        <h3 class="topic-title">新星计划</h3>
                        <p class="topic-desc">发掘和培养HADO新人的培养计划，连接未来之星</p>
                        <span class="topic-tag">人才计划</span>
                    </div>
                </div>
                
                <div class="topic-card" onclick="showTopic('training-camp')">
                    <div class="topic-cover training">🎯</div>
                    <div class="topic-content">
                        <h3 class="topic-title">训练营</h3>
                        <p class="topic-desc">科学训练体系，技术提升指南，竞技水平进阶</p>
                        <span class="topic-tag">训练指导</span>
                    </div>
                </div>
                
                <div class="topic-card" onclick="showTopic('parent-guide')">
                    <div class="topic-cover parent">👨‍👩‍👧</div>
                    <div class="topic-content">
                        <h3 class="topic-title">家长指南</h3>
                        <p class="topic-desc">HADO入门知识，比赛观赛指南，亲子共同参与</p>
                        <span class="topic-tag">新人入门</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 专题详情 -->
        <div id="topicDetail" class="topic-detail">
            <a href="#" class="back-btn" onclick="hideTopic()">← 返回专题</a>
            <div class="topic-detail-content" id="topicContent"></div>
        </div>
    </main>

    <script>
    const topics = {
        'purple-dragon': {
            title: '紫龙之路',
            emoji: '🐉',
            coverClass: 'purple',
            sections: [
                { title: '关于我们', content: '兰星少年HADO俱乐部成立于2024年，是一支充满活力的年轻战队。我们的名字取自"兰"与"星"的结合，象征着球场上的闪耀与传承。' },
                { title: '发展历程', content: '从最初的几名爱好者到如今拥有完整训练体系的俱乐部，我们始终坚持"以赛代练、以练促学"的理念。' },
                { title: '未来展望', content: '致力于打造华南地区最具影响力的HADO青少年战队，培养更多优秀的电子竞技人才。' }
            ]
        },
        'star-plan': {
            title: '新星计划',
            emoji: '⭐',
            coverClass: 'star',
            sections: [
                { title: '计划简介', content: '新星计划是我们为发掘HADO潜力新人而设立的人才培养项目，旨在为青少年提供专业的训练指导和比赛机会。' },
                { title: '加入条件', content: '年龄8-16岁，对HADO有浓厚兴趣，每周能保证至少5小时训练时间。' },
                { title: '培养方向', content: '技术提升、战术理解、心理素质、团队配合全方位发展。' }
            ]
        },
        'training-camp': {
            title: '训练营',
            emoji: '🎯',
            coverClass: 'training',
            sections: [
                { title: '训练体系', content: '我们采用科学系统的训练方法，包括热身、技术训练、战术演练、对抗赛四个环节。' },
                { title: '技术重点', content: '包括能量球控制、护盾使用、移动走位、团队配合等核心技能。' },
                { title: '训练安排', content: '常规训练每周2-3次，寒暑假期间举办集中训练营。' }
            ]
        },
        'parent-guide': {
            title: '家长指南',
            emoji: '👨‍👩‍👧',
            coverClass: 'parent',
            sections: [
                { title: '什么是HADO', content: 'HADO是一款结合了增强现实(AR)和运动的创新电子竞技游戏，玩家通过佩戴AR设备进行对抗。' },
                { title: '观赛指南', content: '比赛通常分为3v3或4v4形式，每局3分钟，得分高者获胜。家长可以到场为孩子加油助威。' },
                { title: '常见问题', content: 'Q: HADO安全吗？A: 采用AR技术，无身体碰撞，安全系数高。\nQ: 如何报名？A: 详见"加入我们"页面。' }
            ]
        }
    };
    
    function showTopic(id) {
        const topic = topics[id];
        if (!topic) return;
        
        document.getElementById('topicsList').style.display = 'none';
        const detail = document.getElementById('topicDetail');
        detail.classList.add('active');
        
        document.getElementById('topicContent').innerHTML = `
            <div class="topic-cover ${topic.coverClass}" style="height: 120px; margin-bottom: 1.5rem; border-radius: 12px;">${topic.emoji}</div>
            <h1 style="font-family: 'Outfit', sans-serif; font-size: 2rem; margin-bottom: 1.5rem;">${topic.title}</h1>
            ${topic.sections.map(s => `
                <h2>${s.title}</h2>
                <p>${s.content}</p>
            `).join('')}
        `;
    }
    
    function hideTopic() {
        document.getElementById('topicsList').style.display = 'block';
        document.getElementById('topicDetail').classList.remove('active');
    }
    </script>
    <script src="/components/nav-loader.js"></script>
</body>
</html>
