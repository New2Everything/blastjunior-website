<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传照片 - BLXST</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B35; --primary-light: #FF8A5C; --secondary: #00B4D8; --bg-light: #F8FAFC; --bg-white: #FFFFFF; --text-dark: #1E293B; --text-gray: #64748B; --border: #E2E8F0; --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-light); color: var(--text-dark); min-height: 100vh; }
        
        .navbar { background: var(--bg-white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 800px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 64px; }
        .logo { display: flex; align-items: center; gap: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.25rem; text-decoration: none; color: var(--text-dark); }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.25rem; }
        .nav-right { display: flex; align-items: center; gap: 1rem; }
        
        .container { max-width: 600px; margin: 0 auto; padding: 2rem 1.5rem; }
        
        .page-title { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.75rem; margin-bottom: 0.5rem; }
        .page-desc { color: var(--text-gray); margin-bottom: 2rem; }
        
        .upload-card { background: var(--bg-white); border-radius: var(--radius); padding: 2rem; box-shadow: var(--shadow); }
        
        .dropzone { 
            border: 2px dashed var(--border); 
            border-radius: var(--radius); 
            padding: 3rem 2rem; 
            text-align: center; 
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 1.5rem;
        }
        .dropzone:hover, .dropzone.dragover { border-color: var(--primary); background: rgba(255,107,53,0.05); }
        .dropzone-icon { font-size: 3rem; margin-bottom: 1rem; }
        .dropzone-text { color: var(--text-gray); }
        .dropzone-text strong { color: var(--primary); }
        
        .preview-container { display: none; margin-bottom: 1.5rem; }
        .preview-container.show { display: block; }
        .preview-image { width: 100%; max-height: 300px; object-fit: contain; border-radius: 12px; background: var(--bg-light); }
        .preview-remove { display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-top: 0.75rem; padding: 0.5rem; background: #FEE2E2; color: #DC2626; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; width: 100%; }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; font-weight: 500; margin-bottom: 0.5rem; }
        .form-input { width: 100%; padding: 0.875rem 1rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; font-family: inherit; transition: border-color 0.2s; }
        .form-input:focus { outline: none; border-color: var(--primary); }
        .form-hint { color: var(--text-gray); font-size: 0.85rem; margin-top: 0.5rem; }
        
        .btn { padding: 0.875rem 1.5rem; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; font-size: 1rem; font-family: inherit; transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-light); }
        .btn-primary:disabled { background: var(--border); cursor: not-allowed; }
        
        .loading { display: none; text-align: center; padding: 3rem; }
        .loading.show { display: block; }
        .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--text-dark); color: white; padding: 0.75rem 1.5rem; border-radius: 8px; font-size: 0.9rem; opacity: 0; transition: all 0.3s; z-index: 1000; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { background: #10B981; }
        .toast.error { background: #DC2626; }
        
        .tabs { display: flex; background: var(--bg-white); border-radius: var(--radius); padding: 0.25rem; margin-bottom: 1.5rem; box-shadow: var(--shadow); }
        .tab { flex: 1; padding: 0.75rem; text-align: center; border-radius: 8px; font-weight: 500; cursor: pointer; transition: all 0.2s; text-decoration: none; color: var(--text-gray); }
        .tab.active { background: var(--primary); color: white; }
        
        .not-logged-in { text-align: center; padding: 4rem 2rem; }
        .not-logged-in h2 { font-family: 'Outfit', sans-serif; font-size: 1.5rem; margin-bottom: 1rem; }
        .not-logged-in p { color: var(--text-gray); margin-bottom: 1.5rem; }
        
        .result-card { display: none; text-align: center; padding: 2rem; }
        .result-card.show { display: block; }
        .result-icon { font-size: 4rem; margin-bottom: 1rem; }
        .result-title { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.5rem; margin-bottom: 0.5rem; }
        .result-desc { color: var(--text-gray); margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <div class="logo-icon">⚡</div>
                BLXST
            </a>
            <div class="nav-right" id="navRight"></div>
        </div>
    </nav>

    <!-- 赞助商横条 -->
    <style>
    .sponsor-bar { background: linear-gradient(135deg, #1E293B 0%, #334155 100%); padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: center; gap: 1rem; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sponsor-label { font-size: 0.75rem; font-weight: 600; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 0.25rem; }
    .sponsor-label::before { content: "🤝"; }
    .sponsor-list { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .sponsor-item { display: flex; align-items: center; gap: 0.5rem; color: white; text-decoration: none; font-size: 0.9rem; font-weight: 500; padding: 0.4rem 0.75rem; border-radius: 6px; transition: all 0.2s; background: rgba(255,255,255,0.05); }
    .sponsor-item:hover { background: rgba(255,255,255,0.15); transform: translateY(-1px); }
    .sponsor-item.platinum { border-left: 3px solid #E5E4E2; }
    .sponsor-item.platinum .sponsor-tier { color: #E5E4E2; }
    .sponsor-item.gold { border-left: 3px solid #FFD700; }
    .sponsor-item.gold .sponsor-tier { color: #FFD700; }
    .sponsor-item.silver { border-left: 3px solid #C0C0C0; }
    .sponsor-item.silver .sponsor-tier { color: #C0C0C0; }
    .sponsor-logo { width: 24px; height: 24px; border-radius: 4px; object-fit: cover; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; }
    .sponsor-tier { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; opacity: 0.8; }
    .sponsor-empty { color: rgba(255,255,255,0.4); font-size: 0.85rem; }
    @media (max-width: 768px) { .sponsor-bar { padding: 0.6rem 1rem; } .sponsor-label { width: 100%; justify-content: center; margin-bottom: 0.5rem; } .sponsor-list { gap: 0.75rem; } .sponsor-item { font-size: 0.8rem; padding: 0.3rem 0.6rem; } }
    </style>
    <div class="sponsor-bar" id="sponsorBar">
        <div class="sponsor-label">赞助商</div>
        <div class="sponsor-list" id="sponsorList"><span class="sponsor-empty">加载中...</span></div>
    </div>
    <script>
    (function() {
        const API_BASE = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
        const TIER_ORDER = { 'platinum': 1, 'gold': 2, 'silver': 3 };
        async function loadSponsors() {
            try {
                const resp = await fetch(API_BASE + '/sponsors');
                const result = await resp.json();
                if (!result.ok || !result.data || result.data.length === 0) {
                    const homeResp = await fetch(API_BASE + '/');
                    const homeResult = await homeResp.json();
                    const sponsors = homeResult.data?.sponsors || [];
                    renderSponsors(sponsors);
                    return;
                }
                renderSponsors(result.data);
            } catch (e) { console.error('加载赞助商失败:', e); document.getElementById('sponsorList').innerHTML = '<span class="sponsor-empty">暂无赞助商</span>'; }
        }
        function renderSponsors(sponsors) {
            if (!sponsors || sponsors.length === 0) { document.getElementById('sponsorList').innerHTML = '<span class="sponsor-empty">暂无赞助商</span>'; return; }
            const sorted = [...sponsors].sort((a, b) => { const tierA = TIER_ORDER[a.tier?.toLowerCase()] || 99; const tierB = TIER_ORDER[b.tier?.toLowerCase()] || 99; return tierA - tierB; });
            const html = sorted.map(s => { const tier = (s.tier || 'silver').toLowerCase(); return \`<a href="\${s.website || '#'}" class="sponsor-item \${tier}" \${s.website ? 'target="_blank" rel="noopener"' : ''}><img class="sponsor-logo" src="\${s.logo || ''}" alt="\${s.name}" onerror="this.style.display='none'"><span>\${s.name}</span><span class="sponsor-tier">\${tier}</span></a>\`; }).join('');
            document.getElementById('sponsorList').innerHTML = html;
        }
        loadSponsors();
    })();
    </script>

    <div class="container">
        <div class="tabs">
            <a href="/upload-photo.html" class="tab active">上传照片</a>
            <a href="/upload-news.html" class="tab">新闻投稿</a>
            <a href="/my-uploads.html" class="tab">我的上传</a>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p style="margin-top: 1rem; color: var(--text-gray);">加载中...</p>
        </div>

        <div id="notLoggedIn" class="not-logged-in" style="display: none;">
            <h2>请先登录</h2>
            <p>登录后可上传照片和新闻投稿</p>
            <a href="/login" class="btn btn-primary" style="width: auto; padding: 0.75rem 2rem;">去登录</a>
        </div>

        <div id="uploadContent">
            <h1 class="page-title">上传照片</h1>
            <p class="page-desc">分享你拍摄的比赛照片，上传后需经AI审核</p>
            
            <div class="upload-card">
                <div class="dropzone" id="dropzone">
                    <div class="dropzone-icon">📷</div>
                    <p class="dropzone-text">拖拽图片到这里，或 <strong>点击选择</strong></p>
                    <p class="form-hint">支持 JPG、PNG 格式，最大 10MB</p>
                </div>
                <input type="file" id="fileInput" accept="image/*" style="display: none;">
                
                <div class="preview-container" id="previewContainer">
                    <img id="previewImage" class="preview-image" alt="预览">
                    <button class="preview-remove" id="removePreview">✕ 移除图片</button>
                </div>
                
                <div class="form-group">
                    <label class="form-label">标题（可选）</label>
                    <input type="text" id="titleInput" class="form-input" placeholder="给照片起个标题">
                </div>
                
                <button id="submitBtn" class="btn btn-primary" disabled>
                    提交上传
                </button>
            </div>
            
            <div class="result-card" id="resultCard">
                <div class="result-icon">✅</div>
                <div class="result-title">上传成功！</div>
                <p class="result-desc">你的照片已通过AI审核并发布</p>
                <a href="/upload-photo.html" class="btn btn-primary">继续上传</a>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const API_BASE = '/blast-upload-api';
        let selectedFile = null;
        let user = null;

        // 检查登录状态
        async function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) return null;
            
            try {
                const res = await fetch('/blast-auth-api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'profile' })
                });
                const data = await res.json();
                if (data.ok) {
                    user = data.user;
                    return user;
                }
            } catch (e) {
                console.error('Auth check failed:', e);
            }
            return null;
        }

        // 更新导航栏
        function updateNav(user) {
            const navRight = document.getElementById('navRight');
            if (user) {
                navRight.innerHTML = `
                    <a href="/profile.html" class="btn btn-outline">${user.username}</a>
                `;
            } else {
                navRight.innerHTML = `
                    <a href="/login" class="btn btn-outline">登录</a>
                    <a href="/register" class="btn btn-primary">注册</a>
                `;
            }
        }

        // 初始化
        async function init() {
            document.getElementById('loading').classList.add('show');
            
            user = await checkAuth();
            
            document.getElementById('loading').classList.remove('show');
            
            if (!user) {
                document.getElementById('notLoggedIn').style.display = 'block';
                document.getElementById('uploadContent').style.display = 'none';
                updateNav(null);
                return;
            }
            
            updateNav(user);
            setupDropzone();
        }

        // 设置拖拽上传
        function setupDropzone() {
            const dropzone = document.getElementById('dropzone');
            const fileInput = document.getElementById('fileInput');
            
            dropzone.addEventListener('click', () => fileInput.click());
            
            dropzone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropzone.classList.add('dragover');
            });
            
            dropzone.addEventListener('dragleave', () => {
                dropzone.classList.remove('dragover');
            });
            
            dropzone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropzone.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (file) handleFile(file);
            });
            
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) handleFile(file);
            });
            
            document.getElementById('removePreview').addEventListener('click', () => {
                selectedFile = null;
                document.getElementById('previewContainer').classList.remove('show');
                document.getElementById('submitBtn').disabled = true;
            });
            
            document.getElementById('submitBtn').addEventListener('click', submitUpload);
        }

        // 处理选择的文件
        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showToast('请选择图片文件', 'error');
                return;
            }
            
            if (file.size > 10 * 1024 * 1024) {
                showToast('图片大小不能超过10MB', 'error');
                return;
            }
            
            selectedFile = file;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('previewImage').src = e.target.result;
                document.getElementById('previewContainer').classList.add('show');
                document.getElementById('submitBtn').disabled = false;
            };
            reader.readAsDataURL(file);
        }

        // 提交上传
        async function submitUpload() {
            if (!selectedFile) return;
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '上传中...';
            
            try {
                // 1. 获取预签名URL
                const presignRes = await fetch(`${API_BASE}/presign`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({
                        filename: selectedFile.name,
                        upload_type: 'photo'
                    })
                });
                
                const presignData = await presignRes.json();
                if (!presignData.ok) {
                    throw new Error(presignData.error || '获取上传链接失败');
                }
                
                // 2. 上传到R2
                const uploadRes = await fetch(presignData.upload_url, {
                    method: 'PUT',
                    body: selectedFile
                });
                
                if (!uploadRes.ok) {
                    throw new Error('文件上传失败');
                }
                
                // 3. 提交到数据库
                const title = document.getElementById('titleInput').value.trim();
                const fileUrl = `https://blastjunior-media.${presignData.key.includes('520d5c63-ba38-46db-b4b9-ac3a15e1c298') ? '520d5c63-ba38-46db-b4b9-ac3a15e1c298' : 'blastjunior-media'}.r2.cloudflarestorage.com/${presignData.key}`;
                
                const submitRes = await fetch(`${API_BASE}/uploads`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({
                        upload_type: 'photo',
                        title: title || null,
                        file_url: fileUrl
                    })
                });
                
                const submitData = await submitRes.json();
                
                if (submitData.ok) {
                    document.getElementById('uploadContent').querySelector('.upload-card').style.display = 'none';
                    document.getElementById('resultCard').classList.add('show');
                    showToast('上传成功！', 'success');
                } else {
                    throw new Error(submitData.error || '提交失败');
                }
            } catch (err) {
                showToast(err.message, 'error');
                btn.disabled = false;
                btn.textContent = '提交上传';
            }
        }

        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        init();
    </script>
    <script src="/components/nav-loader.js"></script>
</body>
</html>
