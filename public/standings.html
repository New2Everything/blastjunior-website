<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>积分榜 - 兰星少年 HADO 俱乐部</title>
    <!-- DATA_MODULE: standings -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B35; --secondary: #00B4D8; --bg-light: #F8FAFC; --bg-white: #FFFFFF; --text-dark: #1E293B; --text-gray: #64748B; --border: #E2E8F0; --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px; --gold: #FFD700; --silver: #C0C0C0; --bronze: #CD7F32; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-light); color: var(--text-dark); }
        nav { background: var(--bg-white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 64px; }
        .logo { display: flex; align-items: center; gap: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.25rem; text-decoration: none; color: var(--text-dark); }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), #FF8A5C); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; }
        .nav-links { display: flex; gap: 0.5rem; }
        .nav-link { padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; color: var(--text-gray); font-weight: 500; transition: all 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        .page-title { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 900; margin-bottom: 1.5rem; }
        
        /* 积分榜 - 方案A */
        .standings-card { background: var(--bg-white); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
        .standings-header { background: linear-gradient(135deg, var(--primary), #FF8A5C); color: white; padding: 1.5rem; }
        .standings-header h2 { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 700; }
        .standings-header p { opacity: 0.9; margin-top: 0.5rem; }
        
        .standings-table { width: 100%; border-collapse: collapse; }
        .standings-table th { background: #FFF5F2; padding: 1rem; text-align: left; font-weight: 600; color: var(--text-gray); font-size: 0.85rem; text-transform: uppercase; }
        .standings-table td { padding: 1rem; border-bottom: 1px solid var(--border); }
        .standings-table tr:last-child td { border-bottom: none; }
        
        .rank-cell { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.25rem; width: 60px; }
        .rank-1 { color: var(--gold); }
        .rank-2 { color: var(--silver); }
        .rank-3 { color: var(--bronze); }
        
        .team-cell { display: flex; align-items: center; gap: 0.75rem; }
        .team-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--secondary), #00D4FF); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.25rem; }
        .team-name { font-weight: 600; }
        
        .points-cell { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.1rem; color: var(--primary); }
        
        .rounds-cell { color: var(--text-gray); font-size: 0.9rem; }
        
        /* 说明区域 */
        .rules-section { margin-top: 2rem; background: var(--bg-white); border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow); }
        .rules-section h3 { font-family: 'Outfit', sans-serif; font-size: 1.1rem; margin-bottom: 1rem; }
        .rules-list { list-style: none; }
        .rules-list li { padding: 0.5rem 0; color: var(--text-gray); border-bottom: 1px solid var(--border); }
        .rules-list li:last-child { border-bottom: none; }
        .rules-list li::before { content: "✓"; color: var(--success); margin-right: 0.5rem; }
        
        .loading { text-align: center; padding: 3rem; color: var(--text-gray); }
        .empty { text-align: center; padding: 3rem; color: var(--text-gray); }
        
        /* Tooltip样式 */
        .tooltip { position: relative; cursor: help; display: inline-flex; align-items: center; gap: 0.25rem; }
        .tooltip::after { content: "ℹ️"; font-size: 0.75rem; opacity: 0.6; }
        .tooltip:hover::before { content: attr(data-tip); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: var(--text-dark); color: white; padding: 0.5rem 0.75rem; border-radius: 8px; font-size: 0.75rem; white-space: nowrap; z-index: 1000; box-shadow: var(--shadow); margin-bottom: 0.5rem; font-weight: 400; }
        .tooltip:hover::after { opacity: 1; }
    </style>
</head>
<body>
    <nav></nav>

    <!-- 赞助商横条 -->
    <style>
    .sponsor-bar { background: linear-gradient(135deg, #1E293B 0%, #334155 100%); padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: center; gap: 1rem; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sponsor-label { font-size: 0.75rem; font-weight: 600; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 0.25rem; }
    .sponsor-label::before { content: "🤝"; }
    .sponsor-list { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .sponsor-item { display: flex; align-items: center; gap: 0.5rem; color: white; text-decoration: none; font-size: 0.9rem; font-weight: 500; padding: 0.4rem 0.75rem; border-radius: 6px; transition: all 0.2s; background: rgba(255,255,255,0.05); }
    .sponsor-item:hover { background: rgba(255,255,255,0.15); transform: translateY(-1px); }
    .sponsor-item.platinum { border-left: 3px solid #E5E4E2; }
    .sponsor-item.platinum .sponsor-tier { color: #E5E4E2; }
    .sponsor-item.gold { border-left: 3px solid #FFD700; }
    .sponsor-item.gold .sponsor-tier { color: #FFD700; }
    .sponsor-item.silver { border-left: 3px solid #C0C0C0; }
    .sponsor-item.silver .sponsor-tier { color: #C0C0C0; }
    .sponsor-logo { width: 24px; height: 24px; border-radius: 4px; object-fit: cover; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; }
    .sponsor-tier { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; opacity: 0.8; }
    .sponsor-empty { color: rgba(255,255,255,0.4); font-size: 0.85rem; }
    @media (max-width: 768px) { .sponsor-bar { padding: 0.6rem 1rem; } .sponsor-label { width: 100%; justify-content: center; margin-bottom: 0.5rem; } .sponsor-list { gap: 0.75rem; } .sponsor-item { font-size: 0.8rem; padding: 0.3rem 0.6rem; } }
    </style>
    <div class="sponsor-bar" id="sponsorBar">
        <div class="sponsor-label">赞助商</div>
        <div class="sponsor-list" id="sponsorList"><span class="sponsor-empty">加载中...</span></div>
    </div>
    <script>
    (function() {
        const API_BASE = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
        const TIER_ORDER = { 'platinum': 1, 'gold': 2, 'silver': 3 };
        async function loadSponsors() {
            try {
                const resp = await fetch(API_BASE + '/sponsors');
                const result = await resp.json();
                if (!result.ok || !result.data || result.data.length === 0) {
                    const homeResp = await fetch(API_BASE + '/');
                    const homeResult = await homeResp.json();
                    const sponsors = homeResult.data?.sponsors || [];
                    renderSponsors(sponsors);
                    return;
                }
                renderSponsors(result.data);
            } catch (e) { console.error('加载赞助商失败:', e); document.getElementById('sponsorList').innerHTML = '<span class="sponsor-empty">暂无赞助商</span>'; }
        }
        function renderSponsors(sponsors) {
            if (!sponsors || sponsors.length === 0) { document.getElementById('sponsorList').innerHTML = '<span class="sponsor-empty">暂无赞助商</span>'; return; }
            const sorted = [...sponsors].sort((a, b) => { const tierA = TIER_ORDER[a.tier?.toLowerCase()] || 99; const tierB = TIER_ORDER[b.tier?.toLowerCase()] || 99; return tierA - tierB; });
            const html = sorted.map(s => { const tier = (s.tier || 'silver').toLowerCase(); return `<a href="${s.website || '#'}" class="sponsor-item ${tier}" ${s.website ? 'target="_blank" rel="noopener"' : ''}><img class="sponsor-logo" src="${s.logo || ''}" alt="${s.name}" onerror="this.style.display='none'"><span>${s.name}</span><span class="sponsor-tier">${tier}</span></a>`; }).join('');
            document.getElementById('sponsorList').innerHTML = html;
        }
        loadSponsors();
    })();
    </script>

    <main

    <main class="container">
        <h1 class="page-title">积分榜</h1>
        
        <!-- 赛季选择 -->
        <div style="margin-bottom: 1rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;">
            <label for="seasonSelect" style="font-weight: 500;">选择赛季：</label>
            <select id="seasonSelect" onchange="changeSeason()" style="padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; font-family: inherit; cursor: pointer; min-width: 200px;">
                <option value="">加载中...</option>
            </select>
        </div>
        
        <!-- DATA_MODULE: standings -->
        <div class="standings-card">
            <div class="standings-header">
                <h2 id="standingsTitle">🏆 积分榜</h2>
                <p id="standingsDesc">加载中...</p>
            </div>
            <table class="standings-table">
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>战队</th>
                        <th><span class="tooltip" data-tip="当前赛季所有比赛的总得分">总积分 ℹ️</span></th>
                        <th><span class="tooltip" data-tip="该战队在本赛季参加的场次数">参赛场次 ℹ️</span></th>
                    </tr>
                </thead>
                <tbody id="standingsBody">
                    <tr><td colspan="4" class="loading">加载积分榜数据...</td></tr>
                </tbody>
            </table>
        </div>
        
        <!-- 积分规则说明 -->
        <div class="rules-section">
            <h3>📋 积分规则说明</h3>
            <ul class="rules-list" id="rulesList">
                <li>加载中...</li>
            </ul>
        </div>
    </main>

    <script>
        const API_BASE = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
        
        // 当前选中的赛季
        let currentSeason = '';
        
        // 加载赛季列表
        async function loadSeasons() {
            try {
                const resp = await fetch(API_BASE + '/seasons');
                const result = await resp.json();
                
                if (!result.ok || !result.data) {
                    return;
                }
                
                const seasons = result.data;
                const select = document.getElementById('seasonSelect');
                
                // 构建选项（进行中的赛季放前面）
                const ongoing = seasons.filter(s => s.status === 'ongoing');
                const finished = seasons.filter(s => s.status !== 'ongoing');
                
                let optionsHtml = '';
                if (ongoing.length > 0) {
                    optionsHtml += `<optgroup label="🏃 进行中">`;
                    ongoing.forEach(s => {
                        const selected = s.id === currentSeason ? 'selected' : '';
                        const label = s.displayName || s.name;
                        const cat = s.category ? `（${s.category}）` : '';
                        optionsHtml += `<option value="${s.id}" ${selected}>${label}${cat}</option>`;
                    });
                    optionsHtml += `</optgroup>`;
                }
                if (finished.length > 0) {
                    optionsHtml += `<optgroup label="✅ 已结束">`;
                    finished.forEach(s => {
                        const selected = s.id === currentSeason ? 'selected' : '';
                        const label = s.displayName || s.name;
                        const cat = s.category ? `（${s.category}）` : '';
                        optionsHtml += `<option value="${s.id}" ${selected}>${label}${cat}</option>`;
                    });
                    optionsHtml += `</optgroup>`;
                }
                
                select.innerHTML = optionsHtml;
                
                // 默认选中当前赛季
                if (!currentSeason && ongoing.length > 0) {
                    currentSeason = ongoing[0].id;
                    select.value = currentSeason;
                } else if (!currentSeason && seasons.length > 0) {
                    currentSeason = seasons[0].id;
                    select.value = currentSeason;
                }
                
                // 加载积分榜
                loadStandings();
            } catch (e) {
                console.error('loadSeasons error:', e);
                document.getElementById('seasonSelect').innerHTML = '<option value="">加载失败</option>';
                loadStandings();
            }
        }
        
        // 切换赛季
        function changeSeason() {
            currentSeason = document.getElementById('seasonSelect').value;
            loadStandings();
        }
        
        async function loadStandings() {
            try {
                // 使用standings-v2 API，支持season参数
                const url = currentSeason 
                    ? `${API_BASE}/standings-v2?season=${currentSeason}`
                    : `${API_BASE}/standings-v2`;
                const resp = await fetch(url);
                const result = await resp.json();
                
                if (!result.ok) {
                    document.getElementById('standingsBody').innerHTML = '<tr><td colspan="4" class="empty">数据加载失败</td></tr>';
                    return;
                }
                
                const data = result.data || [];
                const meta = result.meta || {};
                
                // 更新页面标题和描述
                const seasonName = meta.seasonName || 'HPL联赛';
                const seasonId = meta.seasonId || '';
                document.getElementById('standingsTitle').textContent = `🏆 ${seasonName}积分榜`;
                document.getElementById('standingsDesc').textContent = meta.description || '联赛总积分';
                
                // 更新积分规则说明
                const rulesList = document.getElementById('rulesList');
                const rulesHtml = `
                    <li><span class="tooltip" data-tip="当前赛季所有比赛的总得分">总积分</span>：${seasonName}总积分，每个赛季独立计算</li>
                    <li><span class="tooltip" data-tip="每参加一场比赛获得的平均得分">场均积分</span>：总积分 ÷ 参赛场次</li>
                    <li>比赛形式：3v3标准比赛，每局3分钟</li>
                    <li>赛事类型：${meta.description || '联赛'} ${meta.seasonType === 'cup' ? '🏆 杯赛单独计分' : '🏅 联赛'}</li>
                    <li>数据来源：blast-campaigns-db（动态查询）</li>
                    <li>更新周期：每周更新一次</li>
                `;
                rulesList.innerHTML = rulesHtml;
                
                if (data.length === 0) {
                    document.getElementById('standingsBody').innerHTML = '<tr><td colspan="4" class="empty">暂无积分数据</td></tr>';
                    return;
                }
                
                document.getElementById('standingsBody').innerHTML = data.map(item => {
                    const rankClass = item.rank <= 3 ? `rank-${item.rank}` : '';
                    return `<tr>
                        <td class="rank-cell ${rankClass}">#${item.rank}</td>
                        <td>
                            <div class="team-cell">
                                <div class="team-icon">🏃</div>
                                <span class="team-name">${item.team}</span>
                            </div>
                        </td>
                        <td class="points-cell">${item.points}</td>
                        <td class="rounds-cell">${item.rounds ? item.rounds + '场' : '-'}</td>
                    </tr>`;
                }).join('');
            } catch (e) {
                console.error(e);
                document.getElementById('standingsBody').innerHTML = '<tr><td colspan="4" class="empty">数据加载失败</td></tr>';
            }
        }
        
        loadSeasons();
    </script>
    <script src="/components/nav-loader.js"></script>
</body>
</html>
