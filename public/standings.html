<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赛季积分榜 - 兰星少年 HADO 俱乐部</title>
  <meta name="theme-color" content="#FF6B35">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/components/nav-loader.js"></script>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1 class="page-title">📊 赛季积分榜</h1>
      <p class="page-subtitle">各战队赛季表现</p>
    </div>

    <div class="section">
      <div id="seasonsList" style="margin-bottom:1.5rem;display:flex;gap:0.5rem;flex-wrap:wrap;"></div>
      <div id="scoresWrap">
        <div style="text-align:center;padding:2rem;color:var(--text-gray);"><span class="spinner"></span>加载中...</div>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://blast-api.kanjiaming2022.workers.dev';
    let seasons = [];
    let currentSeason = null;

    async function loadSeasons() {
      try {
        const res = await fetch(API + '/seasons', {
          headers: { 'Origin': 'https://blastjunior.com' }
        });
        const result = await res.json();
        seasons = result.data || [];
        renderSeasonTabs();
        if (seasons.length > 0) {
          selectSeason(seasons.find(s => s.status === 'ongoing') || seasons[0]);
        } else {
          document.getElementById('scoresWrap').innerHTML = '<div class="empty-state"><div class="empty-state-icon">📊</div><div>暂无赛季</div></div>';
        }
      } catch (e) {
        document.getElementById('scoresWrap').innerHTML = '<div class="error-state">加载失败</div>';
      }
    }

    function renderSeasonTabs() {
      const el = document.getElementById('seasonsList');
      el.innerHTML = seasons.map(s => {
        const label = s.status === 'ongoing' ? '进行中' : s.status === 'upcoming' ? '即将开始' : '已结束';
        const color = s.status === 'ongoing' ? 'var(--primary)' : 'var(--text-gray)';
        return `<button onclick="selectSeason(${JSON.stringify(s).replace(/"/g, '&quot;')})" style="padding:0.5rem 1rem;border:1px solid var(--border);border-radius:20px;background:none;cursor:pointer;font-weight:500;color:${color};border-color:${color};">${s.name} <span style="font-size:0.75rem;">(${label})</span></button>`;
      }).join('');
    }

    async function selectSeason(season) {
      currentSeason = season;
      renderSeasonTabs();
      
      try {
        const res = await fetch(API + '/seasons/' + season.id + '/scores', {
          headers: { 'Origin': 'https://blastjunior.com' }
        });
        const result = await res.json();
        renderScores(result.data || [], season);
      } catch (e) {
        document.getElementById('scoresWrap').innerHTML = '<div class="error-state">加载失败</div>';
      }
    }

    function renderScores(scores, season) {
      const wrap = document.getElementById('scoresWrap');
      
      if (!scores.length) {
        wrap.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📊</div><div>暂无 ${season.name} 积分数据</div></div>`;
        return;
      }

      const html = `
        <div class="card" style="overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th style="width:50px;">排名</th>
                <th>战队</th>
                <th>胜</th>
                <th>平</th>
                <th>负</th>
                <th>进球</th>
                <th>失球</th>
                <th style="width:80px;">积分</th>
              </tr>
            </thead>
            <tbody>
              ${scores.map((s, i) => `
                <tr>
                  <td><strong style="color:${i < 3 ? 'var(--primary)' : 'inherit'};">${s.rank || i + 1}</strong></td>
                  <td><a href="/team-detail.html?id=${s.team_id}" style="color:var(--primary);font-weight:600;">${s.team_name || '未知'}</a></td>
                  <td>${s.wins || 0}</td>
                  <td>${s.draws || 0}</td>
                  <td>${s.losses || 0}</td>
                  <td>${s.goals_for || 0}</td>
                  <td>${s.goals_against || 0}</td>
                  <td><strong style="color:var(--primary);">${s.points || 0}</strong></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;

      wrap.innerHTML = html;
    }

    loadSeasons();
  </script>
</body>
</html>
