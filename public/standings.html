<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>积分榜 - 兰星少年 HADO 俱乐部</title>
  <meta name="description" content="兰星少年 HADO 俱乐部积分榜">
  <meta name="theme-color" content="#FF6B35">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/components/nav-loader.js"></script>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1 class="page-title">📊 积分榜</h1>
      <p class="page-subtitle">战队排名实时更新</p>
    </div>

    <div class="section">
      <div class="card" style="overflow-x:auto;" id="standingsWrap">
        <div style="text-align:center;color:var(--text-gray);"><span class="spinner"></span>加载中</div>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://blast-homepage-api.kanjiaming2022.workers.dev';

    async function loadStandings() {
      try {
        const res = await fetch(API + '/standings');
        const result = await res.json();
        renderStandings(result.data || []);
      } catch (e) {
        document.getElementById('standingsWrap').innerHTML = '<div class="error-state">加载失败</div>';
      }
    }

    function renderStandings(data) {
      const wrap = document.getElementById('standingsWrap');
      if (!data.length) {
        wrap.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📊</div><div>暂无积分数据</div></div>';
        return;
      }

      let html = '<table><thead><tr><th>#</th><th>战队</th><th>胜</th><th>平</th><th>负</th><th>积分</th></tr></thead><tbody>';
      data.forEach((item, i) => {
        html += `
          <tr>
            <td><strong>${i + 1}</strong></td>
            <td><a href="/team-detail.html?id=${item.team_id}" style="color:var(--primary);font-weight:600;">${item.name || item.team_name || ''}</a></td>
            <td>${item.wins || item.win || 0}</td>
            <td>${item.draws || item.draw || 0}</td>
            <td>${item.losses || item.loss || 0}</td>
            <td><strong style="color:var(--primary);">${item.points || 0}</strong></td>
          </tr>
        `;
      });
      html += '</tbody></table>';
      wrap.innerHTML = html;
    }

    loadStandings();
  </script>
</body>
</html>
