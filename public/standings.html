<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赛季积分榜 - 兰星少年 HADO 俱乐部</title>
  <meta name="theme-color" content="#FF6B35">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/components/nav-loader.js"></script>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1 class="page-title">📊 赛季积分榜</h1>
      <p class="page-subtitle">各战队赛季表现</p>
    </div>

    <div class="section">
      <div id="seasonsList" style="margin-bottom:1.5rem;display:flex;gap:0.5rem;flex-wrap:wrap;"></div>
      <div id="scoresWrap">
        <div style="text-align:center;padding:2rem;color:var(--text-gray);"><span class="spinner"></span>加载中...</div>
      </div>
    </div>
  </div>

  <script>
    const DATA_API = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
    let seasons = [];
    let currentSeasonId = null;
    let allStandings = {};

    async function loadData() {
      try {
        // 获取赛季列表
        const seasonsRes = await fetch(DATA_API + '/seasons', {
          headers: { 'Origin': 'https://blastjunior.com' }
        });
        const seasonsData = await seasonsRes.json();
        seasons = seasonsData.data || [];
        
        // 获取所有 standings-v2 数据
        const standingsRes = await fetch(DATA_API + '/standings-v2', {
          headers: { 'Origin': 'https://blastjunior.com' }
        });
        const standingsData = await standingsRes.json();
        
        if (standingsData.ok && standingsData.data) {
          // 按赛季分组
          const seasonId = standingsData.meta?.seasonId || 'current';
          allStandings[seasonId] = standingsData.data;
          currentSeasonId = seasonId;
        }
        
        renderSeasonTabs();
        renderStandings();
      } catch (e) {
        document.getElementById('scoresWrap').innerHTML = '<div class="error-state">加载失败</div>';
      }
    }

    function renderSeasonTabs() {
      const el = document.getElementById('seasonsList');
      if (!seasons.length) {
        // 没有赛季数据时显示默认
        el.innerHTML = '<button style="padding:0.5rem 1rem;border:1px solid var(--primary);border-radius:20px;background:var(--primary);color:white;cursor:default;">当前赛季</button>';
        return;
      }
      
      el.innerHTML = seasons.map(s => {
        const label = s.status === 'ongoing' ? '进行中' : s.status === 'upcoming' ? '即将开始' : '已结束';
        const isActive = s.id === currentSeasonId || (!currentSeasonId && s.status === 'ongoing');
        const style = isActive 
          ? 'border-color:var(--primary);background:var(--primary);color:white;' 
          : 'border-color:var(--border);background:none;';
        return `<button onclick="selectSeason('${s.id}')" style="padding:0.5rem 1rem;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-weight:500;${style}">${s.name} <span style="font-size:0.75rem;">(${label})</span></button>`;
      }).join('');
    }

    function selectSeason(seasonId) {
      currentSeasonId = seasonId;
      renderSeasonTabs();
      renderStandings();
    }

    function renderStandings() {
      const wrap = document.getElementById('scoresWrap');
      const scores = allStandings[currentSeasonId] || allStandings['current'] || [];
      const season = seasons.find(s => s.id === currentSeasonId);
      
      if (!scores.length) {
        wrap.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📊</div><div>暂无 ${season?.name || ''} 积分数据</div></div>`;
        return;
      }

      const html = `
        <div class="card" style="overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th style="width:50px;">排名</th>
                <th>战队</th>
                <th>联赛</th>
                <th>杯赛</th>
                <th>出场</th>
                <th style="width:80px;">积分</th>
              </tr>
            </thead>
            <tbody>
              ${scores.map((s, i) => `
                <tr>
                  <td><strong style="color:${i < 3 ? 'var(--primary)' : 'inherit'};">${s.rank || i + 1}</strong></td>
                  <td><a href="/team-detail.html?id=${s.team_id}" style="color:var(--primary);font-weight:600;">${s.team || '未知'}</a></td>
                  <td>${s.isLeague ? '🏆' : '-'}</td>
                  <td>${s.isCup ? '🏅' : '-'}</td>
                  <td>${s.rounds || 0}</td>
                  <td><strong style="color:var(--primary);">${s.points || 0}</strong></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;

      wrap.innerHTML = html;
    }

    loadData();
  </script>
</body>
</html>
