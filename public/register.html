<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - BLXST</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B35; --primary-light: #FF8A5C; --secondary: #00B4D8; --bg-light: #F8FAFC; --bg-white: #FFFFFF; --text-dark: #1E293B; --text-gray: #64748B; --border: #E2E8F0; --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-light); color: var(--text-dark); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .auth-container { width: 100%; max-width: 400px; padding: 2rem; }
        .auth-card { background: var(--bg-white); border-radius: var(--radius); padding: 2rem; box-shadow: var(--shadow); }
        .auth-header { text-align: center; margin-bottom: 2rem; }
        .auth-logo { display: inline-flex; align-items: center; gap: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.5rem; text-decoration: none; color: var(--text-dark); margin-bottom: 1.5rem; }
        .logo-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; }
        .auth-title { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.5rem; margin-bottom: 0.5rem; }
        .auth-subtitle { color: var(--text-gray); font-size: 0.9rem; }
        
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; font-weight: 500; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .form-input { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; font-family: inherit; transition: all 0.2s; }
        .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,107,53,0.1); }
        
        .btn { width: 100%; padding: 0.875rem; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; font-size: 1rem; font-family: inherit; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-light); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .auth-footer { text-align: center; margin-top: 1.5rem; color: var(--text-gray); font-size: 0.9rem; }
        .auth-footer a { color: var(--primary); text-decoration: none; font-weight: 500; }
        .auth-footer a:hover { text-decoration: underline; }
        
        .error-msg { background: #FEF2F2; color: #DC2626; padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; display: none; }
        .error-msg.show { display: block; }
        
        .loading { display: none; text-align: center; padding: 1rem; }
        .loading.show { display: block; }
        .spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--text-dark); color: white; padding: 0.75rem 1.5rem; border-radius: 8px; font-size: 0.9rem; opacity: 0; transition: all 0.3s; z-index: 1000; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { background: #10B981; }
        .toast.error { background: #DC2626; }
        
        .password-hint { font-size: 0.8rem; color: var(--text-gray); margin-top: 0.25rem; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="/" class="auth-logo">
                    <div class="logo-icon">⚡</div>
                    BLXST
                </a>
                <h1 class="auth-title">注册</h1>
                <p class="auth-subtitle">创建账号（邮箱 + 6位数字密码）</p>
            </div>
            
            <div id="errorMsg" class="error-msg"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label">邮箱</label>
                    <input type="email" class="form-input" id="email" placeholder="your@email.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">昵称（可选）</label>
                    <input type="text" class="form-input" id="nickname" placeholder="默认使用邮箱前缀" maxlength="20">
                </div>
                
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="password" placeholder="6位数字密码" maxlength="6" required>
                    <p class="password-hint">请设置6位数字密码</p>
                </div>
                
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                </div>
                
                <button type="submit" class="btn btn-primary" id="registerBtn">注册</button>
            </form>
            
            <div class="auth-footer">
                已有账号？<a href="/login">立即登录</a>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script>
        const API_BASE = 'https://blast-auth-api.kanjiaming2022.workers.dev';
        
        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.className = 'toast', 3000);
        }
        
        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('show');
        }
        
        function hideError() {
            document.getElementById('errorMsg').classList.remove('show');
        }
        
        function setLoading(loading) {
            document.getElementById('loading').classList.toggle('show', loading);
            document.getElementById('registerBtn').disabled = loading;
        }
        
        // 注册
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            setLoading(true);
            
            const email = document.getElementById('email').value.trim();
            const nickname = document.getElementById('nickname').value.trim();
            const password = document.getElementById('password').value.trim();
            
            // 验证密码是6位数字
            if (!/^\d{6}$/.test(password)) {
                showError('密码必须是6位数字');
                setLoading(false);
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email, 
                        password,
                        nickname: nickname || undefined
                    })
                });
                const data = await res.json();
                
                if (data.ok) {
                    localStorage.setItem('blxst_token', data.token);
                    localStorage.setItem('blxst_user', JSON.stringify(data.user));
                    showToast('注册成功', 'success');
                    setTimeout(() => window.location.href = '/profile', 1000);
                } else {
                    showError(data.error || '注册失败');
                }
            } catch (e) {
                showError('网络错误');
            }
            setLoading(false);
        });
        
        // 检查是否已登录
        const token = localStorage.getItem('blxst_token');
        if (token) {
            window.location.href = '/profile';
        }
    </script>
    <script src="/components/nav-loader.js"></script>
</body>
</html>
