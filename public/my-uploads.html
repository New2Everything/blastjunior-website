<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的上传 - BLXST</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B35; --primary-light: #FF8A5C; --secondary: #00B4D8; --bg-light: #F8FAFC; --bg-white: #FFFFFF; --text-dark: #1E293B; --text-gray: #64748B; --border: #E2E8F0; --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-light); color: var(--text-dark); min-height: 100vh; }
        
        .navbar { background: var(--bg-white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 800px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 64px; }
        .logo { display: flex; align-items: center; gap: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.25rem; text-decoration: none; color: var(--text-dark); }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.25rem; }
        .nav-right { display: flex; align-items: center; gap: 1rem; }
        
        .container { max-width: 700px; margin: 0 auto; padding: 2rem 1.5rem; }
        
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
        .page-title { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.75rem; }
        
        .btn { padding: 0.5rem 1rem; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; font-size: 0.9rem; font-family: inherit; transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-light); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-gray); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-danger { background: #DC2626; color: white; }
        .btn-danger:hover { background: #B91C1C; }
        
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--bg-white); border-radius: var(--radius); padding: 1.25rem; text-align: center; box-shadow: var(--shadow); }
        .stat-value { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.75rem; color: var(--primary); }
        .stat-label { color: var(--text-gray); font-size: 0.85rem; margin-top: 0.25rem; }
        
        .filter-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; overflow-x: auto; padding-bottom: 0.25rem; }
        .filter-tab { padding: 0.5rem 1rem; border-radius: 50px; font-size: 0.85rem; font-weight: 500; cursor: pointer; white-space: nowrap; border: 1px solid var(--border); background: var(--bg-white); color: var(--text-gray); transition: all 0.2s; }
        .filter-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        .uploads-list { display: flex; flex-direction: column; gap: 1rem; }
        
        .upload-card { background: var(--bg-white); border-radius: var(--radius); padding: 1.25rem; box-shadow: var(--shadow); display: flex; gap: 1rem; }
        .upload-thumb { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; background: var(--bg-light); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .upload-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
        .upload-info { flex: 1; min-width: 0; }
        .upload-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem; }
        .upload-title { font-weight: 600; font-size: 1rem; margin-bottom: 0.25rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .upload-meta { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
        .upload-type { font-size: 0.75rem; padding: 0.125rem 0.5rem; border-radius: 4px; background: var(--bg-light); color: var(--text-gray); }
        .upload-status { font-size: 0.75rem; padding: 0.125rem 0.5rem; border-radius: 4px; }
        .status-pending { background: #FEF3C7; color: #92400E; }
        .status-approved { background: #D1FAE5; color: #065F46; }
        .status-rejected { background: #FEE2E2; color: #991B1B; }
        .upload-date { color: var(--text-gray); font-size: 0.8rem; }
        .upload-content-preview { color: var(--text-gray); font-size: 0.85rem; margin-top: 0.5rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .upload-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
        .upload-actions .btn { padding: 0.375rem 0.75rem; font-size: 0.8rem; }
        
        .loading { display: none; text-align: center; padding: 3rem; }
        .loading.show { display: block; }
        .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-gray); }
        .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
        .empty-title { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.25rem; color: var(--text-dark); margin-bottom: 0.5rem; }
        
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--text-dark); color: white; padding: 0.75rem 1.5rem; border-radius: 8px; font-size: 0.9rem; opacity: 0; transition: all 0.3s; z-index: 1000; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { background: #10B981; }
        .toast.error { background: #DC2626; }
        
        .tabs { display: flex; background: var(--bg-white); border-radius: var(--radius); padding: 0.25rem; margin-bottom: 1.5rem; box-shadow: var(--shadow); }
        .tab { flex: 1; padding: 0.75rem; text-align: center; border-radius: 8px; font-weight: 500; cursor: pointer; transition: all 0.2s; text-decoration: none; color: var(--text-gray); }
        .tab.active { background: var(--primary); color: white; }
        
        .not-logged-in { text-align: center; padding: 4rem 2rem; }
        .not-logged-in h2 { font-family: 'Outfit', sans-serif; font-size: 1.5rem; margin-bottom: 1rem; }
        .not-logged-in p { color: var(--text-gray); margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <div class="logo-icon">⚡</div>
                BLXST
            </a>
            <div class="nav-right" id="navRight"></div>
        </div>
    </nav>

    <!-- 赞助商横条 -->
    <style>
    .sponsor-bar { background: linear-gradient(135deg, #1E293B 0%, #334155 100%); padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: center; gap: 1rem; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sponsor-label { font-size: 0.75rem; font-weight: 600; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 0.25rem; }
    .sponsor-label::before { content: "🤝"; }
    .sponsor-list { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .sponsor-item { display: flex; align-items: center; gap: 0.5rem; color: white; text-decoration: none; font-size: 0.9rem; font-weight: 500; padding: 0.4rem 0.75rem; border-radius: 6px; transition: all 0.2s; background: rgba(255,255,255,0.05); }
    .sponsor-item:hover { background: rgba(255,255,255,0.15); transform: translateY(-1px); }
    .sponsor-item.platinum { border-left: 3px solid #E5E4E2; }
    .sponsor-item.platinum .sponsor-tier { color: #E5E4E2; }
    .sponsor-item.gold { border-left: 3px solid #FFD700; }
    .sponsor-item.gold .sponsor-tier { color: #FFD700; }
    .sponsor-item.silver { border-left: 3px solid #C0C0C0; }
    .sponsor-item.silver .sponsor-tier { color: #C0C0C0; }
    .sponsor-logo { width: 24px; height: 24px; border-radius: 4px; object-fit: cover; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; }
    .sponsor-tier { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; opacity: 0.8; }
    .sponsor-empty { color: rgba(255,255,255,0.4); font-size: 0.85rem; }
    @media (max-width: 768px) { .sponsor-bar { padding: 0.6rem 1rem; } .sponsor-label { width: 100%; justify-content: center; margin-bottom: 0.5rem; } .sponsor-list { gap: 0.75rem; } .sponsor-item { font-size: 0.8rem; padding: 0.3rem 0.6rem; } }
    </style>
    <div class="sponsor-bar" id="sponsorBar">
        <div class="sponsor-label">赞助商</div>
        <div class="sponsor-list" id="sponsorList"><span class="sponsor-empty">加载中...</span></div>
    </div>
    <script>
    (function() {
        const API_BASE = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
        const TIER_ORDER = { 'platinum': 1, 'gold': 2, 'silver': 3 };
        async function loadSponsors() {
            try {
                const resp = await fetch(API_BASE + '/sponsors');
                const result = await resp.json();
                if (!result.ok || !result.data || result.data.length === 0) {
                    const homeResp = await fetch(API_BASE + '/');
                    const homeResult = await homeResp.json();
                    const sponsors = homeResult.data?.sponsors || [];
                    renderSponsors(sponsors);
                    return;
                }
                renderSponsors(result.data);
            } catch (e) { console.error('加载赞助商失败:', e); document.getElementById('sponsorList').innerHTML = '<span class="sponsor-empty">暂无赞助商</span>'; }
        }
        function renderSponsors(sponsors) {
            if (!sponsors || sponsors.length === 0) { document.getElementById('sponsorList').innerHTML = '<span class="sponsor-empty">暂无赞助商</span>'; return; }
            const sorted = [...sponsors].sort((a, b) => { const tierA = TIER_ORDER[a.tier?.toLowerCase()] || 99; const tierB = TIER_ORDER[b.tier?.toLowerCase()] || 99; return tierA - tierB; });
            const html = sorted.map(s => { const tier = (s.tier || 'silver').toLowerCase(); return `<a href="${s.website || '#'}" class="sponsor-item ${tier}" ${s.website ? 'target="_blank" rel="noopener"' : ''}><img class="sponsor-logo" src="${s.logo || ''}" alt="${s.name}" onerror="this.style.display='none'"><span>${s.name}</span><span class="sponsor-tier">${tier}</span></a>`; }).join('');
            document.getElementById('sponsorList').innerHTML = html;
        }
        loadSponsors();
    })();
    </script>

    <div class="container">
        <div class="tabs">
            <a href="/upload-photo.html" class="tab">上传照片</a>
            <a href="/upload-news.html" class="tab">新闻投稿</a>
            <a href="/my-uploads.html" class="tab active">我的上传</a>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p style="margin-top: 1rem; color: var(--text-gray);">加载中...</p>
        </div>

        <div id="notLoggedIn" class="not-logged-in" style="display: none;">
            <h2>请先登录</h2>
            <p>登录后可查看和管理你的上传</p>
            <a href="/login" class="btn btn-primary" style="width: auto; padding: 0.75rem 2rem;">去登录</a>
        </div>

        <div id="content" style="display: none;">
            <div class="page-header">
                <h1 class="page-title">我的上传</h1>
                <a href="/upload-photo.html" class="btn btn-primary">+ 上传</a>
            </div>
            
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-value" id="statPending">0</div>
                    <div class="stat-label">审核中</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statApproved">0</div>
                    <div class="stat-label">已通过</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statRejected">0</div>
                    <div class="stat-label">未通过</div>
                </div>
            </div>
            
            <div class="filter-tabs">
                <div class="filter-tab active" data-filter="all">全部</div>
                <div class="filter-tab" data-filter="photo">照片</div>
                <div class="filter-tab" data-filter="news">新闻</div>
            </div>
            
            <div class="uploads-list" id="uploadsList"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const API_BASE = '/blast-upload-api';
        let user = null;
        let allUploads = [];
        let currentFilter = 'all';

        // 检查登录状态
        async function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) return null;
            
            try {
                const res = await fetch('/blast-auth-api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'profile' })
                });
                const data = await res.json();
                if (data.ok) {
                    user = data.user;
                    return user;
                }
            } catch (e) {
                console.error('Auth check failed:', e);
            }
            return null;
        }

        // 更新导航栏
        function updateNav(user) {
            const navRight = document.getElementById('navRight');
            if (user) {
                navRight.innerHTML = `
                    <a href="/profile.html" class="btn btn-outline">${user.username}</a>
                `;
            } else {
                navRight.innerHTML = `
                    <a href="/login" class="btn btn-outline">登录</a>
                    <a href="/register" class="btn btn-primary">注册</a>
                `;
            }
        }

        // 初始化
        async function init() {
            document.getElementById('loading').classList.add('show');
            
            user = await checkAuth();
            
            if (!user) {
                document.getElementById('loading').classList.remove('show');
                document.getElementById('notLoggedIn').style.display = 'block';
                updateNav(null);
                return;
            }
            
            updateNav(user);
            await loadUploads();
            
            document.getElementById('loading').classList.remove('show');
            document.getElementById('content').style.display = 'block';
            
            setupFilters();
        }

        // 加载上传列表
        async function loadUploads() {
            try {
                const res = await fetch(`${API_BASE}/uploads`, {
                    headers: { 
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                
                const data = await res.json();
                
                if (data.ok) {
                    allUploads = data.uploads || [];
                    
                    // 更新统计
                    document.getElementById('statPending').textContent = data.stats?.pending || 0;
                    document.getElementById('statApproved').textContent = data.stats?.approved || 0;
                    document.getElementById('statRejected').textContent = data.stats?.rejected || 0;
                    
                    renderUploads();
                }
            } catch (err) {
                console.error('Load uploads failed:', err);
                showToast('加载失败', 'error');
            }
        }

        // 渲染上传列表
        function renderUploads() {
            const list = document.getElementById('uploadsList');
            
            let filtered = allUploads;
            if (currentFilter !== 'all') {
                filtered = allUploads.filter(u => u.upload_type === currentFilter);
            }
            
            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <div class="empty-title">暂无上传</div>
                        <p>上传照片或新闻投稿，这里会显示</p>
                        <a href="/upload-photo.html" class="btn btn-primary" style="margin-top: 1rem; width: auto;">去上传</a>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = filtered.map(upload => {
                const statusClass = `status-${upload.status}`;
                const statusText = { pending: '审核中', approved: '已通过', rejected: '未通过' }[upload.status];
                const typeText = { photo: '照片', news: '新闻' }[upload.upload_type];
                const date = new Date(upload.created_at).toLocaleDateString('zh-CN');
                
                let thumb = '';
                if (upload.upload_type === 'photo' && upload.file_url) {
                    thumb = `<div class="upload-thumb"><img src="${upload.file_url}" alt=""></div>`;
                } else {
                    thumb = `<div class="upload-thumb">📝</div>`;
                }
                
                let contentPreview = '';
                if (upload.upload_type === 'news' && upload.content) {
                    contentPreview = `<div class="upload-content-preview">${upload.content}</div>`;
                }
                
                return `
                    <div class="upload-card" data-id="${upload.upload_id}">
                        ${thumb}
                        <div class="upload-info">
                            <div class="upload-header">
                                <div class="upload-title">${upload.title || '无标题'}</div>
                            </div>
                            <div class="upload-meta">
                                <span class="upload-type">${typeText}</span>
                                <span class="upload-status ${statusClass}">${statusText}</span>
                                <span class="upload-date">${date}</span>
                            </div>
                            ${contentPreview}
                            <div class="upload-actions">
                                <button class="btn btn-danger" onclick="deleteUpload('${upload.upload_id}')">删除</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 设置筛选
        function setupFilters() {
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentFilter = tab.dataset.filter;
                    renderUploads();
                });
            });
        }

        // 删除上传
        async function deleteUpload(uploadId) {
            if (!confirm('确定要删除这个上传吗？')) return;
            
            try {
                const res = await fetch(`${API_BASE}/uploads/${uploadId}`, {
                    method: 'DELETE',
                    headers: { 
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                
                const data = await res.json();
                
                if (data.ok) {
                    showToast('删除成功', 'success');
                    await loadUploads();
                } else {
                    throw new Error(data.error);
                }
            } catch (err) {
                showToast(err.message || '删除失败', 'error');
            }
        }

        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 暴露给全局
        window.deleteUpload = deleteUpload;

        init();
    </script>
    <script src="/components/nav-loader.js"></script>
</body>
</html>
