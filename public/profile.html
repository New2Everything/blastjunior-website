<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - BLXST</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B35; --primary-light: #FF8A5C; --secondary: #00B4D8; --bg-light: #F8FAFC; --bg-white: #FFFFFF; --text-dark: #1E293B; --text-gray: #64748B; --border: #E2E8F0; --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-light); color: var(--text-dark); min-height: 100vh; }
        
        .navbar { background: var(--bg-white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 800px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 64px; }
        .logo { display: flex; align-items: center; gap: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.25rem; text-decoration: none; color: var(--text-dark); }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.25rem; }
        .nav-right { display: flex; align-items: center; gap: 1rem; }
        .btn { padding: 0.5rem 1rem; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; font-size: 0.9rem; font-family: inherit; transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-light); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-gray); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-danger { background: #DC2626; color: white; }
        .btn-danger:hover { background: #B91C1C; }
        
        .container { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; }
        
        .profile-header { background: var(--bg-white); border-radius: var(--radius); padding: 2rem; box-shadow: var(--shadow); text-align: center; margin-bottom: 1.5rem; }
        .avatar { width: 80px; height: 80px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem; font-weight: 700; margin: 0 auto 1rem; }
        .profile-name { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.5rem; margin-bottom: 0.25rem; }
        .profile-email { color: var(--text-gray); font-size: 0.9rem; }
        .profile-badge { display: inline-block; background: var(--primary); color: white; padding: 0.25rem 0.75rem; border-radius: 50px; font-size: 0.75rem; margin-top: 0.75rem; }
        
        .profile-card { background: var(--bg-white); border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow); margin-bottom: 1rem; }
        .card-title { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.1rem; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; }
        
        .info-row { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid var(--border); }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: var(--text-gray); font-size: 0.9rem; }
        .info-value { font-weight: 500; }
        
        .loading { display: none; text-align: center; padding: 3rem; }
        .loading.show { display: block; }
        .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--text-dark); color: white; padding: 0.75rem 1.5rem; border-radius: 8px; font-size: 0.9rem; opacity: 0; transition: all 0.3s; z-index: 1000; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { background: #10B981; }
        .toast.error { background: #DC2626; }
        
        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--bg-white); border-radius: var(--radius); padding: 1.5rem; width: 90%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .modal-title { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.25rem; margin-bottom: 1rem; }
        .modal-input { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; font-family: inherit; margin-bottom: 1rem; }
        .modal-input:focus { outline: none; border-color: var(--primary); }
        .modal-actions { display: flex; gap: 0.75rem; }
        .modal-actions .btn { flex: 1; justify-content: center; }
        
        .not-logged-in { text-align: center; padding: 4rem 2rem; }
        .not-logged-in h2 { font-family: 'Outfit', sans-serif; font-size: 1.5rem; margin-bottom: 1rem; }
        .not-logged-in p { color: var(--text-gray); margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <div class="logo-icon">⚡</div>
                BLXST
            </a>
            <div class="nav-right" id="navRight">
                <a href="/login" class="btn btn-outline">登录</a>
                <a href="/register" class="btn btn-primary">注册</a>
            </div>
        </div>
    </nav>

    <!-- 赞助商横条 -->
    <style>
    .sponsor-bar { background: linear-gradient(135deg, #1E293B 0%, #334155 100%); padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: center; gap: 1rem; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sponsor-label { font-size: 0.75rem; font-weight: 600; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 0.25rem; }
    .sponsor-label::before { content: "🤝"; }
    .sponsor-list { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .sponsor-item { display: flex; align-items: center; gap: 0.5rem; color: white; text-decoration: none; font-size: 0.9rem; font-weight: 500; padding: 0.4rem 0.75rem; border-radius: 6px; transition: all 0.2s; background: rgba(255,255,255,0.05); }
    .sponsor-item:hover { background: rgba(255,255,255,0.15); transform: translateY(-1px); }
    .sponsor-item.platinum { border-left: 3px solid #E5E4E2; }
    .sponsor-item.platinum .sponsor-tier { color: #E5E4E2; }
    .sponsor-item.gold { border-left: 3px solid #FFD700; }
    .sponsor-item.gold .sponsor-tier { color: #FFD700; }
    .sponsor-item.silver { border-left: 3px solid #C0C0C0; }
    .sponsor-item.silver .sponsor-tier { color: #C0C0C0; }
    .sponsor-logo { width: 24px; height: 24px; border-radius: 4px; object-fit: cover; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; }
    .sponsor-tier { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; opacity: 0.8; }
    .sponsor-empty { color: rgba(255,255,255,0.4); font-size: 0.85rem; }
    @media (max-width: 768px) { .sponsor-bar { padding: 0.6rem 1rem; } .sponsor-label { width: 100%; justify-content: center; margin-bottom: 0.5rem; } .sponsor-list { gap: 0.75rem; } .sponsor-item { font-size: 0.8rem; padding: 0.3rem 0.6rem; } }
    </style>
    <div class="sponsor-bar" id="sponsorBar">
        <div class="sponsor-label">赞助商</div>
        <div class="sponsor-list" id="sponsorList"><span class="sponsor-empty">加载中...</span></div>
    </div>
    <script>
    (function() {
        const API_BASE = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
        const TIER_ORDER = { 'platinum': 1, 'gold': 2, 'silver': 3 };
        async function loadSponsors() {
            try {
                const resp = await fetch(API_BASE + '/sponsors');
                const result = await resp.json();
                if (!result.ok || !result.data || result.data.length === 0) {
                    const homeResp = await fetch(API_BASE + '/');
                    const homeResult = await homeResp.json();
                    const sponsors = homeResult.data?.sponsors || [];
                    renderSponsors(sponsors);
                    return;
                }
                renderSponsors(result.data);
            } catch (e) { console.error('加载赞助商失败:', e); document.getElementById('sponsorList').innerHTML = '<span class="sponsor-empty">暂无赞助商</span>'; }
        }
        function renderSponsors(sponsors) {
            if (!sponsors || sponsors.length === 0) { document.getElementById('sponsorList').innerHTML = '<span class="sponsor-empty">暂无赞助商</span>'; return; }
            const sorted = [...sponsors].sort((a, b) => { const tierA = TIER_ORDER[a.tier?.toLowerCase()] || 99; const tierB = TIER_ORDER[b.tier?.toLowerCase()] || 99; return tierA - tierB; });
            const html = sorted.map(s => { const tier = (s.tier || 'silver').toLowerCase(); return `<a href="${s.website || '#'}" class="sponsor-item ${tier}" ${s.website ? 'target="_blank" rel="noopener"' : ''}><img class="sponsor-logo" src="${s.logo || ''}" alt="${s.name}" onerror="this.style.display='none'"><span>${s.name}</span><span class="sponsor-tier">${tier}</span></a>`; }).join('');
            document.getElementById('sponsorList').innerHTML = html;
        }
        loadSponsors();
    })();
    </script>

    <div class="container">
        <div class="loading" id="loading">
            <div class="spinner"></div>
        </div>
        
        <div class="not-logged-in" id="notLoggedIn" style="display: none;">
            <h2>请先登录</h2>
            <p>登录后即可查看和修改您的个人信息</p>
            <a href="/login" class="btn btn-primary">立即登录</a>
        </div>
        
        <div id="profileContent" style="display: none;">
            <div class="profile-header">
                <div class="avatar" id="avatar">?</div>
                <div class="profile-name" id="profileName">-</div>
                <div class="profile-email" id="profileEmail">-</div>
                <span class="profile-badge" id="profileRole">会员</span>
            </div>
            
            <div class="profile-card">
                <div class="card-title">
                    账号信息
                    <button class="btn btn-outline" id="editUsernameBtn" style="padding: 0.25rem 0.75rem; font-size: 0.8rem;">修改昵称</button>
                </div>
                <div class="info-row">
                    <span class="info-label">用户ID</span>
                    <span class="info-value" id="userId">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">昵称</span>
                    <span class="info-value" id="username">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">邮箱</span>
                    <span class="info-value" id="email">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">注册时间</span>
                    <span class="info-value" id="createdAt">-</span>
                </div>
            </div>
            
            <div class="profile-card">
                <div class="card-title">账号状态</div>
                <div class="info-row">
                    <span class="info-label">是否修改过昵称</span>
                    <span class="info-value" id="usernameChanged">-</span>
                </div>
            </div>
            
            <!-- 管理员入口 -->
            <div class="profile-card" id="adminPanel" style="display: none; border: 2px solid var(--primary);">
                <div class="card-title" style="color: var(--primary);">
                    🔧 管理后台
                </div>
                <div class="info-row">
                    <span class="info-label">照片管理</span>
                    <a href="/photo-admin.html" class="btn btn-primary" style="padding: 0.4rem 1rem; font-size: 0.85rem;">进入管理 →</a>
                </div>
            </div>
            
            <button class="btn btn-danger" id="logoutBtn" style="width: 100%; justify-content: center; margin-top: 1rem;">退出登录</button>
        </div>
    </div>
    
    <!-- 修改昵称弹窗 -->
    <div class="modal-overlay" id="usernameModal">
        <div class="modal">
            <div class="modal-title">修改昵称</div>
            <input type="text" class="modal-input" id="newUsername" placeholder="输入新昵称（2-20字）" maxlength="20">
            <p style="font-size: 0.8rem; color: var(--text-gray); margin-bottom: 1rem;">* 昵称只能修改一次，请谨慎操作</p>
            <div class="modal-actions">
                <button class="btn btn-outline" id="cancelUsernameBtn">取消</button>
                <button class="btn btn-primary" id="confirmUsernameBtn">确认修改</button>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script>
        const API_BASE = 'https://blast-auth-api.kanjiaming2022.workers.dev';
        
        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.className = 'toast', 3000);
        }
        
        async function loadProfile() {
            const token = localStorage.getItem('blxst_token');
            if (!token) {
                document.getElementById('notLoggedIn').style.display = 'block';
                document.getElementById('loading').classList.remove('show');
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                
                if (data.ok) {
                    const user = data.user;
                    localStorage.setItem('blxst_user', JSON.stringify(user));
                    renderProfile(user);
                } else {
                    localStorage.removeItem('blxst_token');
                    localStorage.removeItem('blxst_user');
                    document.getElementById('notLoggedIn').style.display = 'block';
                }
            } catch (e) {
                showToast('加载失败', 'error');
            }
            document.getElementById('loading').classList.remove('show');
        }
        
        function renderProfile(user) {
            document.getElementById('navRight').innerHTML = `
                <a href="/profile" class="btn btn-outline">个人中心</a>
            `;
            
            document.getElementById('profileContent').style.display = 'block';
            
            const initial = user.username ? user.username.charAt(0).toUpperCase() : '?';
            document.getElementById('avatar').textContent = initial;
            document.getElementById('profileName').textContent = user.username || '-';
            document.getElementById('profileEmail').textContent = user.email || '-';
            document.getElementById('profileRole').textContent = user.role === 'member' ? '会员' : user.role;
            document.getElementById('userId').textContent = user.id;
            document.getElementById('username').textContent = user.username || '-';
            document.getElementById('email').textContent = user.email || '-';
            document.getElementById('createdAt').textContent = user.created_at ? new Date(user.created_at).toLocaleDateString('zh-CN') : '-';
            document.getElementById('usernameChanged').textContent = user.username_changed ? '是' : '否';
            
            // 控制修改昵称按钮
            document.getElementById('editUsernameBtn').style.display = user.username_changed ? 'none' : 'inline-flex';
            
            // 管理员显示管理面板
            if (user.role === 'admin') {
                document.getElementById('adminPanel').style.display = 'block';
            }
        }
        
        // 修改昵称弹窗
        document.getElementById('editUsernameBtn').addEventListener('click', () => {
            document.getElementById('usernameModal').classList.add('show');
            document.getElementById('newUsername').value = '';
            document.getElementById('newUsername').focus();
        });
        
        document.getElementById('cancelUsernameBtn').addEventListener('click', () => {
            document.getElementById('usernameModal').classList.remove('show');
        });
        
        document.getElementById('confirmUsernameBtn').addEventListener('click', async () => {
            const newUsername = document.getElementById('newUsername').value.trim();
            if (!newUsername || newUsername.length < 2) {
                showToast('昵称至少2个字符', 'error');
                return;
            }
            
            const token = localStorage.getItem('blxst_token');
            try {
                const res = await fetch(`${API_BASE}/username`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ username: newUsername })
                });
                const data = await res.json();
                
                if (data.ok) {
                    showToast('昵称修改成功', 'success');
                    document.getElementById('usernameModal').classList.remove('show');
                    loadProfile();
                } else {
                    showToast(data.error || '修改失败', 'error');
                }
            } catch (e) {
                showToast('网络错误', 'error');
            }
        });
        
        // 退出登录
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            const token = localStorage.getItem('blxst_token');
            try {
                await fetch(`${API_BASE}/logout`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
            } catch (e) {}
            
            localStorage.removeItem('blxst_token');
            localStorage.removeItem('blxst_user');
            showToast('已退出登录', 'success');
            setTimeout(() => window.location.href = '/login', 1000);
        });
        
        // 初始化
        document.getElementById('loading').classList.add('show');
        loadProfile();
    </script>
    <script src="/components/nav-loader.js"></script>
</body>
</html>
