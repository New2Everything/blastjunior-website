<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛程 - 兰星少年 HADO 俱乐部</title>
    <!-- DATA_MODULE: matches -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B35; --secondary: #00B4D8; --bg-light: #F8FAFC; --bg-white: #FFFFFF; --text-dark: #1E293B; --text-gray: #64748B; --border: #E2E8F0; --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px; --success: #10B981; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-light); color: var(--text-dark); }
        nav { background: var(--bg-white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 64px; }
        .logo { display: flex; align-items: center; gap: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.25rem; text-decoration: none; color: var(--text-dark); }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), #FF8A5C); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; }
        .nav-links { display: flex; gap: 0.5rem; }
        .nav-link { padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; color: var(--text-gray); font-weight: 500; transition: all 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        .page-title { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 900; margin-bottom: 1.5rem; }
        
        /* 方案A：不展示逐场比赛，展示赛季进度 */
        
        /* 赛季选择 */
        .season-selector { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .season-card { background: var(--bg-white); border-radius: var(--radius); padding: 1.5rem; flex: 1; min-width: 250px; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
        .season-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .season-card.active { border-color: var(--primary); background: linear-gradient(135deg, #FFF5F2, #FFFFFF); }
        .season-name { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.25rem; margin-bottom: 0.5rem; }
        .season-status { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 50px; font-size: 0.75rem; font-weight: 600; }
        .season-status.ongoing { background: var(--success); color: white; }
        .season-status.finished { background: var(--text-gray); color: white; }
        .season-dates { font-size: 0.85rem; color: var(--text-gray); margin-top: 0.5rem; }
        
        /* 积分进度 */
        .section-title { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 700; margin: 2rem 0 1rem; }
        .standings-table { background: var(--bg-white); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
        .standings-table table { width: 100%; border-collapse: collapse; }
        .standings-table th { background: var(--primary); color: white; padding: 1rem; text-align: left; font-weight: 600; }
        .standings-table td { padding: 1rem; border-bottom: 1px solid var(--border); }
        .standings-table tr:last-child td { border-bottom: none; }
        .standings-table .rank { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.25rem; color: var(--primary); }
        .standings-table .team-name { font-weight: 600; }
        
        /* 积分项目 */
        .score-components { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 2rem; }
        .component-card { background: var(--bg-white); border-radius: var(--radius); padding: 1rem 1.5rem; box-shadow: var(--shadow); }
        .component-name { font-weight: 600; margin-bottom: 0.25rem; }
        .component-type { font-size: 0.75rem; color: var(--text-gray); text-transform: uppercase; }
        
        /* 内部联赛轮次 */
        .rounds-list { display: flex; flex-direction: column; gap: 1rem; }
        .round-card { background: var(--bg-white); border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow); }
        .round-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .round-date { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.1rem; }
        .round-players { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .player-badge { background: linear-gradient(135deg, var(--secondary), #00D4FF); color: white; padding: 0.5rem 1rem; border-radius: 50px; font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem; }
        .player-badge .rank { font-weight: 700; }
        .player-badge .points { opacity: 0.9; }
        
        .loading { text-align: center; padding: 3rem; color: var(--text-gray); }
        .empty { text-align: center; padding: 3rem; color: var(--text-gray); }
    </style>
<!-- JSON-LD Structured Data -->
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "matches - 兰星少年 HADO 俱乐部"
}
</script>

</head>
<body>
    <nav></nav>

    <!-- 赞助商横条 -->
    <style>
    .sponsor-bar { background: linear-gradient(135deg, #1E293B 0%, #334155 100%); padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: center; gap: 1rem; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sponsor-label { font-size: 0.75rem; font-weight: 600; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 0.25rem; }
    .sponsor-label::before { content: "🤝"; }
    .sponsor-list { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .sponsor-item { display: flex; align-items: center; gap: 0.5rem; color: white; text-decoration: none; font-size: 0.9rem; font-weight: 500; padding: 0.4rem 0.75rem; border-radius: 6px; transition: all 0.2s; background: rgba(255,255,255,0.05); }
    .sponsor-item:hover { background: rgba(255,255,255,0.15); transform: translateY(-1px); }
    .sponsor-item.platinum { border-left: 3px solid #E5E4E2; }
    .sponsor-item.platinum .sponsor-tier { color: #E5E4E2; }
    .sponsor-item.gold { border-left: 3px solid #FFD700; }
    .sponsor-item.gold .sponsor-tier { color: #FFD700; }
    .sponsor-item.silver { border-left: 3px solid #C0C0C0; }
    .sponsor-item.silver .sponsor-tier { color: #C0C0C0; }
    .sponsor-logo { width: 24px; height: 24px; border-radius: 4px; object-fit: cover; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; }
    .sponsor-tier { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; opacity: 0.8; }
    .sponsor-empty { color: rgba(255,255,255,0.4); font-size: 0.85rem; }
    @media (max-width: 768px) { .sponsor-bar { padding: 0.6rem 1rem; } .sponsor-label { width: 100%; justify-content: center; margin-bottom: 0.5rem; } .sponsor-list { gap: 0.75rem; } .sponsor-item { font-size: 0.8rem; padding: 0.3rem 0.6rem; } }
    </style>
    <div class="sponsor-bar" id="sponsorBar">
        <div class="sponsor-label">赞助商</div>
        <div class="sponsor-list" id="sponsorList"><span class="sponsor-empty">加载中...</span></div>
    </div>
    <script>
    (function() {
        const API_BASE = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
        const TIER_ORDER = { 'platinum': 1, 'gold': 2, 'silver': 3 };
        async function loadSponsors() {
            try {
                const resp = await fetch(API_BASE + '/sponsors');
                const result = await resp.json();
                if (!result.ok || !result.data || result.data.length === 0) {
                    const homeResp = await fetch(API_BASE + '/');
                    const homeResult = await homeResp.json();
                    const sponsors = homeResult.data?.sponsors || [];
                    renderSponsors(sponsors);
                    return;
                }
                renderSponsors(result.data);
            } catch (e) { console.error('加载赞助商失败:', e); document.getElementById('sponsorList').innerHTML = '<span class="sponsor-empty">暂无赞助商</span>'; }
        }
        function renderSponsors(sponsors) {
            if (!sponsors || sponsors.length === 0) { document.getElementById('sponsorList').innerHTML = '<span class="sponsor-empty">暂无赞助商</span>'; return; }
            const sorted = [...sponsors].sort((a, b) => { const tierA = TIER_ORDER[a.tier?.toLowerCase()] || 99; const tierB = TIER_ORDER[b.tier?.toLowerCase()] || 99; return tierA - tierB; });
            const html = sorted.map(s => { const tier = (s.tier || 'silver').toLowerCase(); return `<a href="${s.website || '#'}" class="sponsor-item ${tier}" ${s.website ? 'target="_blank" rel="noopener"' : ''}><img class="sponsor-logo" src="${s.logo || ''}" alt="${s.name}" onerror="this.style.display='none'"><span>${s.name}</span><span class="sponsor-tier">${tier}</span></a>`; }).join('');
            document.getElementById('sponsorList').innerHTML = html;
        }
        loadSponsors();
    })();
    </script>

    <main class="container">
        <h1 class="page-title">赛季进度中心</h1>
        
        <!-- 赛事体系 -->
        <section id="eventsSection">
            <h2 class="section-title">🏆 赛事体系</h2>
            <div id="eventsList"><div class="loading">加载赛事数据...</div></div>
        </section>
        
        <!-- DATA_MODULE: seasons -->
        <section id="seasons">
            <div class="loading">加载赛季数据...</div>
        </section>
        
        <!-- DATA_MODULE: score_components -->
        <section id="scoreComponents" style="display:none;">
            <h2 class="section-title">积分项目</h2>
            <div class="score-components"></div>
        </section>
        
        <!-- DATA_MODULE: standings -->
        <section id="standings" style="display:none;">
            <h2 class="section-title">积分榜</h2>
            <div class="standings-table">
                <table>
                    <thead>
                        <tr>
                            <th>排名</th>
                            <th>战队</th>
                            <th>积分</th>
                            <th>参赛轮次</th>
                        </tr>
                    </thead>
                    <tbody id="standingsBody"></tbody>
                </table>
            </div>
        </section>
        
        <!-- DATA_MODULE: internal_rounds -->
        <section id="internalRounds" style="display:none;">
            <h2 class="section-title">内部联赛轮次</h2>
            <div class="rounds-list" id="roundsList"></div>
        </section>
    </main>

    <script>
        const API_BASE = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
        
        // 加载赛事
        async function loadEvents() {
            try {
                const resp = await fetch(API_BASE + '/events');
                const result = await resp.json();
                
                if (!result.ok) {
                    document.getElementById('eventsList').innerHTML = '<div class="empty">加载失败</div>';
                    return;
                }
                
                const events = result.data || [];
                
                if (events.length === 0) {
                    document.getElementById('eventsList').innerHTML = '<div class="empty">暂无赛事数据</div>';
                    return;
                }
                
                const levelColors = {
                    'World': { bg: 'linear-gradient(135deg, #FFD700, #FFA500)', icon: '🌍' },
                    'National': { bg: 'linear-gradient(135deg, #FF6B35, #FF8A5C)', icon: '🇨🇳' },
                    'International': { bg: 'linear-gradient(135deg, #00B4D8, #00D4FF)', icon: '🌏' },
                    'Regional': { bg: 'linear-gradient(135deg, #10B981, #34D399)', icon: '🏙️' },
                    'Other': { bg: 'linear-gradient(135deg, #6B7280, #9CA3AF)', icon: '📍' }
                };
                
                let html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;">';
                
                events.forEach(event => {
                    const levelStyle = levelColors[event.levelLabel] || levelColors['Other'];
                    const leagueSeasons = event.seasons?.filter(s => s.isLeague) || [];
                    const cupSeasons = event.seasons?.filter(s => s.isCup) || [];
                    
                    html += `
                        <div style="background:white;border-radius:16px;padding:1.5rem;box-shadow:0 4px 20px rgba(0,0,0,0.08);">
                            <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem;">
                                <span style="font-size:2rem;">${levelStyle.icon}</span>
                                <div>
                                    <div style="font-weight:700;font-size:1.1rem;">${event.name_zh}</div>
                                    <div style="font-size:0.8rem;color:var(--text-gray);">${event.levelLabel || event.level} · ${event.frequency}</div>
                                </div>
                            </div>
                            <div style="font-size:0.85rem;color:var(--text-gray);margin-bottom:1rem;">${event.description || ''}</div>
                            <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
                                ${leagueSeasons.length > 0 ? `<span style="background:linear-gradient(135deg,var(--primary),#FF8A5C);color:white;padding:0.25rem 0.75rem;border-radius:50px;font-size:0.75rem;font-weight:600;">🏅 联赛 (${leagueSeasons.length})</span>` : ''}
                                ${cupSeasons.length > 0 ? `<span style="background:linear-gradient(135deg,var(--secondary),#00D4FF);color:white;padding:0.25rem 0.75rem;border-radius:50px;font-size:0.75rem;font-weight:600;">🏆 杯赛 (${cupSeasons.length})</span>` : ''}
                            </div>
                            ${event.seasons && event.seasons.length > 0 ? `
                                <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);">
                                    <div style="font-size:0.75rem;color:var(--text-gray);margin-bottom:0.5rem;">最近赛季</div>
                                    <div style="font-size:0.85rem;">
                                        ${event.seasons.slice(0, 2).map(s => `
                                            <span style="display:inline-block;margin-right:0.5rem;margin-bottom:0.25rem;padding:0.25rem 0.5rem;background:var(--bg-light);border-radius:4px;">
                                                ${s.name} ${s.isCup ? '🏆' : '🏅'}
                                            </span>
                                        `).join('')}
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
                
                html += '</div>';
                document.getElementById('eventsList').innerHTML = html;
            } catch (e) {
                console.error(e);
                document.getElementById('eventsList').innerHTML = '<div class="empty">加载失败</div>';
            }
        }
        
        // 加载赛季
        async function loadSeasons() {
            try {
                const resp = await fetch(API_BASE + '/seasons');
                const result = await resp.json();
                if (!result.ok) return;
                
                const seasons = result.data || [];
                const container = document.getElementById('seasons');
                
                let html = '<div class="season-selector">';
                seasons.forEach((season, i) => {
                    const statusClass = season.status === 'ongoing' ? 'ongoing' : 'finished';
                    const statusText = season.status === 'ongoing' ? '进行中' : '已结束';
                    // 赛事级别标签
                    let levelTag = '';
                    const name = season.name || '';
                    if (name.includes('世界杯') || name.includes('World')) {
                        levelTag = '🌍 World';
                    } else if (name.includes('联赛') || name.includes('HPL')) {
                        levelTag = '🇨🇳 National';
                    } else if (name.includes('杯') || name.includes('Regional')) {
                        levelTag = '🏙️ Regional';
                    }
                    html += `<div class="season-card ${i === 0 ? 'active' : ''}" data-season="${season.id}" onclick="selectSeason('${season.id}')">
                        <div class="season-name">${season.name}</div>
                        <span class="season-status ${statusClass}">${statusText}</span>
                        ${levelTag ? `<div class="season-level" style="margin-top:0.5rem;font-size:0.8rem;">${levelTag} · 3v3</div>` : ''}
                        <div class="season-dates">${season.start_date || ''} ${season.end_date ? ' - ' + season.end_date : ''}</div>
                    </div>`;
                });
                html += '</div>';
                container.innerHTML = html;
                
                // 加载第一个赛季的数据
                if (seasons.length > 0) {
                    loadSeasonData(seasons[0].id);
                }
            } catch (e) {
                console.error(e);
            }
        }
        
        // 选择赛季
        let currentSeason = null;
        function selectSeason(seasonId) {
            document.querySelectorAll('.season-card').forEach(card => {
                card.classList.toggle('active', card.dataset.season === seasonId);
            });
            loadSeasonData(seasonId);
        }
        
        // 加载赛季数据
        async function loadSeasonData(seasonId) {
            currentSeason = seasonId;
            
            // 显示加载状态
            document.getElementById('scoreComponents').style.display = 'block';
            document.getElementById('standings').style.display = 'block';
            document.getElementById('internalRounds').style.display = 'block';
            document.getElementById('scoreComponents').querySelector('.score-components').innerHTML = '<div class="loading">加载中...</div>';
            document.getElementById('standingsBody').innerHTML = '<tr><td colspan="4" class="loading">加载中...</td></tr>';
            document.getElementById('roundsList').innerHTML = '<div class="loading">加载中...</div>';
            
            // 并行加载数据
            try {
                const [scoreResp, standingsResp, roundsResp] = await Promise.all([
                    fetch(API_BASE + '/score-components'),
                    fetch(API_BASE + '/standings-v2'),
                    fetch(API_BASE + '/internal-rounds')
                ]);
                
                const scoreResult = await scoreResp.json();
                const standingsResult = await standingsResp.json();
                const roundsResult = await roundsResp.json();
                
                // 渲染积分项目
                if (scoreResult.ok) {
                    const components = scoreResult.data || [];
                    document.getElementById('scoreComponents').querySelector('.score-components').innerHTML = 
                        components.map(c => `<div class="component-card">
                            <div class="component-name">${c.name}</div>
                            <div class="component-type">${c.component_type || '3v3积分'}</div>
                        </div>`).join('') || '<div class="empty">暂无积分项目</div>';
                }
                
                // 渲染积分榜
                if (standingsResult.ok) {
                    const standings = standingsResult.data || [];
                    document.getElementById('standingsBody').innerHTML = 
                        standings.map(s => `<tr>
                            <td class="rank">#${s.rank}</td>
                            <td class="team-name">${s.team}</td>
                            <td><strong>${s.points}</strong></td>
                            <td>${s.rounds}轮</td>
                        </tr>`).join('') || '<tr><td colspan="4" class="empty">暂无积分数据</td></tr>';
                }
                
                // 渲染内部联赛轮次
                if (roundsResult.ok) {
                    const rounds = roundsResult.data || [];
                    document.getElementById('roundsList').innerHTML = 
                        rounds.map(r => `<div class="round-card">
                            <div class="round-header">
                                <span class="round-date">📅 ${r.round_date}</span>
                            </div>
                            <div class="round-players">
                                ${(r.topPlayers || []).map(p => `<span class="player-badge">
                                    <span class="rank">#${p.rank}</span>
                                    <span class="name">${p.name}</span>
                                    <span class="points">${p.points}分</span>
                                </span>`).join('')}
                            </div>
                        </div>`).join('') || '<div class="empty">暂无轮次数据</div>';
                }
            } catch (e) {
                console.error(e);
            }
        }
        
        // 初始化
        loadEvents();
        loadSeasons();
    </script>
    <script src="/components/nav-loader.js"></script>
</body>
</html>
