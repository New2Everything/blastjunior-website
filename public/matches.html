<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赛程 - 兰星少年 HADO 俱乐部</title>
  <meta name="description" content="兰星少年 HADO 俱乐部赛程安排">
  <meta name="theme-color" content="#FF6B35">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/components/nav-loader.js"></script>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1 class="page-title">🏆 赛程</h1>
      <p class="page-subtitle">查看比赛安排和结果</p>
    </div>

    <div class="section">
      <div id="matchesList">
        <div class="card" style="text-align:center;color:var(--text-gray);"><span class="spinner"></span>加载中</div>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://blast-homepage-api.kanjiaming2022.workers.dev';

    async function loadMatches() {
      try {
        const res = await fetch(API + '/matches');
        const result = await res.json();
        renderMatches(result.data || []);
      } catch (e) {
        document.getElementById('matchesList').innerHTML = '<div class="error-state">加载失败</div>';
      }
    }

    function renderMatches(seasons) {
      const list = document.getElementById('matchesList');
      if (!seasons.length) {
        list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🏆</div><div>暂无赛程</div></div>';
        return;
      }

      let html = '';
      seasons.forEach(season => {
        html += `
          <div class="card" style="margin-bottom:1.5rem;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border);">
              <h3 style="font-family:var(--font-display);font-size:1.2rem;font-weight:700;">${season.name || '赛季'}</h3>
              <span class="tag">${season.status === 'ongoing' ? '进行中' : season.status === 'upcoming' ? '即将开始' : '已结束'}</span>
            </div>
            ${season.teams && season.teams.length ? `
              <div style="font-size:0.9rem;color:var(--text-gray);margin-bottom:1rem;">参赛队伍: ${season.teams.length} 支</div>
              <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:0.75rem;">
                ${season.teams.slice(0, 12).map(t => `
                  <div style="background:var(--bg-light);padding:0.75rem;border-radius:8px;text-align:center;font-size:0.9rem;">
                    <div style="font-size:1.25rem;">🔥</div>
                    <div style="font-weight:600;margin-top:0.25rem;">${t.team_name || t.name || ''}</div>
                  </div>
                `).join('')}
              </div>
              ${season.teams.length > 12 ? `<div style="text-align:center;color:var(--text-gray);margin-top:1rem;font-size:0.85rem;">还有 ${season.teams.length - 12} 支队伍...</div>` : ''}
            ` : '<div style="color:var(--text-gray);font-size:0.9rem;">暂无参赛队伍</div>'}
          </div>
        `;
      });

      list.innerHTML = html;
    }

    loadMatches();
  </script>
</body>
</html>
