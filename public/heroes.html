<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英雄图鉴 - 兰星少年 HADO 俱乐部</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B35; --primary-light: #FF8A5C; --secondary: #00B4D8; --bg-light: #F8FAFC; --bg-white: #FFFFFF; --text-dark: #1E293B; --text-gray: #64748B; --border: #E2E8F0; --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-light); color: var(--text-dark); }
        
        /* Hero Type Colors */
        .type-tank { --type-color: #00B4D8; --type-bg: rgba(0,180,216,0.1); }
        .type-healer { --type-color: #10B981; --type-bg: rgba(16,185,129,0.1); }
        .type-curse { --type-color: #8B5CF6; --type-bg: rgba(139,92,246,0.1); }
        .type-buff { --type-color: #FF6B35; --type-bg: rgba(255,107,53,0.1); }
        .type-pierce { --type-color: #EF4444; --type-bg: rgba(239,68,68,0.1); }
        .type-drone { --type-color: #06B6D4; --type-bg: rgba(6,182,212,0.1); }
        .type-aoe { --type-color: #F59E0B; --type-bg: rgba(245,158,11,0.1); }
        
        nav { background: var(--bg-white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 64px; }
        .logo { display: flex; align-items: center; gap: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.25rem; text-decoration: none; color: var(--text-dark); }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; }
        .nav-links { display: flex; gap: 0.5rem; }
        .nav-link { padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; color: var(--text-gray); font-weight: 500; transition: all 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }
        
        .hero-banner { background: linear-gradient(135deg, var(--primary), #FF8A5C); padding: 3rem 1.5rem; text-align: center; color: white; }
        .hero-banner h1 { font-family: 'Outfit', sans-serif; font-size: 2.5rem; font-weight: 900; margin-bottom: 0.5rem; }
        .hero-banner p { font-size: 1.1rem; opacity: 0.9; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        
        /* Type Filter */
        .type-filter { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .type-btn { padding: 0.5rem 1rem; border-radius: 50px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: 2px solid var(--border); background: var(--bg-white); color: var(--text-gray); transition: all 0.2s; }
        .type-btn:hover { border-color: var(--type-color); color: var(--type-color); }
        .type-btn.active { background: var(--type-color); border-color: var(--type-color); color: white; }
        
        /* Hero Grid */
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
        
        .hero-card { background: var(--bg-white); border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow); text-decoration: none; color: inherit; transition: all 0.2s; border: 2px solid transparent; }
        .hero-card:hover { transform: translateY(-4px); border-color: var(--type-color, var(--primary)); }
        .hero-card-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
        .hero-icon { width: 60px; height: 60px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.75rem; background: var(--type-bg, var(--bg-light)); color: var(--type-color, var(--primary)); }
        .hero-info { flex: 1; }
        .hero-name { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.25rem; margin-bottom: 0.25rem; }
        .hero-type { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; background: var(--type-bg); color: var(--type-color); }
        
        .hero-skills { display: flex; flex-direction: column; gap: 0.5rem; }
        .hero-skill { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--text-gray); }
        .hero-skill-icon { width: 24px; height: 24px; border-radius: 6px; background: var(--bg-light); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; }
        
        .hero-desc { font-size: 0.9rem; color: var(--text-gray); margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); line-height: 1.5; }
        
        /* Section Title */
        .section-title { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 900; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .section-title::before { content: "⚔️"; }
        
        @media (max-width: 768px) { .nav-links { display: none; } .hero-banner h1 { font-size: 1.75rem; } }
    </style>
</head>
<body>
    <nav></nav>

    <div class="hero-banner">
        <h1>⚔️ 英雄图鉴</h1>
        <p>了解HADO中的各位英雄，掌握他们的技能与定位</p>
    </div>

    <div class="container">
        <!-- Type Filter -->
        <div class="type-filter">
            <button class="type-btn active" data-type="all">全部</button>
            <button class="type-btn type-tank" data-type="tank">坦克/护盾</button>
            <button class="type-btn type-healer" data-type="healer">辅助/治疗</button>
            <button class="type-btn type-curse" data-type="curse">辅助/诅咒</button>
            <button class="type-btn type-buff" data-type="buff">输出/强化</button>
            <button class="type-btn type-pierce" data-type="pierce">输出/穿透</button>
            <button class="type-btn type-drone" data-type="drone">输出/飞行器</button>
            <button class="type-btn type-aoe" data-type="aoe">输出/范围</button>
        </div>

        <!-- Hero Grid -->
        <div class="hero-grid" id="heroGrid">
            <!-- Heroes will be rendered here -->
        </div>
    </div>

    <script>
    // Hero Data
    const heroes = [
        {
            id: "shield-king",
            name: "盾甲王",
            type: "tank",
            typeName: "坦克/护盾",
            icon: "🛡️",
            skills: [
                { icon: "💪", name: "护盾屏障" },
                { icon: "🏰", name: " Fortress" }
            ],
            desc: "拥有最强防御力的坦克英雄，擅长保护队友并吸收大量伤害。"
        },
        {
            id: "heal-angel",
            name: "治愈天使",
            type: "healer",
            typeName: "辅助/治疗",
            icon: "👼",
            skills: [
                { icon: "💚", name: "生命之光" },
                { icon: "✨", name: "群体治疗" }
            ],
            desc: "专业的治疗英雄，拥有强大的恢复能力，是队伍持续作战的保障。"
        },
        {
            id: "curse-witch",
            name: "诅咒女巫",
            type: "curse",
            typeName: "辅助/诅咒",
            icon: "🧙‍♀️",
            skills: [
                { icon: "💀", name: "虚弱诅咒" },
                { icon: "⏳", name: "时间减速" }
            ],
            desc: "控制型辅助英雄，通过削弱敌人来改变战局，适合战术配合。"
        },
        {
            id: "power-fury",
            name: "力量狂怒",
            type: "buff",
            typeName: "输出/强化",
            icon: "🔥",
            skills: [
                { icon: "⚔️", name: "狂暴之力" },
                { icon: "💥", name: "伤害强化" }
            ],
            desc: "攻击强化型英雄，能够大幅提升自身输出，是团队的核心火力。"
        },
        {
            id: "pierce-arrow",
            name: "穿透箭矢",
            type: "pierce",
            typeName: "输出/穿透",
            icon: "🏹",
            skills: [
                { icon: "🎯", name: "精准射击" },
                { icon: "💨", name: "穿透之力" }
            ],
            desc: "高爆发输出英雄，擅长单体突破，能够快速消灭关键目标。"
        },
        {
            id: "drone-storm",
            name: "无人机风暴",
            type: "drone",
            typeName: "输出/飞行器",
            icon: "🚁",
            skills: [
                { icon: "🛸", name: "蜂群攻击" },
                { icon: "📡", name: "远程操控" }
            ],
            desc: "使用飞行器进行攻击的英雄，攻击范围广，机动性极强。"
        },
        {
            id: "aoe-mage",
            name: "范围法师",
            type: "aoe",
            typeName: "输出/范围",
            icon: "🪄",
            skills: [
                { icon: "🌋", name: "火焰风暴" },
                { icon: "❄️", name: "冰封大地" }
            ],
            desc: "AOE伤害英雄，擅长群体攻击，能够有效控制战场节奏。"
        },
        {
            id: "iron-turtle",
            name: "铁甲乌龟",
            type: "tank",
            typeName: "坦克/护盾",
            icon: "🐢",
            skills: [
                { icon: "🛡️", name: "铁甲防御" },
                { icon: "🔄", name: "反击护盾" }
            ],
            desc: "持久型坦克，虽然移动较慢但防御力极高，适合阵地战。"
        },
        {
            id: "nature-sage",
            name: "自然贤者",
            type: "healer",
            typeName: "辅助/治疗",
            icon: "🌿",
            skills: [
                { icon: "🌸", name: "自然回春" },
                { icon: "🍀", name: "生命绽放" }
            ],
            desc: "自然系治疗英雄，技能持续恢复能力强，适合持久消耗战。"
        }
    ];

    // Render Heroes
    function renderHeroes(filterType = 'all') {
        const grid = document.getElementById('heroGrid');
        const filtered = filterType === 'all' ? heroes : heroes.filter(h => h.type === filterType);
        
        grid.innerHTML = filtered.map(hero => `
            <a href="/hero.html?id=${hero.id}" class="hero-card type-${hero.type}">
                <div class="hero-card-header">
                    <div class="hero-icon">${hero.icon}</div>
                    <div class="hero-info">
                        <div class="hero-name">${hero.name}</div>
                        <span class="hero-type">${hero.typeName}</span>
                    </div>
                </div>
                <div class="hero-skills">
                    ${hero.skills.map(s => `
                        <div class="hero-skill">
                            <span class="hero-skill-icon">${s.icon}</span>
                            <span>${s.name}</span>
                        </div>
                    `).join('')}
                </div>
                <div class="hero-desc">${hero.desc}</div>
            </a>
        `).join('');
    }

    // Filter Buttons
    document.querySelectorAll('.type-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderHeroes(btn.dataset.type);
        });
    });

    // Initial Render
    renderHeroes();
    </script>
    <script src="/components/nav-loader.js"></script>
</body>
</html>
