<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>选手详情 - 兰星少年 HADO 俱乐部</title>
  <meta name="theme-color" content="#FF6B35">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/components/nav-loader.js"></script>
</head>
<body>
  <div class="container">
    <div id="content">
      <div class="card" style="text-align:center;color:var(--text-gray);"><span class="spinner"></span>加载中</div>
    </div>
  </div>

  <script>
    const API = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
    const params = new URLSearchParams(location.search);
    const playerId = params.get('id');

    async function loadPlayer() {
      if (!playerId) {
        document.getElementById('content').innerHTML = '<div class="error-state">缺少选手ID</div>';
        return;
      }
      try {
        const res = await fetch(API + '/player/' + playerId);
        const result = await res.json();
        if (!result.ok) throw new Error(result.error);
        renderPlayer(result.data);
      } catch (e) {
        document.getElementById('content').innerHTML = '<div class="error-state">加载失败: ' + e.message + '</div>';
      }
    }

    function renderPlayer(player) {
      if (!player) {
        document.getElementById('content').innerHTML = '<div class="error-state">选手不存在</div>';
        return;
      }
      document.title = (player.nickname || player.name || '选手') + ' - 兰星少年';

      const html = `
        <div class="page-header">
          <div style="width:100px;height:100px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:50%;margin:0 auto 1.5rem;display:flex;align-items:center;justify-content:center;font-size:3rem;color:white;">🏅</div>
          <h1 class="page-title">${player.nickname || player.name || ''}</h1>
          ${player.real_name ? `<p class="page-subtitle">${player.real_name}</p>` : ''}
          ${player.title ? `<span class="tag" style="margin-top:0.5rem;">${player.title}</span>` : ''}
        </div>

        <div class="section">
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1rem;max-width:600px;margin:0 auto;">
            <div class="card" style="text-align:center;">
              <div style="font-family:var(--font-display);font-size:2rem;font-weight:900;color:var(--primary);">${player.goals || 0}</div>
              <div style="font-size:0.85rem;color:var(--text-gray);">进球</div>
            </div>
            <div class="card" style="text-align:center;">
              <div style="font-family:var(--font-display);font-size:2rem;font-weight:900;color:var(--primary);">${player.assists || 0}</div>
              <div style="font-size:0.85rem;color:var(--text-gray);">助攻</div>
            </div>
            <div class="card" style="text-align:center;">
              <div style="font-family:var(--font-display);font-size:2rem;font-weight:900;color:var(--primary);">${player.saves || 0}</div>
              <div style="font-size:0.85rem;color:var(--text-gray);">扑救</div>
            </div>
          </div>
        </div>

        ${player.team ? `
        <div class="section">
          <h2 class="section-title" style="margin-bottom:1rem;">🏠 所属战队</h2>
          <a href="/team-detail.html?id=${player.team.team_id || player.team_id}" class="card" style="display:block;text-decoration:none;color:inherit;text-align:center;">
            <div style="font-size:2rem;margin-bottom:0.5rem;">🔥</div>
            <div style="font-weight:700;">${player.team.name || player.team_name || ''}</div>
          </a>
        </div>
        ` : ''}

        <div style="text-align:center;margin-top:2rem;">
          <a href="/players" class="btn btn-outline">← 返回选手列表</a>
        </div>
      `;

      document.getElementById('content').innerHTML = html;
    }

    loadPlayer();
  </script>
</body>
</html>
