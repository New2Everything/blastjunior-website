<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>照片画廊 - 兰星少年 HADO 俱乐部</title>
  <meta name="description" content="兰星少年 HADO 俱乐部照片画廊">
  <meta name="theme-color" content="#FF6B35">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/components/nav-loader.js"></script>
  <style>
    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
    .photo-item { aspect-ratio: 1; background: var(--bg-light); border-radius: var(--radius); overflow: hidden; position: relative; }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
    .photo-item:hover img { transform: scale(1.05); }
    .photo-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: var(--text-gray); }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1 class="page-title">📸 照片画廊</h1>
      <p class="page-subtitle">精彩瞬间，记录成长</p>
    </div>

    <div class="section">
      <div class="photo-grid" id="photoGrid">
        <div class="card" style="text-align:center;color:var(--text-gray);grid-column:1/-1;"><span class="spinner"></span>加载中</div>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://blast-homepage-api.kanjiaming2022.workers.dev';

    async function loadGallery() {
      try {
        const res = await fetch(API + '/gallery');
        const result = await res.json();
        renderPhotos(result.data || []);
      } catch (e) {
        // 如果 gallery API 失败，尝试从 R2 加载
        document.getElementById('photoGrid').innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">📸</div><div>暂无照片</div></div>';
      }
    }

    function renderPhotos(photos) {
      const grid = document.getElementById('photoGrid');
      if (!photos.length) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">📸</div><div>暂无照片</div></div>';
        return;
      }
      grid.innerHTML = photos.map(p => `
        <div class="photo-item">
          ${p.cover ? `<img src="${p.cover}" alt="${p.title || ''}" loading="lazy">` : '<div class="photo-placeholder">🖼️</div>'}
        </div>
      `).join('');
    }

    loadGallery();
  </script>
</body>
</html>
