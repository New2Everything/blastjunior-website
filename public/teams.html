<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>战队列表 - 兰星少年 HADO 俱乐部</title>
  <meta name="description" content="兰星少年 HADO 俱乐部战队列表">
  <meta name="theme-color" content="#FF6B35">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/components/nav-loader.js"></script>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1 class="page-title">🏆 战队列表</h1>
      <p class="page-subtitle">HADO 俱乐部旗下所有战队</p>
    </div>

    <div class="section">
      <div class="cards-grid" id="teamsGrid">
        <div class="card" style="text-align:center;color:var(--text-gray);"><span class="spinner"></span>加载中</div>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://blast-homepage-api.kanjiaming2022.workers.dev';

    async function loadTeams() {
      try {
        const res = await fetch(API + '/teams');
        const result = await res.json();
        renderTeams(result.data || []);
      } catch (e) {
        document.getElementById('teamsGrid').innerHTML = '<div class="error-state" style="grid-column:1/-1;">加载失败</div>';
      }
    }

    function renderTeams(teams) {
      const grid = document.getElementById('teamsGrid');
      if (!teams.length) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">🔥</div><div>暂无战队</div></div>';
        return;
      }
      grid.innerHTML = teams.map(t => `
        <a href="/team-detail.html?id=${t.id}" class="card" style="display:block;text-decoration:none;color:inherit;">
          <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem;">
            <div style="width:56px;height:56px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.75rem;">🔥</div>
            <div>
              <h3 style="font-weight:700;font-size:1.1rem;">${t.name || t.canonical_name || ''}</h3>
              ${t.team_code ? `<span style="font-size:0.8rem;color:var(--text-gray);">${t.team_code}</span>` : ''}
            </div>
          </div>
          ${t.club_id ? `<div style="font-size:0.85rem;color:var(--text-gray);">俱乐部: ${t.club_id}</div>` : ''}
          <div style="margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid var(--border);font-size:0.85rem;color:var(--text-gray);">点击查看详情 →</div>
        </a>
      `).join('');
    }

    loadTeams();
  </script>
</body>
</html>
