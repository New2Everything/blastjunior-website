<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选手列表 - 兰星少年 HADO 俱乐部</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B35; --secondary: #00B4D8; --bg-light: #F8FAFC; --bg-white: #FFFFFF; --text-dark: #1E293B; --text-gray: #64748B; --border: #E2E8F0; --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-light); color: var(--text-dark); }
        nav { background: var(--bg-white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 64px; }
        .logo { display: flex; align-items: center; gap: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.25rem; text-decoration: none; color: var(--text-dark); }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), #FF8A5C); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; }
        .nav-links { display: flex; gap: 0.5rem; }
        .nav-link { padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; color: var(--text-gray); font-weight: 500; transition: all 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        .page-title { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 900; margin-bottom: 1.5rem; }
        
        .filters { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .filter-select { padding: 0.6rem 1rem; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-white); font-size: 0.9rem; min-width: 130px; }
        
        .players-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        
        .player-card { background: var(--bg-white); border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow); text-decoration: none; color: inherit; display: block; text-align: center; transition: transform 0.2s; }
        .player-card:hover { transform: translateY(-4px); }
        .player-avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), #FF8A5C); margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
        .player-name { font-family: 'Outfit', sans-serif; font-size: 1.25rem; font-weight: 900; margin-bottom: 0.25rem; }
        .player-team { color: var(--text-gray); font-size: 0.9rem; margin-bottom: 0.5rem; }
        .player-title { display: inline-block; background: var(--primary); color: white; padding: 0.25rem 0.75rem; border-radius: 50px; font-size: 0.75rem; font-weight: 600; }
        .player-stats { display: flex; justify-content: center; gap: 1.5rem; margin-top: 1rem; font-size: 0.9rem; }
        .player-stat strong { color: var(--primary); font-weight: 700; font-size: 1.1rem; display: block; }
        
        .loading { text-align: center; padding: 3rem; color: var(--text-gray); }
        
        @media (max-width: 768px) { .nav-links { display: none; } }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="/" class="logo"><div class="logo-icon">⚡</div><span>兰星少年</span></a>
            <div class="nav-links">
                <a href="/" class="nav-link">首页</a>
                <a href="/matches" class="nav-link">赛程</a>
                <a href="/standings" class="nav-link">积分榜</a>
                <a href="/teams" class="nav-link">战队</a>
                <a href="/players" class="nav-link active">选手</a>
                <a href="/gallery" class="nav-link">画廊</a>
                <a href="/honor" class="nav-link">荣誉</a>
                <a href="/join" class="nav-link">加入</a>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <h1 class="page-title">⭐ 选手列表</h1>
        
        <div class="filters">
            <select class="filter-select"><option>全部战队</option><option>烈焰</option><option>冠军</option><option>星光</option></select>
            <select class="filter-select"><option>全部位置</option><option>前锋</option><option>后卫</option><option>守门</option></select>
        </div>
        
        <div class="players-grid" id="playersGrid">
            <div class="loading">加载中...</div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
        
        async function loadPlayers() {
            try {
                const resp = await fetch(API_BASE + '/players');
                const result = await resp.json();
                if (!result.ok) throw new Error(result.error);
                
                renderPlayers(result.data || []);
            } catch (e) {
                console.error('加载选手失败:', e);
                document.getElementById('playersGrid').innerHTML = '<div class="loading">加载失败</div>';
            }
        }
        
        function renderPlayers(players) {
            if (!players.length) {
                document.getElementById('playersGrid').innerHTML = '<div class="loading">暂无选手</div>';
                return;
            }
            
            const html = players.map(p => `
                <a href="/player-detail.html?id=${p.id}" class="player-card">
                    <div class="player-avatar">🦁</div>
                    <div class="player-name">${p.name}</div>
                    <div class="player-team">${p.team}</div>
                    <span class="player-title">${p.title}</span>
                    <div class="player-stats">
                        <div class="player-stat"><strong>${p.goals}</strong>进球</div>
                        <div class="player-stat"><strong>${p.assists}</strong>助攻</div>
                    </div>
                </a>
            `).join('');
            
            document.getElementById('playersGrid').innerHTML = html;
        }
        
        loadPlayers();
    </script>
</body>
</html>
