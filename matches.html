<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛程 - 兰星少年 HADO 俱乐部</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B35; --secondary: #00B4D8; --bg-light: #F8FAFC; --bg-white: #FFFFFF; --text-dark: #1E293B; --text-gray: #64748B; --success: #10B981; --danger: #EF4444; --border: #E2E8F0; --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-light); color: var(--text-dark); }
        nav { background: var(--bg-white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 64px; }
        .logo { display: flex; align-items: center; gap: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.25rem; text-decoration: none; color: var(--text-dark); }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), #FF8A5C); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; }
        .nav-links { display: flex; gap: 0.5rem; }
        .nav-link { padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; color: var(--text-gray); font-weight: 500; transition: all 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        .page-header { margin-bottom: 1.5rem; }
        .page-title { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 900; margin-bottom: 0.5rem; }
        
        .filters { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .filter-select { padding: 0.6rem 1rem; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-white); font-size: 0.9rem; min-width: 140px; }
        
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        .tab { padding: 0.75rem 1.5rem; background: var(--bg-white); border: none; border-radius: 8px; font-weight: 600; cursor: pointer; color: var(--text-gray); }
        .tab.active { background: var(--primary); color: white; }
        
        .match-list { display: flex; flex-direction: column; gap: 1rem; }
        .match-card { background: var(--bg-white); border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: space-between; transition: transform 0.2s; }
        .match-card:hover { transform: translateY(-3px); }
        .match-date-box { text-align: center; min-width: 80px; }
        .match-day { font-family: 'Outfit', sans-serif; font-size: 1.75rem; font-weight: 900; color: var(--primary); }
        .match-month { font-size: 0.85rem; color: var(--text-gray); }
        .match-teams { display: flex; align-items: center; gap: 1.5rem; flex: 1; justify-content: center; }
        .match-team { display: flex; align-items: center; gap: 0.5rem; font-weight: 700; }
        .team-logo { width: 40px; height: 40px; background: var(--bg-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; }
        .match-score { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 900; display: flex; align-items: center; gap: 0.5rem; }
        .score-item { padding: 0.25rem 0.75rem; background: var(--bg-light); border-radius: 8px; }
        .score-item.win { background: var(--success); color: white; }
        .score-item.lose { background: var(--danger); color: white; }
        .match-info { text-align: right; min-width: 120px; }
        .match-time { font-weight: 600; color: var(--secondary); }
        .match-league { font-size: 0.85rem; color: var(--text-gray); }
        .match-status { display: inline-block; padding: 0.25rem 0.5rem; background: var(--success); color: white; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .match-teams { flex-direction: column; gap: 0.5rem; }
            .match-card { flex-direction: column; gap: 1rem; }
            .match-info { text-align: center; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="/" class="logo"><div class="logo-icon">⚡</div><span>兰星少年</span></a>
            <div class="nav-links">
                <a href="/" class="nav-link">首页</a>
                <a href="/matches" class="nav-link active">赛程</a>
                <a href="/standings" class="nav-link">积分榜</a>
                <a href="/teams" class="nav-link">战队</a>
                <a href="/players" class="nav-link">选手</a>
                <a href="/gallery" class="nav-link">画廊</a>
                <a href="/join" class="nav-link">加入</a>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <div class="page-header">
            <h1 class="page-title">⚔️ 赛程</h1>
        </div>
        
        <div class="filters">
            <select class="filter-select"><option>2026春季</option><option>2025秋季</option></select>
            <select class="filter-select"><option>全部组别</option><option>U12</option><option>U15</option><option>U18</option></select>
            <select class="filter-select"><option>全部战队</option></select>
        </div>
        
        <div class="tabs">
            <button class="tab active">全部</button>
            <button class="tab">未开始</button>
            <button class="tab">进行中</button>
            <button class="tab">已结束</button>
        </div>
        
        <div class="match-list">
            <!-- Upcoming -->
            <div class="match-card">
                <div class="match-date-box">
                    <div class="match-day">07</div>
                    <div class="match-month">3月 周五</div>
                </div>
                <div class="match-teams">
                    <div class="match-team"><div class="team-logo">🔥</div><span>烈焰</span></div>
                    <div class="match-score"><span class="score-item">-</span> : <span class="score-item">-</span></div>
                    <div class="match-team"><div class="team-logo">🌟</div><span>星光</span></div>
                </div>
                <div class="match-info">
                    <div class="match-time">14:30</div>
                    <div class="match-league">U12 竞技组</div>
                    <span class="match-status">未开始</span>
                </div>
            </div>
            
            <!-- Live -->
            <div class="match-card">
                <div class="match-date-box">
                    <div class="match-day">05</div>
                    <div class="match-month">3月 今天</div>
                </div>
                <div class="match-teams">
                    <div class="match-team"><div class="team-logo">🏆</div><span>冠军</span></div>
                    <div class="match-score"><span class="score-item win">2</span> : <span class="score-item lose">1</span></div>
                    <div class="match-team"><div class="team-logo">⚡</div><span>雷霆</span></div>
                </div>
                <div class="match-info">
                    <div class="match-time">16:00</div>
                    <div class="match-league">U15 竞技组</div>
                    <span class="match-status" style="background:var(--danger)">下半场</span>
                </div>
            </div>
            
            <!-- Finished -->
            <div class="match-card">
                <div class="match-date-box">
                    <div class="match-day">05</div>
                    <div class="match-month">3月 今天</div>
                </div>
                <div class="match-teams">
                    <div class="match-team"><div class="team-logo">🔥</div><span>烈焰</span></div>
                    <div class="match-score"><span class="score-item win">3</span> : <span class="score-item lose">1</span></div>
                    <div class="match-team"><div class="team-logo">⚡</div><span>雷霆</span></div>
                </div>
                <div class="match-info">
                    <div class="match-time">14:30</div>
                    <div class="match-league">U12 竞技组</div>
                    <span class="match-status">已结束</span>
                </div>
            </div>
            
            <div class="match-card">
                <div class="match-date-box">
                    <div class="match-day">04</div>
                    <div class="match-month">3月 昨天</div>
                </div>
                <div class="match-teams">
                    <div class="match-team"><div class="team-logo">🌟</div><span>星光</span></div>
                    <div class="match-score"><span class="score-item win">2</span> : <span class="score-item lose">2</span></div>
                    <div class="match-team"><div class="team-logo">🏆</div><span>冠军</span></div>
                </div>
                <div class="match-info">
                    <div class="match-time">16:00</div>
                    <div class="match-league">U15 竞技组</div>
                    <span class="match-status">已结束</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
