<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛程 - 兰星少年 HADO 俱乐部</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B35; --secondary: #00B4D8; --bg-light: #F8FAFC; --bg-white: #FFFFFF; --text-dark: #1E293B; --text-gray: #64748B; --border: #E2E8F0; --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px; --success: #10B981; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-light); color: var(--text-dark); }
        nav { background: var(--bg-white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 64px; }
        .logo { display: flex; align-items: center; gap: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.25rem; text-decoration: none; color: var(--text-dark); }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), #FF8A5C); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; }
        .nav-links { display: flex; gap: 0.5rem; }
        .nav-link { padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; color: var(--text-gray); font-weight: 500; transition: all 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        .page-title { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 900; margin-bottom: 1.5rem; }
        
        .filters { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .filter-select { padding: 0.6rem 1rem; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-white); font-size: 0.9rem; min-width: 130px; }
        
        .matches-list { display: flex; flex-direction: column; gap: 1rem; }
        
        .match-card { background: var(--bg-white); border-radius: var(--radius); padding: 1.25rem; box-shadow: var(--shadow); }
        .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .match-league { font-size: 0.85rem; color: var(--text-gray); }
        .match-status { padding: 0.25rem 0.75rem; border-radius: 50px; font-size: 0.75rem; font-weight: 600; }
        .match-status.finished { background: var(--success); color: white; }
        .match-status.upcoming { background: var(--secondary); color: white; }
        
        .match-teams { display: flex; justify-content: space-between; align-items: center; }
        .match-team { text-align: center; flex: 1; }
        .match-team-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .match-team-name { font-weight: 700; font-size: 1.1rem; }
        
        .match-score { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 2rem; color: var(--primary); }
        .match-vs { font-size: 1.5rem; color: var(--text-gray); }
        
        .match-footer { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); font-size: 0.9rem; color: var(--text-gray); text-align: center; }
        
        .loading { text-align: center; padding: 3rem; color: var(--text-gray); }
        
        @media (max-width: 768px) { .nav-links { display: none; } }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="/" class="logo"><div class="logo-icon">⚡</div><span>兰星少年</span></a>
            <div class="nav-links">
                <a href="/" class="nav-link">首页</a>
                <a href="/matches" class="nav-link active">赛程</a>
                <a href="/standings" class="nav-link">积分榜</a>
                <a href="/teams" class="nav-link">战队</a>
                <a href="/players" class="nav-link">选手</a>
                <a href="/gallery" class="nav-link">画廊</a>
                <a href="/honor" class="nav-link">荣誉</a>
                <a href="/join" class="nav-link">加入</a>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <h1 class="page-title">📅 赛程</h1>
        
        <div class="filters">
            <select class="filter-select"><option>全部组别</option><option>U12</option><option>U15</option><option>U18</option></select>
            <select class="filter-select"><option>2026春季联赛</option><option>2025秋季联赛</option></select>
            <select class="filter-select"><option>全部</option><option>已结束</option><option>未开始</option></select>
        </div>
        
        <div class="matches-list" id="matchesList">
            <div class="loading">加载中...</div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
        
        async function loadMatches() {
            try {
                const resp = await fetch(API_BASE + '/matches');
                const result = await resp.json();
                if (!result.ok) throw new Error(result.error);
                
                renderMatches(result.data || []);
            } catch (e) {
                console.error('加载赛程失败:', e);
                document.getElementById('matchesList').innerHTML = '<div class="loading">加载失败</div>';
            }
        }
        
        function renderMatches(matches) {
            if (!matches.length) {
                document.getElementById('matchesList').innerHTML = '<div class="loading">暂无比赛</div>';
                return;
            }
            
            const html = matches.map(m => {
                const isFinished = m.status === 'finished';
                return `<div class="match-card">
                    <div class="match-header">
                        <span class="match-league">${m.league} · ${m.group}</span>
                        <span class="match-status ${m.status}">${isFinished ? '已结束' : '未开始'}</span>
                    </div>
                    <div class="match-teams">
                        <div class="match-team">
                            <div class="match-team-icon">🔥</div>
                            <div class="match-team-name">${m.team1}</div>
                        </div>
                        <div class="match-score">${isFinished ? `${m.score1} - ${m.score2}` : ''}</div>
                        ${!isFinished ? '<div class="match-vs">VS</div>' : ''}
                        <div class="match-team">
                            <div class="match-team-icon">⭐</div>
                            <div class="match-team-name">${m.team2}</div>
                        </div>
                    </div>
                    <div class="match-footer">${m.time}</div>
                </div>`;
            }).join('');
            
            document.getElementById('matchesList').innerHTML = html;
        }
        
        loadMatches();
    </script>
</body>
</html>
