<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画廊 - 兰星少年 HADO 俱乐部</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B35; --secondary: #00B4D8; --bg-light: #F8FAFC; --bg-white: #FFFFFF; --text-dark: #1E293B; --text-gray: #64748B; --border: #E2E8F0; --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-light); color: var(--text-dark); }
        nav { background: var(--bg-white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 64px; }
        .logo { display: flex; align-items: center; gap: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.25rem; text-decoration: none; color: var(--text-dark); }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), #FF8A5C); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; }
        .nav-links { display: flex; gap: 0.5rem; }
        .nav-link { padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; color: var(--text-gray); font-weight: 500; transition: all 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        .page-header { margin-bottom: 1.5 .page-title { font-family: 'rem; }
       Outfit', sans-serif; font-size: 2rem; font-weight: 900; margin-bottom: 0.5rem; }
        .page-subtitle { color: var(--text-gray); }
        
        .filters { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .filter-select { padding: 0.6rem 1rem; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-white); font-size: 0.9rem; min-width: 130px; }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        
        .album-card { background: var(--bg-white); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); transition: transform 0.2s; text-decoration: none; color: inherit; display: block; }
        .album-card:hover { transform: translateY(-4px); }
        .album-cover { height: 180px; position: relative; display: flex; align-items: center; justify-content: center; font-size: 4rem; overflow: hidden; background: linear-gradient(135deg, var(--primary), #FF8A5C); }
        .album-cover img { width: 100%; height: 100%; object-fit: cover; }
        .album-count { position: absolute; bottom: 0.75rem; right: 0.75rem; background: rgba(0,0,0,0.6); color: white; padding: 0.25rem 0.75rem; border-radius: 50px; font-size: 0.8rem; font-weight: 600; }
        
        .album-info { padding: 1.25rem; }
        .album-tag { display: inline-block; background: var(--secondary); color: white; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; margin-bottom: 0.5rem; }
        .album-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 0.5rem; }
        .album-meta { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-gray); }
        
        .loading { text-align: center; padding: 3rem; color: var(--text-gray); font-size: 1.1rem; }
        
        @media (max-width: 768px) { .nav-links { display: none; } }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="/" class="logo"><div class="logo-icon">⚡</div><span>兰星少年</span></a>
            <div class="nav-links">
                <a href="/" class="nav-link">首页</a>
                <a href="/matches" class="nav-link">赛程</a>
                <a href="/standings" class="nav-link">积分榜</a>
                <a href="/teams" class="nav-link">战队</a>
                <a href="/players" class="nav-link">选手</a>
                <a href="/gallery" class="nav-link active">画廊</a>
                <a href="/join" class="nav-link">加入</a>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <div class="page-header">
            <h1 class="page-title">📸 画廊</h1>
            <p class="page-subtitle">记录每一个精彩瞬间</p>
        </div>
        
        <div class="filters">
            <select class="filter-select" id="typeFilter"><option value="">全部类型</option><option>赛事</option><option>训练</option><option>活动</option><option>人物</option></select>
            <select class="filter-select"><option>2026春季</option><option>2025秋季</option></select>
            <select class="filter-select"><option>最新</option><option>最热</option></select>
        </div>
        
        <div class="gallery-grid" id="galleryGrid">
            <div class="loading">加载中...</div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
        
        async function loadGallery() {
            try {
                const resp = await fetch(API_BASE + '/gallery');
                const result = await resp.json();
                if (!result.ok) throw new Error(result.error);
                
                renderAlbums(result.data || []);
            } catch (e) {
                console.error('加载画廊失败:', e);
                document.getElementById('galleryGrid').innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
            }
        }
        
        function renderAlbums(albums) {
            if (!albums.length) {
                document.getElementById('galleryGrid').innerHTML = '<div class="loading">暂无相册</div>';
                return;
            }
            
            const html = albums.map(album => `
                <a href="/gallery/${album.id}" class="album-card">
                    <div class="album-cover">
                        ${album.cover ? `<img src="${album.cover}" alt="${album.title}">` : '📷'}
                        <span class="album-count">📷 ${album.count || 0}</span>
                    </div>
                    <div class="album-info">
                        <span class="album-tag">${album.type || '赛事'}</span>
                        <h3 class="album-title">${album.title}</h3>
                        <div class="album-meta"><span>${album.date || ''}</span></div>
                    </div>
                </a>
            `).join('');
            
            document.getElementById('galleryGrid').innerHTML = html;
        }
        
        loadGallery();
    </script>
</body>
</html>
