<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轮次复盘 - 兰星少年 HADO 俱乐部</title>
    <!-- DATA_MODULE: internal_rounds -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B35; --secondary: #00B4D8; --bg-light: #F8FAFC; --bg-white: #FFFFFF; --text-dark: #1E293B; --text-gray: #64748B; --border: #E2E8F0; --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-light); color: var(--text-dark); }
        nav { background: var(--bg-white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 64px; }
        .logo { display: flex; align-items: center; gap: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.25rem; text-decoration: none; color: var(--text-dark); }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), #FF8A5C); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; }
        .nav-links { display: flex; gap: 0.5rem; }
        .nav-link { padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; color: var(--text-gray); font-weight: 500; transition: all 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 1.5rem; }
        .page-header { margin-bottom: 2rem; }
        .page-title { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 900; margin-bottom: 0.5rem; }
        .page-subtitle { color: var(--text-gray); }
        
        /* 轮次卡片 */
        .round-card { background: var(--bg-white); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: var(--shadow); }
        .round-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
        .round-title { font-family: 'Outfit', sans-serif; font-size: 1.25rem; font-weight: 700; }
        .round-date { color: var(--text-gray); font-size: 0.9rem; }
        
        /* 选手榜单 */
        .player-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .player-item { display: flex; align-items: center; gap: 1rem; padding: 0.75rem; background: var(--bg-light); border-radius: 8px; }
        .player-rank { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; }
        .player-rank.gold { background: linear-gradient(135deg, #FFD700, #FFA500); color: white; }
        .player-rank.silver { background: linear-gradient(135deg, #C0C0C0, #A0A0A0); color: white; }
        .player-rank.bronze { background: linear-gradient(135deg, #CD7F32, #B87333); color: white; }
        .player-rank.normal { background: var(--border); color: var(--text-gray); }
        
        .player-name { flex: 1; font-weight: 500; }
        .player-points { display: flex; gap: 1rem; }
        .points-badge { padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.8rem; font-weight: 600; }
        .points-round { background: var(--primary); color: white; }
        .points-total { background: var(--secondary); color: white; }
        
        /* 加载和空状态 */
        .loading { text-align: center; padding: 3rem; color: var(--text-gray); }
        .empty { text-align: center; padding: 3rem; color: var(--text-gray); }
        
        /* 分享按钮 */
        .share-btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 500; cursor: pointer; margin-top: 1rem; }
        .share-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="/" class="logo"><div class="logo-icon">📊</div><span>兰星少年</span></a>
            <div class="nav-links">
                <a href="/" class="nav-link">首页</a>
                <a href="/matches" class="nav-link">赛程</a>
                <a href="/standings" class="nav-link">积分榜</a>
                <a href="/teams" class="nav-link">战队</a>
                <a href="/players" class="nav-link">选手</a>
                <a href="/gallery" class="nav-link">画廊</a>
                <a href="/join" class="nav-link">加入</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1 class="page-title">🏆 轮次复盘</h1>
            <p class="page-subtitle">内部联赛每轮战报与选手表现</p>
        </div>
        
        <div id="roundsList">
            <div class="loading">加载中...</div>
        </div>
    </main>

    <script>
    const API_BASE = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
    
    function getRankClass(rank) {
        if (rank === 1) return 'gold';
        if (rank === 2) return 'silver';
        if (rank === 3) return 'bronze';
        return 'normal';
    }
    
    function getRankEmoji(rank) {
        if (rank === 1) return '🥇';
        if (rank === 2) return '🥈';
        if (rank === 3) return '🥉';
        return rank;
    }
    
    function formatDate(dateStr) {
        const date = new Date(dateStr);
        return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
    }
    
    async function loadRounds() {
        try {
            const res = await fetch(`${API_BASE}/internal-rounds`);
            const data = await res.json();
            
            if (!data.ok || !data.data || data.data.length === 0) {
                document.getElementById('roundsList').innerHTML = '<div class="empty">暂无轮次数据</div>';
                return;
            }
            
            const rounds = data.data;
            document.getElementById('roundsList').innerHTML = rounds.map((round, idx) => `
                <div class="round-card">
                    <div class="round-header">
                        <span class="round-title">第${idx + 1}轮</span>
                        <span class="round-date">${formatDate(round.round_date)}</span>
                    </div>
                    <div class="player-list">
                        ${(round.topPlayers || []).map(p => `
                            <div class="player-item">
                                <div class="player-rank ${getRankClass(p.rank)}">${getRankEmoji(p.rank)}</div>
                                <span class="player-name">${p.name}</span>
                                <div class="player-points">
                                    <span class="points-badge points-round">+${p.points}</span>
                                    <span class="points-badge points-total">${p.total}分</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            
        } catch (e) {
            document.getElementById('roundsList').innerHTML = '<div class="empty">加载失败</div>';
        }
    }
    
    loadRounds();
    </script>
</body>
</html>
