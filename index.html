<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兰星少年 HADO 俱乐部</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0e17;
            --bg-card: #131a2b;
            --bg-card-hover: #1a2235;
            --primary: #00d4ff;
            --primary-glow: rgba(0, 212, 255, 0.3);
            --accent: #ff6b35;
            --accent-secondary: #a855f7;
            --text-main: #ffffff;
            --text-muted: #8b9dc3;
            --border: #2a3a5c;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-dark); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
        
        .bg-effects { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .bg-effects::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.06) 0%, transparent 50%), radial-gradient(ellipse at 50% 50%, rgba(255, 107, 53, 0.04) 0%, transparent 40%); animation: bgPulse 15s ease-in-out infinite; }
        @keyframes bgPulse { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 33% { transform: translate(2%, 2%) rotate(1deg); } 66% { transform: translate(-1%, 1%) rotate(-1deg); } }
        .grid-particles { position: absolute; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px); background-size: 50px 50px; animation: gridMove 20s linear infinite; }
        @keyframes gridMove { 0% { transform: perspective(500px) rotateX(60deg) translateY(0); } 100% { transform: perspective(500px) rotateX(60deg) translateY(50px); } }
        
        header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(10, 14, 23, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .header-content { max-width: 1200px; margin: 0 auto; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 0.75rem; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--accent-secondary)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1.2rem; color: white; text-shadow: 0 0 10px var(--primary-glow); }
        .logo-text { font-family: 'Orbitron', sans-serif; font-size: 1.25rem; font-weight: 700; background: linear-gradient(90deg, var(--primary), var(--accent-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        nav { display: flex; align-items: center; gap: 2rem; }
        nav a { color: var(--text-muted); text-decoration: none; font-weight: 500; transition: all 0.3s; position: relative; }
        nav a:hover { color: var(--primary); }
        .nav-auth { display: flex; gap: 0.75rem; }
        .btn { padding: 0.5rem 1.25rem; border-radius: 50px; font-weight: 600; font-size: 0.875rem; text-decoration: none; transition: all 0.3s; cursor: pointer; border: none; }
        .btn-login { background: transparent; color: var(--text-main); border: 1px solid var(--border); }
        .btn-login:hover { border-color: var(--primary); color: var(--primary); }
        .btn-register { background: linear-gradient(135deg, var(--primary), #0099cc); color: var(--bg-dark); }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 4px 15px var(--primary-glow); }
        .user-info { display: flex; align-items: center; gap: 0.75rem; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-secondary)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.875rem; }
        .user-name { font-weight: 500; }
        .btn-logout { background: transparent; color: var(--text-muted); border: none; font-size: 0.75rem; cursor: pointer; }
        .btn-logout:hover { color: var(--danger); }
        
        .hero { position: relative; z-index: 1; padding: 7rem 2rem 3rem; text-align: center; overflow: hidden; }
        .hero-bg-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.15; z-index: -1; }
        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, rgba(10, 14, 23, 0.8) 0%, rgba(10, 14, 23, 0.95) 100%); z-index: -1; }
        .hero-content { max-width: 800px; margin: 0 auto; }
        .hero-badge { display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(0, 212, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.3); padding: 0.5rem 1rem; border-radius: 50px; font-size: 0.875rem; color: var(--primary); margin-bottom: 1.5rem; animation: badgePulse 2s ease-in-out infinite; }
        @keyframes badgePulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.4); } 50% { box-shadow: 0 0 20px 5px rgba(0, 212, 255, 0.1); } }
        .hero h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 900; margin-bottom: 1rem; line-height: 1.2; }
        .hero h1 .highlight { background: linear-gradient(90deg, var(--primary), var(--accent), var(--accent-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: gradientShift 3s ease-in-out infinite; background-size: 200% 200%; }
        @keyframes gradientShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .hero p { font-size: 1.25rem; color: var(--text-muted); margin-bottom: 2rem; max-width: 600px; margin-left: auto; margin-right: auto; }
        
        .hado-slogan { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; margin: 2rem 0; }
        .slogan-tag { padding: 0.5rem 1.25rem; background: rgba(255, 107, 53, 0.1); border: 1px solid rgba(255, 107, 53, 0.3); border-radius: 50px; color: var(--accent); font-weight: 600; font-size: 0.95rem; animation: tagPulse 3s ease-in-out infinite; }
        .slogan-tag:nth-child(2) { animation-delay: 0.5s; background: rgba(168, 85, 247, 0.1); border-color: rgba(168, 85, 247, 0.3); color: var(--accent-secondary); }
        .slogan-tag:nth-child(3) { animation-delay: 1s; background: rgba(0, 212, 255, 0.1); border-color: rgba(0, 212, 255, 0.3); color: var(--primary); }
        @keyframes tagPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        .chat-section { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 2rem; }
        .section-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
        .section-title { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 600; }
        .online-info { display: flex; align-items: center; gap: 0.5rem; margin-left: auto; }
        .online-dot { width: 10px; height: 10px; background: var(--success); border-radius: 50%; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .online-count { color: var(--text-muted); font-size: 0.875rem; }
        
        .chat-container { background: var(--bg-card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; max-height: 600px; display: flex; flex-direction: column; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
        
        .message { display: flex; gap: 0.75rem; animation: messageIn 0.3s ease-out; }
        @keyframes messageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message-avatar { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1rem; flex-shrink: 0; }
        .message-avatar.ai { background: linear-gradient(135deg, var(--primary), var(--accent-secondary)); }
        .message-avatar.human { background: linear-gradient(135deg, var(--accent), #ff8c5a); }
        .message-avatar.system { background: linear-gradient(135deg, var(--success), #34d399); }
        .message-content { flex: 1; min-width: 0; }
        .message-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.25rem; }
        .message-name { font-weight: 600; font-size: 0.95rem; }
        .message-name.ai { color: var(--primary); }
        .message-name.human { color: var(--accent); }
        .message-badge { font-size: 0.65rem; padding: 0.15rem 0.4rem; border-radius: 4px; background: rgba(0, 212, 255, 0.2); color: var(--primary); }
        .message-time { font-size: 0.75rem; color: var(--text-muted); margin-left: auto; }
        .message-text { color: var(--text-main); line-height: 1.5; word-wrap: break-word; }
        
        .chat-input-container { padding: 1rem 1.5rem; border-top: 1px solid var(--border); background: rgba(0, 0, 0, 0.2); }
        .login-prompt { text-align: center; padding: 1.5rem; color: var(--text-muted); }
        .login-prompt a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .login-prompt a:hover { text-decoration: underline; }
        
        .chat-input-wrapper { display: flex; gap: 0.75rem; align-items: flex-end; }
        .nickname-input { background: var(--bg-dark); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 1rem; color: var(--text-main); font-size: 0.95rem; width: 100px; flex-shrink: 0; }
        .chat-input { flex: 1; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 1rem; color: var(--text-main); font-size: 0.95rem; font-family: inherit; resize: none; min-height: 44px; max-height: 120px; }
        .chat-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1); }
        .chat-send-btn { width: 44px; height: 44px; background: linear-gradient(135deg, var(--primary), #0099cc); border: none; border-radius: 12px; color: var(--bg-dark); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; flex-shrink: 0; }
        .chat-send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 15px var(--primary-glow); }
        .chat-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .chat-send-btn svg { width: 20px; height: 20px; }
        
        .loading-indicator { text-align: center; padding: 2rem; color: var(--text-muted); }
        .spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 0.5rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 0.75rem 1.5rem; border-radius: 8px; font-size: 0.875rem; z-index: 1000; animation: slideUp 0.3s ease; }
        .toast.success { background: var(--success); }
        @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--bg-card); border-radius: 20px; border: 1px solid var(--border); padding: 2rem; max-width: 400px; width: 90%; animation: modalIn 0.3s ease; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .modal h2 { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; background: linear-gradient(90deg, var(--primary), var(--accent-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted); }
        .form-group input { width: 100%; padding: 0.75rem 1rem; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 12px; color: var(--text-main); font-size: 1rem; }
        .form-group input:focus { outline: none; border-color: var(--primary); }
        .modal .btn { width: 100%; padding: 0.875rem; margin-top: 0.5rem; }
        .modal-switch { text-align: center; margin-top: 1rem; color: var(--text-muted); font-size: 0.875rem; }
        .modal-switch a { color: var(--primary); text-decoration: none; font-weight: 600; }
        
        footer { position: relative; z-index: 1; text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.875rem; border-top: 1px solid var(--border); margin-top: 2rem; }
    </style>
</head>
<body>
    <div class="bg-effects">
        <div class="grid-particles"></div>
    </div>
    
    <header>
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">H</div>
                <span class="logo-text">兰星少年</span>
            </div>
            <nav>
                <a href="#">首页</a>
                <div class="nav-auth" id="navAuth">
                    <a href="#" class="btn btn-login" onclick="showModal('login')">登录</a>
                    <a href="#" class="btn btn-register" onclick="showModal('register')">注册</a>
                </div>
            </nav>
        </div>
    </header>
    
    <section class="hero">
        <img class="hero-bg-image" id="heroBg" alt="">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="hero-badge">⚡ HADO 青少年俱乐部</div>
            <h1>释放你的<span class="highlight">热血</span></h1>
            <p>这里是兰星少年的聚集地，用汗水书写青春，用激情点燃梦想！</p>
            <div class="hado-slogan">
                <span class="slogan-tag">⚔️ 战斗</span>
                <span class="slogan-tag">🔥 热血</span>
                <span class="slogan-tag">🏆 荣耀</span>
            </div>
        </div>
    </section>
    
    <section class="chat-section">
        <div class="section-header">
            <h2 class="section-title">💬 社区热聊</h2>
            <div class="online-info">
                <span class="online-dot" id="onlineDot"></span>
                <span class="online-count" id="onlineCount">0 人在线</span>
            </div>
        </div>
        
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="loading-indicator">
                    <div class="spinner"></div>
                    加载中...
                </div>
            </div>
            
            <div class="chat-input-container" id="chatInputContainer">
            </div>
        </div>
    </section>
    
    <footer>
        <p>© 2026 兰星少年 HADO 俱乐部 | 让青春燃烧</p>
    </footer>
    
    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <h2>登录</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" id="loginEmail" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-register">登录</button>
            </form>
            <p class="modal-switch">还没有账号？ <a href="#" onclick="switchModal('register')">立即注册</a></p>
        </div>
    </div>
    
    <div class="modal-overlay" id="registerModal">
        <div class="modal">
            <h2>注册</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" id="registerEmail" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>昵称</label>
                    <input type="text" id="registerNickname" required placeholder="你的昵称" maxlength="20">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="registerPassword" required placeholder="至少6位" minlength="6">
                </div>
                <button type="submit" class="btn btn-register">注册</button>
            </form>
            <p class="modal-switch">已有账号？ <a href="#" onclick="switchModal('login')">立即登录</a></p>
        </div>
    </div>
    
    <script>
        const AUTH_API = 'https://blast-auth-api.kanjiaming2022.workers.dev';
        const COMMENTS_API = 'https://blast-comments-api.kanjiaming2022.workers.dev';
        const SAFE_API = 'https://blast-safe-api.kanjiaming2022.workers.dev';
        const R2_PUBLIC_URL = 'https://blastjunior-media.kanjiaming2022.workers.dev/public/';
        const PHOTO_ID = '999999';
        const LOCAL_KEY = 'blxst_messages_v2';
        
        let currentUser = null;
        let authToken = localStorage.getItem('blxst_token');
        
        async function init() {
            await loadRandomHeroImage();
            await checkAuth();
            await loadMessages();
            updateOnlineStatus();
        }
        
        const heroImages = ['HADO(1).jpg', 'HADO(2).jpg', 'HADO(3).jpg', 'HADO(4).jpg', 'HADO(5).jpg'];
        
        async function loadRandomHeroImage() {
            const randomImg = heroImages[Math.floor(Math.random() * heroImages.length)];
            document.getElementById('heroBg').src = R2_PUBLIC_URL + randomImg;
        }
        
        async function checkAuth() {
            if (!authToken) { updateAuthUI(null); return; }
            try {
                const resp = await fetch(`${AUTH_API}/verify?token=${authToken}`);
                const data = await resp.json();
                if (data.ok) { currentUser = data.user; updateAuthUI(currentUser); }
                else { logout(); }
            } catch (e) { logout(); }
        }
        
        function updateAuthUI(user) {
            const navAuth = document.getElementById('navAuth');
            const inputContainer = document.getElementById('chatInputContainer');
            
            if (user) {
                navAuth.innerHTML = `<div class="user-info"><div class="user-avatar">${user.nickname.charAt(0).toUpperCase()}</div><span class="user-name">${user.nickname}</span><button class="btn-logout" onclick="logout()">退出</button></div>`;
                inputContainer.innerHTML = `<div class="chat-input-wrapper"><input type="text" class="nickname-input" id="nicknameInput" value="${user.nickname}" readonly><textarea class="chat-input" id="messageInput" placeholder="说点什么..." rows="1"></textarea><button class="chat-send-btn" id="sendBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13"/></svg></button></div>`;
                document.getElementById('sendBtn').addEventListener('click', sendMessage);
                document.getElementById('messageInput').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
                document.getElementById('messageInput').addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 120) + 'px'; });
            } else {
                navAuth.innerHTML = `<a href="#" class="btn btn-login" onclick="showModal('login')">登录</a><a href="#" class="btn btn-register" onclick="showModal('register')">注册</a>`;
                inputContainer.innerHTML = `<div class="login-prompt">🔒 登录后才能发言 <a href="#" onclick="showModal('login')">立即登录</a> | <a href="#" onclick="showModal('register')">注册账号</a></div>`;
            }
        }
        
        function showModal(type) {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('registerModal').classList.remove('active');
            document.getElementById(type + 'Modal').classList.add('active');
        }
        
        function switchModal(type) { showModal(type); }
        
        document.querySelectorAll('.modal-overlay').forEach(modal => {
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });
        });
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('registerEmail').value;
            const nickname = document.getElementById('registerNickname').value;
            const password = document.getElementById('registerPassword').value;
            
            try {
                const resp = await fetch(`${AUTH_API}/register`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, nickname, password }) });
                const data = await resp.json();
                if (data.ok) {
                    authToken = data.token;
                    currentUser = data.user;
                    localStorage.setItem('blxst_token', authToken);
                    document.getElementById('registerModal').classList.remove('active');
                    updateAuthUI(currentUser);
                    showToast('注册成功！欢迎加入兰星少年！', 'success');
                } else { showToast(data.error || '注册失败'); }
            } catch (err) { showToast('注册失败: ' + err.message); }
        });
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const resp = await fetch(`${AUTH_API}/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
                const data = await resp.json();
                if (data.ok) {
                    authToken = data.token;
                    currentUser = data.user;
                    localStorage.setItem('blxst_token', authToken);
                    document.getElementById('loginModal').classList.remove('active');
                    updateAuthUI(currentUser);
                    showToast('登录成功！欢迎回来！', 'success');
                } else { showToast(data.error || '登录失败'); }
            } catch (err) { showToast('登录失败: ' + err.message); }
        });
        
        function logout() {
            authToken = null;
            currentUser = null;
            localStorage.removeItem('blxst_token');
            updateAuthUI(null);
            showToast('已退出登录', 'success');
        }
        
        async function loadMessages() {
            const container = document.getElementById('chatMessages');
            try {
                const resp = await fetch(`${COMMENTS_API}/?photoId=${PHOTO_ID}`);
                const data = await resp.json();
                if (data.ok && data.items) { renderMessages(data.items); }
                else { const cached = localStorage.getItem(LOCAL_KEY); if (cached) renderMessages(JSON.parse(cached)); }
            } catch (e) {
                const cached = localStorage.getItem(LOCAL_KEY);
                if (cached) renderMessages(JSON.parse(cached));
            }
        }
        
        function renderMessages(messages) {
            const container = document.getElementById('chatMessages');
            if (!messages || messages.length === 0) { container.innerHTML = '<div class="loading-indicator">暂无消息，快来发言吧！</div>'; return; }
            container.innerHTML = messages.map(msg => `<div class="message"><div class="message-avatar ${msg.source === 'ai' ? 'ai' : 'human'}">${msg.nickname?.charAt(0).toUpperCase() || '?'}</div><div class="message-content"><div class="message-header"><span class="message-name ${msg.source === 'ai' ? 'ai' : 'human'}">${msg.nickname || '游客'}</span>${msg.source === 'ai' ? '<span class="message-badge">AI</span>' : ''}<span class="message-time">${formatTime(msg.createdAt)}</span></div><div class="message-text">${escapeHtml(msg.content)}</div></div></div>`).join('');
            container.scrollTop = container.scrollHeight;
        }
        
        function formatTime(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            return date.toLocaleDateString('zh-CN');
        }
        
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        
        async function sendMessage() {
            if (!currentUser) { showToast('请先登录'); return; }
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            try {
                const safeResp = await fetch(`${SAFE_API}/check`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ content: text, nickname: currentUser.nickname }) });
                const safeResult = await safeResp.json();
                if (!safeResult.approved) { showToast('内容不符合社区规范，请修改后重试'); return; }
            } catch (e) { console.error('安全审核失败:', e); }
            
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            
            try {
                const resp = await fetch(`${COMMENTS_API}/`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ photoId: PHOTO_ID, content: text, nickname: currentUser.nickname }) });
                const data = await resp.json();
                if (data.ok) {
                    showToast('发言成功！等待审核后显示', 'success');
                    input.value = '';
                    input.style.height = 'auto';
                } else { showToast(data.error || '发送失败'); }
            } catch (e) { showToast('发送失败: ' + e.message); }
            finally { sendBtn.disabled = false; }
        }
        
        function showToast(message, type = 'error') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function updateOnlineStatus() {
            const count = Math.floor(Math.random() * 20) + 5;
            document.getElementById('onlineCount').textContent = count + ' 人在线';
        }
        
        init();
        setInterval(loadMessages, 30000);
        setInterval(updateOnlineStatus, 60000);
    </script>
</body>
</html>
