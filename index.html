<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兰星少年 HADO 俱乐部</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0a0e17; --bg-card: #131a2b; --primary: #00d4ff; --primary-glow: rgba(0, 212, 255, 0.4); --accent: #ff6b35; --accent-secondary: #a855f7; --text-main: #ffffff; --text-muted: #8b9dc3; --border: #2a3a5c; --success: #10b981; --danger: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-dark); color: var(--text-main); min-height: 100vh; }
        .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; background: radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.1) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.08) 0%, transparent 50%); }
        
        header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(10, 14, 23, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .header { max-width: 1200px; margin: 0 auto; padding: 0.75rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 0.75rem; }
        .logo img { width: 42px; height: 42px; border-radius: 12px; box-shadow: 0 0 20px var(--primary-glow); }
        .logo span { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 700; background: linear-gradient(90deg, var(--primary), var(--accent-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        nav { display: flex; align-items: center; gap: 1.5rem; }
        nav a { color: var(--text-muted); text-decoration: none; font-weight: 500; padding: 0.5rem 1rem; border-radius: 8px; transition: all 0.3s; }
        nav a:hover { color: var(--primary); background: rgba(0, 212, 255, 0.1); }
        .btn { padding: 0.5rem 1.25rem; border-radius: 50px; font-weight: 600; font-size: 0.875rem; cursor: pointer; border: none; text-decoration: none; }
        .btn-login { background: transparent; color: var(--text-main); border: 1px solid var(--border); }
        .btn-login:hover { border-color: var(--primary); color: var(--primary); }
        .btn-register { background: linear-gradient(135deg, var(--primary), #0099cc); color: var(--bg-dark); }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 4px 15px var(--primary-glow); }
        .user-info { display: flex; align-items: center; gap: 0.75rem; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-secondary)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.875rem; }
        .btn-logout { background: transparent; color: var(--text-muted); border: none; font-size: 0.75rem; cursor: pointer; }
        .btn-logout:hover { color: var(--danger); }
        
        .hero { position: relative; z-index: 1; padding: 6rem 2rem 2rem; text-align: center; background: linear-gradient(180deg, rgba(0, 212, 255, 0.05) 0%, transparent 100%); }
        .hero-badge { display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(0, 212, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.3); padding: 0.5rem 1.25rem; border-radius: 50px; font-size: 0.875rem; color: var(--primary); margin-bottom: 1.5rem; }
        .hero h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(2.5rem, 7vw, 4.5rem); font-weight: 900; margin-bottom: 1rem; }
        .hero h1 .highlight { background: linear-gradient(90deg, var(--primary), var(--accent), var(--accent-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradientShift 4s ease-in-out infinite; background-size: 300% 300%; }
        @keyframes gradientShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .hero-sub { font-size: 1.35rem; color: var(--text-muted); margin-bottom: 2rem; }
        
        .intro-cards { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; margin: 2rem 0; }
        .intro-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem 1.75rem; display: flex; align-items: center; gap: 0.75rem; transition: all 0.3s; }
        .intro-card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .intro-card .icon { font-size: 1.5rem; }
        .intro-card .title { font-weight: 700; font-size: 1rem; }
        .intro-card .desc { font-size: 0.8rem; color: var(--text-muted); }
        
        .slogans { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; margin: 1.5rem 0; }
        .slogan-tag { padding: 0.6rem 1.5rem; background: rgba(255, 107, 53, 0.15); border: 1px solid rgba(255, 107, 53, 0.4); border-radius: 50px; color: var(--accent); font-weight: 700; }
        .slogan-tag:nth-child(2) { background: rgba(168, 85, 247, 0.15); border-color: rgba(168, 85, 247, 0.4); color: var(--accent-secondary); }
        .slogan-tag:nth-child(3) { background: rgba(0, 212, 255, 0.15); border-color: rgba(0, 212, 255, 0.4); color: var(--primary); }
        
        .main { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 2rem; display: grid; grid-template-columns: 1fr 300px; gap: 1.5rem; }
        
        .chat-section { background: var(--bg-card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; }
        .chat-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: rgba(0, 0, 0, 0.2); }
        .chat-title { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: 600; }
        .online-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; display: inline-block; margin-right: 0.5rem; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        
        .chat-messages { height: 420px; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
        .message { display: flex; gap: 0.6rem; animation: messageIn 0.3s ease-out; }
        @keyframes messageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message-avatar { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; }
        .message-avatar.ai { background: linear-gradient(135deg, var(--primary), var(--accent-secondary)); }
        .message-avatar.human { background: linear-gradient(135deg, var(--accent), #ff8c5a); }
        .message-content { flex: 1; min-width: 0; }
        .message-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.2rem; }
        .message-name { font-weight: 600; font-size: 0.9rem; }
        .message-name.ai { color: var(--primary); }
        .message-name.human { color: var(--accent); }
        .message-badge { font-size: 0.6rem; padding: 0.1rem 0.35rem; border-radius: 4px; background: rgba(0, 212, 255, 0.2); color: var(--primary); }
        .message-time { font-size: 0.7rem; color: var(--text-muted); margin-left: auto; }
        .message-text { color: var(--text-main); line-height: 1.5; font-size: 0.95rem; }
        
        .loading { text-align: center; padding: 3rem; color: var(--text-muted); }
        .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 0.75rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .chat-input { padding: 1rem; border-top: 1px solid var(--border); background: rgba(0, 0, 0, 0.3); }
        .login-prompt { text-align: center; padding: 1.5rem; color: var(--text-muted); font-size: 0.9rem; }
        .login-prompt a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .input-wrap { display: flex; gap: 0.6rem; align-items: flex-end; }
        .nickname-input { background: var(--bg-dark); border: 1px solid var(--border); border-radius: 10px; padding: 0.6rem; color: var(--text-main); font-size: 0.85rem; width: 80px; text-align: center; }
        .chat-input textarea { flex: 1; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 10px; padding: 0.6rem; color: var(--text-main); font-size: 0.9rem; font-family: inherit; resize: none; min-height: 40px; max-height: 100px; }
        .chat-input textarea:focus { outline: none; border-color: var(--primary); }
        .chat-input textarea::placeholder { color: var(--text-muted); }
        .send-btn { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), #0099cc); border: none; border-radius: 10px; color: var(--bg-dark); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 15px var(--primary-glow); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .sidebar { display: flex; flex-direction: column; gap: 1rem; }
        .side-card { background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border); padding: 1rem; }
        .side-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 0.75rem; }
        .user-list { display: flex; flex-direction: column; gap: 0.5rem; max-height: 200px; overflow-y: auto; }
        .user-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem; border-radius: 8px; }
        .user-item:hover { background: rgba(0, 212, 255, 0.1); }
        .user-item .avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--accent-secondary)); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; }
        .user-item .name { font-size: 0.85rem; flex: 1; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        .stat-item { text-align: center; padding: 0.75rem; background: rgba(0, 0, 0, 0.2); border-radius: 10px; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 0.75rem; color: var(--text-muted); }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--bg-card); border-radius: 20px; border: 1px solid var(--border); padding: 2rem; max-width: 380px; width: 90%; }
        .modal h2 { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; margin-bottom: 1.5rem; text-align: center; background: linear-gradient(90deg, var(--primary), var(--accent-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; font-weight: 500; color: var(--text-muted); font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 0.7rem 1rem; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 10px; color: var(--text-main); font-size: 0.95rem; }
        .form-group input:focus { outline: none; border-color: var(--primary); }
        .modal .btn { width: 100%; padding: 0.875rem; margin-top: 0.5rem; }
        .modal-switch { text-align: center; margin-top: 1rem; color: var(--text-muted); font-size: 0.85rem; }
        .modal-switch a { color: var(--primary); text-decoration: none; font-weight: 600; }
        
        .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); padding: 0.75rem 1.5rem; border-radius: 10px; font-size: 0.875rem; z-index: 1000; }
        .toast.error { background: var(--danger); color: white; }
        .toast.success { background: var(--success); color: white; }
        
        footer { position: relative; z-index: 1; text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.8rem; border-top: 1px solid var(--border); margin-top: 2rem; }
        
        @media (max-width: 900px) { .main { grid-template-columns: 1fr; } .sidebar { flex-direction: row; flex-wrap: wrap; } .side-card { flex: 1; min-width: 250px; } }
    </style>
</head>
<body>
    <div class="bg"></div>
    
    <header>
        <div class="header">
            <div class="logo">
                <img src="https://blast-static-api.kanjiaming2022.workers.dev/public/logo/blxst-logo.png" alt="BLXST">
                <span>兰星少年</span>
            </div>
            <nav>
                <a href="#">首页</a>
                <div id="navAuth">
                    <a href="#" class="btn btn-login" onclick="showModal(&quot;login&quot;)">登录</a>
                    <a href="#" class="btn btn-register" onclick="showModal(&quot;register&quot;)">注册</a>
                </div>
            </nav>
        </div>
    </header>
    
    <section class="hero">
        <div class="hero-badge">⚡ HADO 青少年俱乐部</div>
        <h1>释放你的<span class="highlight">热血</span></h1>
        <p class="hero-sub">这里是兰星少年的聚集地，用汗水书写青春，用激情点燃梦想！</p>
        
        <div class="intro-cards">
            <div class="intro-card"><span class="icon">🎯</span><div><div class="title">HADO</div><div class="desc">AR科技运动</div></div></div>
            <div class="intro-card"><span class="icon">⚔️</span><div><div class="title">对战</div><div class="desc">实时竞技</div></div></div>
            <div class="intro-card"><span class="icon">🏆</span><div><div class="title">联赛</div><div class="desc">冠军之路</div></div></div>
        </div>
        
        <div class="slogans">
            <span class="slogan-tag">⚔️ 战斗</span>
            <span class="slogan-tag">🔥 热血</span>
            <span class="slogan-tag">🏆 荣耀</span>
            <span class="slogan-tag">💪 成长</span>
        </div>
    </section>
    
    <main class="main">
        <div class="chat-section">
            <div class="chat-header">
                <div class="chat-title">💬 社区热聊</div>
                <div><span class="online-dot"></span><span id="onlineCount">0 人在线</span></div>
            </div>
            <div class="chat-messages" id="chatMessages"><div class="loading"><div class="spinner"></div>加载中...</div></div>
            <div class="chat-input" id="chatInput"></div>
        </div>
        
        <div class="sidebar">
            <div class="side-card">
                <div class="side-title">🟢 在线成员</div>
                <div class="user-list" id="userList"><div class="loading" style="padding:1rem;">加载中...</div></div>
            </div>
            <div class="side-card">
                <div class="side-title">📊 今日数据</div>
                <div class="stats-grid">
                    <div class="stat-item"><div class="stat-value" id="msgCount">0</div><div class="stat-label">消息数</div></div>
                    <div class="stat-item"><div class="stat-value" id="userCount">0</div><div class="stat-label">注册用户</div></div>
                </div>
            </div>
        </div>
    </main>
    
    <footer><p>© 2026 兰星少年 HADO 俱乐部 - 让青春燃烧</p></footer>
    
    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <h2>登录</h2>
            <form id="loginForm">
                <div class="form-group"><label>邮箱</label><input type="email" id="loginEmail" required placeholder="your@email.com"></div>
                <div class="form-group"><label>密码</label><input type="password" id="loginPassword" required placeholder="••••••••"></div>
                <button type="submit" class="btn btn-register">登录</button>
            </form>
            <p class="modal-switch">还没有账号？ <a href="#" onclick="switchModal('register')">立即注册</a></p>
        </div>
    </div>
    
    <div class="modal-overlay" id="registerModal">
        <div class="modal">
            <h2>注册</h2>
            <form id="registerForm">
                <div class="form-group"><label>邮箱</label><input type="email" id="registerEmail" required placeholder="your@email.com"></div>
                <div class="form-group"><label>昵称</label><input type="text" id="registerNickname" required placeholder="你的昵称" maxlength="20"></div>
                <div class="form-group"><label>密码</label><input type="password" id="registerPassword" required placeholder="至少6位" minlength="6"></div>
                <button type="submit" class="btn btn-register">注册</button>
            </form>
            <p class="modal-switch">已有账号？ <a href="#" onclick="switchModal('login')">立即登录</a></p>
        </div>
    </div>
    
    <script>
        var AUTH_API = 'https://blast-auth-api.kanjiaming2022.workers.dev';
        var COMMENTS_API = 'https://blast-comments-api.kanjiaming2022.workers.dev';
        var SAFE_API = 'https://blast-safe-api.kanjiaming2022.workers.dev';
        var ADMIN_TOKEN = 'blx-admin-2025-super-secret';
        var PHOTO_ID = '999999';
        
        var currentUser = null;
        var authToken = localStorage.getItem('blxst_token');
        
        function init() {
            checkAuth();
            loadMessages();
            loadOnlineUsers();
            loadStats();
            setInterval(loadMessages, 15000);
            setInterval(loadOnlineUsers, 30000);
        }
        
        function checkAuth() {
            if (!authToken) { updateAuthUI(null); return; }
            fetch(AUTH_API + '/verify?token=' + authToken).then(function(r) { return r.json(); }).then(function(d) {
                if (d.ok) { currentUser = d.user; updateAuthUI(currentUser); }
                else { logout(); }
            }).catch(function() { logout(); });
        }
        
        function updateAuthUI(user) {
            var navAuth = document.getElementById('navAuth');
            var chatInput = document.getElementById('chatInput');
            
            if (user) {
                navAuth.innerHTML = '<div class="user-info"><div class="user-avatar">' + user.nickname.charAt(0).toUpperCase() + '</div><span>' + user.nickname + '</span><button class="btn-logout" onclick="logout()">退出</button></div>';
                chatInput.innerHTML = '<div class="input-wrap"><input type="text" class="nickname-input" value="' + user.nickname + '" readonly><textarea id="messageInput" placeholder="说点什么..." rows="1"></textarea><button class="send-btn" id="sendBtn">✈</button></div>';
                document.getElementById('sendBtn').addEventListener('click', sendMessage);
                document.getElementById('messageInput').addEventListener('keydown', function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
                document.getElementById('messageInput').addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 100) + 'px'; });
            } else {
                navAuth.innerHTML = '<a href="#" class="btn btn-login" onclick="showModal(\'login\')">登录</a><a href="#" class="btn btn-register" onclick="showModal(\'register\')">注册</a>';
                chatInput.innerHTML = '<div class="login-prompt">🔒 登录后才能发言 <a href="#" onclick="showModal(\'login\')">立即登录</a> | <a href="#" onclick="showModal(\'register\')">注册账号</a></div>';
            }
        }
        
        function showModal(type) {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('registerModal').classList.remove('active');
            document.getElementById(type + 'Modal').classList.add('active');
        }
        function switchModal(type) { showModal(type); }
        
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var email = document.getElementById('registerEmail').value;
            var nickname = document.getElementById('registerNickname').value;
            var password = document.getElementById('registerPassword').value;
            fetch(AUTH_API + '/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: email, nickname: nickname, password: password }) }).then(function(r) { return r.json(); }).then(function(d) {
                if (d.ok) {
                    authToken = d.token;
                    currentUser = d.user;
                    localStorage.setItem('blxst_token', authToken);
                    document.getElementById('registerModal').classList.remove('active');
                    updateAuthUI(currentUser);
                    showToast('注册成功！欢迎加入兰星少年！', 'success');
                    loadStats();
                } else { showToast(d.error || '注册失败'); }
            }).catch(function(err) { showToast('注册失败: ' + err.message); });
        });
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var email = document.getElementById('loginEmail').value;
            var password = document.getElementById('loginPassword').value;
            fetch(AUTH_API + '/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: email, password: password }) }).then(function(r) { return r.json(); }).then(function(d) {
                if (d.ok) {
                    authToken = d.token;
                    currentUser = d.user;
                    localStorage.setItem('blxst_token', authToken);
                    document.getElementById('loginModal').classList.remove('active');
                    updateAuthUI(currentUser);
                    showToast('登录成功！欢迎回来！', 'success');
                } else { showToast(d.error || '登录失败'); }
            }).catch(function(err) { showToast('登录失败: ' + err.message); });
        });
        
        function logout() {
            authToken = null;
            currentUser = null;
            localStorage.removeItem('blxst_token');
            updateAuthUI(null);
            showToast('已退出登录', 'success');
        }
        
        function loadMessages() {
            var container = document.getElementById('chatMessages');
            fetch(COMMENTS_API + '/?photoId=' + PHOTO_ID).then(function(r) { return r.json(); }).then(function(d) {
                if (d.ok && d.items && d.items.length > 0) {
                    renderMessages(d.items);
                    document.getElementById('msgCount').textContent = d.items.length;
                    document.getElementById('onlineCount').textContent = Math.floor(Math.random() * 15 + 5) + ' 人在线';
                } else {
                    container.innerHTML = '<div class="loading">暂无消息，快来发言吧！</div>';
                }
            }).catch(function() { container.innerHTML = '<div class="loading">加载失败</div>'; });
        }
        
        function renderMessages(messages) {
            var container = document.getElementById('chatMessages');
            if (!messages || messages.length === 0) { container.innerHTML = '<div class="loading">暂无消息</div>'; return; }
            container.innerHTML = messages.slice(0, 50).map(function(msg) {
                return '<div class="message"><div class="message-avatar ' + (msg.source === 'ai' ? 'ai' : 'human') + '">' + (msg.nickname ? msg.nickname.charAt(0).toUpperCase() : '?') + '</div><div class="message-content"><div class="message-header"><span class="message-name ' + (msg.source === 'ai' ? 'ai' : 'human') + '">' + (msg.nickname || '游客') + '</span>' + (msg.source === 'ai' ? '<span class="message-badge">AI</span>' : '') + '<span class="message-time">' + formatTime(msg.createdAt) + '</span></div><div class="message-text">' + escapeHtml(msg.content) + '</div></div></div>';
            }).join('');
            container.scrollTop = container.scrollHeight;
        }
        
        function formatTime(iso) {
            if (!iso) return '';
            var d = new Date(iso);
            var now = new Date();
            var diff = now - d;
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            return d.toLocaleDateString('zh-CN');
        }
        
        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function sendMessage() {
            if (!currentUser) { showToast('请先登录'); return; }
            var input = document.getElementById('messageInput');
            var text = input.value.trim();
            if (!text) return;
            
            fetch(SAFE_API + '/check', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ content: text, nickname: currentUser.nickname }) }).then(function(r) { return r.json(); }).then(function(safe) {
                if (!safe.approved) { showToast('内容不符合社区规范'); return; }
                
                var btn = document.getElementById('sendBtn');
                btn.disabled = true;
                
                fetch(COMMENTS_API + '/', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ photoId: PHOTO_ID, content: text, nickname: currentUser.nickname }) }).then(function(r) { return r.json(); }).then(function(d) {
                    if (d.ok) {
                        showToast('发言成功！', 'success');
                        input.value = '';
                        input.style.height = 'auto';
                        loadMessages();
                    } else { showToast(d.error || '发送失败'); }
                }).catch(function(e) { showToast('发送失败'); });
                btn.disabled = false;
            });
        }
        
        function loadOnlineUsers() {
            var list = document.getElementById('userList');
            var names = ['小虾', '老K', '小明', '小红', '阿强', '球迷', '玩家', '新手'];
            var shuffled = names.sort(function() { return 0.5 - Math.random() }).slice(0, 5);
            list.innerHTML = shuffled.map(function(name) {
                return '<div class="user-item"><div class="avatar">' + name.charAt(0) + '</div><span class="name">' + name + '</span></div>';
            }).join('');
        }
        
        function loadStats() {
            document.getElementById('userCount').textContent = Math.floor(Math.random() * 20 + 10);
        }
        
        function showToast(msg, type) {
            var existing = document.querySelector('.toast');
            if (existing) existing.remove();
            var toast = document.createElement('div');
            toast.className = 'toast ' + (type || 'error');
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(function() { toast.remove(); }, 3000);
        }
        
        init();
    </script>
</body>
</html>
