<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兰星少年 HADO 俱乐部 - 官网</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B35; --primary-light: #FF8A5C; --secondary: #00B4D8; --bg-light: #F8FAFC; --bg-white: #FFFFFF; --text-dark: #1E293B; --text-gray: #64748B; --border: #E2E8F0; --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-light); color: var(--text-dark); }
        nav { background: var(--bg-white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 64px; }
        .logo { display: flex; align-items: center; gap: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.25rem; text-decoration: none; color: var(--text-dark); }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.25rem; }
        .nav-links { display: flex; gap: 0.5rem; }
        .nav-link { padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; color: var(--text-gray); font-weight: 500; transition: all 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }
        .user-area { display: flex; align-items: center; gap: 0.75rem; }
        .btn { padding: 0.5rem 1rem; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-light); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-gray); }
        
        .hero { background: linear-gradient(135deg, var(--primary), #FF8A5C); padding: 4rem 1.5rem; text-align: center; color: white; }
        .hero h1 { font-family: 'Outfit', sans-serif; font-size: 3rem; font-weight: 900; margin-bottom: 1rem; }
        .hero p { font-size: 1.25rem; opacity: 0.9; margin-bottom: 2rem; }
        .hero-tags { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; }
        .hero-tag { background: rgba(255,255,255,0.2); padding: 0.5rem 1rem; border-radius: 50px; font-size: 0.9rem; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        
        .main-layout { display: grid; grid-template-columns: 1fr 300px; gap: 1.5rem; }
        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
        
        .sidebar { display: flex; flex-direction: column; gap: 1rem; }
        .sidebar-card { background: var(--bg-white); border-radius: var(--radius); padding: 1.25rem; box-shadow: var(--shadow); }
        .sidebar-title { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        
        .online-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .online-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; }
        .online-dot { width: 8px; height: 8px; background: #10B981; border-radius: 50%; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
        .stat-item { text-align: center; padding: 0.75rem; background: var(--bg-light); border-radius: 8px; }
        .stat-num { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.5rem; color: var(--primary); }
        .stat-label { font-size: 0.75rem; color: var(--text-gray); }
        
        .section { margin-bottom: 2rem; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .section-title { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 900; }
        .section-more { color: var(--primary); text-decoration: none; font-size: 0.9rem; }
        
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
        
        .news-card { background: var(--bg-white); border-radius: var(--radius); padding: 1.25rem; box-shadow: var(--shadow); text-decoration: none; color: inherit; display: block; }
        .news-card:hover { transform: translateY(-2px); }
        .news-tag { display: inline-block; background: var(--secondary); color: white; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; margin-bottom: 0.5rem; }
        .news-title { font-weight: 700; font-size: 1rem; margin-bottom: 0.5rem; line-height: 1.4; }
        .news-summary { font-size: 0.85rem; color: var(--text-gray); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .news-date { font-size: 0.75rem; color: var(--text-gray); margin-top: 0.75rem; }
        
        .sponsor-card { background: var(--bg-white); border-radius: var(--radius); padding: 1rem; box-shadow: var(--shadow); margin-bottom: 0.75rem; border-left: 4px solid var(--primary); }
        .sponsor-name { font-weight: 700; font-size: 0.95rem; }
        .sponsor-level { font-size: 0.75rem; color: var(--primary); font-weight: 600; }
        .sponsor-tagline { font-size: 0.8rem; color: var(--text-gray); margin-top: 0.25rem; }
        
        .match-card { background: var(--bg-white); border-radius: var(--radius); padding: 1.25rem; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 0.75rem; }
        .match-league { font-size: 0.8rem; color: var(--text-gray); }
        .match-teams { display: flex; justify-content: space-between; align-items: center; }
        .match-team { text-align: center; flex: 1; }
        .match-team-icon { font-size: 1.5rem; }
        .match-team-name { font-weight: 600; font-size: 0.9rem; }
        .match-score { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.5rem; }
        .match-time { font-size: 0.85rem; color: var(--text-gray); text-align: center; }
        
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; border-radius: var(--radius); overflow: hidden; }
        .photo-item { aspect-ratio: 1; background: var(--bg-light); display: flex; align-items: center; justify-content: center; font-size: 2rem; overflow: hidden; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }
        
        .chat-messages { display: flex; flex-direction: column; gap: 0.75rem; max-height: 300px; overflow-y: auto; }
        .chat-msg { display: flex; gap: 0.5rem; }
        .chat-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--bg-light); display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
        .chat-content { flex: 1; }
        .chat-name { font-weight: 600; font-size: 0.85rem; display: flex; align-items: center; gap: 0.25rem; }
        .chat-badge { background: var(--primary); color: white; font-size: 0.65rem; padding: 0.1rem 0.4rem; border-radius: 4px; }
        .chat-text { background: var(--bg-light); padding: 0.5rem 0.75rem; border-radius: 8px; font-size: 0.9rem; margin-top: 0.25rem; }
        .chat-time { font-size: 0.7rem; color: var(--text-gray); }
        
        .chat-input-area { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .chat-input { flex: 1; padding: 0.6rem; border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem; }
        .chat-send { background: var(--primary); color: white; border: none; padding: 0.6rem 1rem; border-radius: 8px; cursor: pointer; }
        
        .loading { text-align: center; padding: 2rem; color: var(--text-gray); }
        
        @media (max-width: 768px) { .nav-links { display: none; } .hero h1 { font-size: 2rem; } }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="/" class="logo"><div class="logo-icon">⚡</div><span>兰星少年</span></a>
            <div class="nav-links">
                <a href="/" class="nav-link active">首页</a>
                <a href="/matches" class="nav-link">赛程</a>
                <a href="/standings" class="nav-link">积分榜</a>
                <a href="/teams" class="nav-link">战队</a>
                <a href="/players" class="nav-link">选手</a>
                <a href="/gallery" class="nav-link">画廊</a>
                <a href="/join" class="nav-link">加入</a>
            </div>
            <div class="user-area" id="userArea">
                <button class="btn btn-outline" onclick="showAuth('login')">登录</button>
                <button class="btn btn-primary" onclick="showAuth('register')">注册</button>
            </div>
        </div>
    </nav>
    
    <section class="hero">
        <h1>⚡ 兰星少年 HADO 俱乐部</h1>
        <p>燃烧你的能量，追逐冠军梦想！</p>
        <div class="hero-tags">
            <span class="hero-tag">🏓 HADO</span>
            <span class="hero-tag">⚔️ 对战</span>
            <span class="hero-tag">🏆 联赛</span>
            <span class="hero-tag">👨‍🏫 专业训练</span>
        </div>
    </section>
    
    <div class="container">
        <div class="main-layout">
            <main>
                <!-- 新闻 -->
                <section class="section">
                    <div class="section-header">
                        <h2 class="section-title">📰 最新动态</h2>
                    </div>
                    <div class="cards-grid" id="newsGrid">
                        <div class="loading">加载中...</div>
                    </div>
                </section>
                
                <!-- 赛果 -->
                <section class="section">
                    <div class="section-header">
                        <h2 class="section-title">🏆 最新赛果</h2>
                        <a href="/matches" class="section-more">更多 ></a>
                    </div>
                    <div class="cards-grid" id="matchesGrid">
                        <div class="loading">加载中...</div>
                    </div>
                </section>
                
                <!-- 精选照片 -->
                <section class="section">
                    <div class="section-header">
                        <h2 class="section-title">📸 精彩瞬间</h2>
                        <a href="/gallery" class="section-more">更多 ></a>
                    </div>
                    <div class="photo-grid" id="photoGrid">
                        <div class="loading">加载中...</div>
                    </div>
                </section>
            </main>
            
            <aside class="sidebar">
                <!-- 在线用户 -->
                <div class="sidebar-card">
                    <h3 class="sidebar-title">🟢 在线用户 (<span id="onlineCount">-</span>)</h3>
                    <div class="online-list" id="onlineList">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
                
                <!-- 数据统计 -->
                <div class="sidebar-card">
                    <h3 class="sidebar-title">📊 数据统计</h3>
                    <div class="stats-grid" id="statsGrid">
                        <div class="stat-item"><div class="stat-num" id="statMatches">-</div><div class="stat-label">比赛</div></div>
                        <div class="stat-item"><div class="stat-num" id="statPlayers">-</div><div class="stat-label">选手</div></div>
                        <div class="stat-item"><div class="stat-num" id="statTeams">-</div><div class="stat-label">战队</div></div>
                    </div>
                </div>
                
                <!-- 赞助商 -->
                <div class="sidebar-card">
                    <h3 class="sidebar-title">🤝 合作伙伴</h3>
                    <div id="sponsorsList">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
                
                <!-- 社区聊天 -->
                <div class="sidebar-card">
                    <h3 class="sidebar-title">💬 社区动态</h3>
                    <div class="chat-messages" id="chatMessages">
                        <div class="loading">加载中...</div>
                    </div>
                    <div class="chat-input-area">
                        <input type="text" class="chat-input" id="chatInput" placeholder="说点什么...">
                        <button class="chat-send" onclick="sendMessage()">发送</button>
                    </div>
                </div>
            </aside>
        </div>
    </div>
    
    <script>
        const API_BASE = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
        
        async function loadHomeData() {
            try {
                const resp = await fetch(API_BASE + '/');
                const result = await resp.json();
                if (!result.ok) throw new Error(result.error);
                
                const data = result.data;
                
                // 在线用户
                document.getElementById('onlineCount').textContent = data.onlineCount || 0;
                
                // 统计数据
                if (data.stats) {
                    document.getElementById('statMatches').textContent = data.stats.totalMatches || 0;
                    document.getElementById('statPlayers').textContent = data.stats.totalPlayers || 0;
                    document.getElementById('statTeams').textContent = data.stats.totalTeams || 0;
                }
                
                // 新闻 - 从D1
                renderNews(data.news || []);
                
                // 赞助商 - 从D1
                renderSponsors(data.sponsors || []);
                
                // 赛果
                loadMatches();
                
                // 精选照片 - 从R2
                renderPhotos(data.featuredPhotos || []);
                
                // 社区消息 - 从R2
                renderMessages(data.messages || []);
                
            } catch (e) {
                console.error('加载数据失败:', e);
            }
        }
        
        function renderNews(news) {
            if (!news.length) {
                document.getElementById('newsGrid').innerHTML = '<div class="loading">暂无新闻</div>';
                return;
            }
            
            const html = news.slice(0, 3).map(n => `
                <div class="news-card">
                    <span class="news-tag">${n.tag || '动态'}</span>
                    <h3 class="news-title">${n.title}</h3>
                    <p class="news-summary">${n.summary || ''}</p>
                    <div class="news-date">${n.date || ''}</div>
                </div>
            `).join('');
            
            document.getElementById('newsGrid').innerHTML = html;
        }
        
        function renderSponsors(sponsors) {
            if (!sponsors.length) {
                document.getElementById('sponsorsList').innerHTML = '<div class="loading">暂无赞助商</div>';
                return;
            }
            
            const html = sponsors.slice(0, 3).map(s => `
                <div class="sponsor-card">
                    <div class="sponsor-name">${s.name}</div>
                    <div class="sponsor-level">${s.level || ''}</div>
                    <div class="sponsor-tagline">${s.tagline || ''}</div>
                </div>
            `).join('');
            
            document.getElementById('sponsorsList').innerHTML = html;
        }
        
        async function loadMatches() {
            try {
                const resp = await fetch(API_BASE + '/matches');
                const result = await resp.json();
                if (!result.ok) return;
                
                const matches = result.data || [];
                const html = matches.map(m => {
                    if (m.status === 'finished') {
                        return `<div class="match-card">
                            <div class="match-league">${m.league} · ${m.group}</div>
                            <div class="match-teams">
                                <div class="match-team"><div class="match-team-icon">🔥</div><div class="match-team-name">${m.team1}</div></div>
                                <div class="match-score">${m.score1} - ${m.score2}</div>
                                <div class="match-team"><div class="match-team-icon">⭐</div><div class="match-team-name">${m.team2}</div></div>
                            </div>
                            <div class="match-time">${m.time}</div>
                        </div>`;
                    } else {
                        return `<div class="match-card">
                            <div class="match-league">${m.league} · ${m.group}</div>
                            <div class="match-teams">
                                <div class="match-team"><div class="match-team-icon">🔥</div><div class="match-team-name">${m.team1}</div></div>
                                <div class="match-score">VS</div>
                                <div class="match-team"><div class="match-team-icon">⭐</div><div class="match-team-name">${m.team2}</div></div>
                            </div>
                            <div class="match-time">${m.time}</div>
                        </div>`;
                    }
                }).join('');
                
                document.getElementById('matchesGrid').innerHTML = html || '<div class="loading">暂无比赛</div>';
            } catch (e) {
                console.error('加载赛果失败:', e);
            }
        }
        
        function renderPhotos(photos) {
            if (!photos.length) {
                document.getElementById('photoGrid').innerHTML = '<div class="loading">暂无照片</div>';
                return;
            }
            
            const html = photos.slice(0, 6).map(p => 
                `<div class="photo-item"><img src="${p.url}" alt="" loading="lazy"></div>`
            ).join('');
            
            document.getElementById('photoGrid').innerHTML = html;
        }
        
        function renderMessages(messages) {
            if (!messages.length) {
                document.getElementById('chatMessages').innerHTML = '<div class="loading">暂无消息</div>';
                return;
            }
            
            const html = messages.slice(0, 8).map(m => {
                const badge = m.badge ? `<span class="chat-badge">${m.badge}</span>` : '';
                return `<div class="chat-msg">
                    <div class="chat-avatar">${m.avatar}</div>
                    <div class="chat-content">
                        <div class="chat-name">${m.name} ${badge}</div>
                        <div class="chat-text">${m.content}</div>
                        <div class="chat-time">${m.time}</div>
                    </div>
                </div>`;
            }).join('');
            
            document.getElementById('chatMessages').innerHTML = html;
        }
        
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const content = input.value.trim();
            if (!content) return;
            
            alert('请先登录后发言~');
            input.value = '';
        }
        
        function showAuth(type) {
            alert('登录/注册功能开发中，敬请期待！');
        }
        
        loadHomeData();
    </script>
</body>
</html>
