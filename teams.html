<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>战队列表 - 兰星少年 HADO 俱乐部</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B35; --secondary: #00B4D8; --bg-light: #F8FAFC; --bg-white: #FFFFFF; --text-dark: #1E293B; --text-gray: #64748B; --border: #E2E8F0; --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-light); color: var(--text-dark); }
        nav { background: var(--bg-white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 64px; }
        .logo { display: flex; align-items: center; gap: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.25rem; text-decoration: none; color: var(--text-dark); }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), #FF8A5C); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; }
        .nav-links { display: flex; gap: 0.5rem; }
        .nav-link { padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; color: var(--text-gray); font-weight: 500; transition: all 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        .page-title { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 900; margin-bottom: 1.5rem; }
        
        .filters { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .filter-select { padding: 0.6rem 1rem; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-white); font-size: 0.9rem; min-width: 130px; }
        
        .teams-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        
        .team-card { background: var(--bg-white); border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow); text-decoration: none; color: inherit; display: block; transition: transform 0.2s; }
        .team-card:hover { transform: translateY(-4px); }
        .team-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
        .team-icon { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .team-icon.fire { background: linear-gradient(135deg, #EF4444, #F97316); }
        .team-icon.gold { background: linear-gradient(135deg, #F59E0B, #FCD34D); }
        .team-icon.blue { background: linear-gradient(135deg, #3B82F6, #60A5FA); }
        .team-icon.purple { background: linear-gradient(135deg, #8B5CF6, #A78BFA); }
        .team-name { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 900; }
        .team-tag { display: inline-block; background: var(--secondary); color: white; padding: 0.25rem 0.75rem; border-radius: 50px; font-size: 0.75rem; font-weight: 600; margin-bottom: 0.5rem; }
        .team-stats { display: flex; gap: 1.5rem; font-size: 0.9rem; color: var(--text-gray); }
        .team-stat strong { color: var(--primary); font-weight: 700; }
        
        .loading { text-align: center; padding: 3rem; color: var(--text-gray); }
        
        @media (max-width: 768px) { .nav-links { display: none; } }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="/" class="logo"><div class="logo-icon">⚡</div><span>兰星少年</span></a>
            <div class="nav-links">
                <a href="/" class="nav-link">首页</a>
                <a href="/matches" class="nav-link">赛程</a>
                <a href="/standings" class="nav-link">积分榜</a>
                <a href="/teams" class="nav-link active">战队</a>
                <a href="/players" class="nav-link">选手</a>
                <a href="/gallery" class="nav-link">画廊</a>
                <a href="/honor" class="nav-link">荣誉</a>
                <a href="/join" class="nav-link">加入</a>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <h1 class="page-title">⚔️ 战队列表</h1>
        
        <div class="filters">
            <select class="filter-select"><option>全部组别</option><option>U12</option><option>U15</option><option>U18</option></select>
            <select class="filter-select"><option>全部赛季</option><option>2026春季</option><option>2025秋季</option></select>
        </div>
        
        <div class="teams-grid" id="teamsGrid">
            <div class="loading">加载中...</div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'https://blast-homepage-api.kanjiaming2022.workers.dev';
        
        async function loadTeams() {
            try {
                const resp = await fetch(API_BASE + '/teams');
                const result = await resp.json();
                if (!result.ok) throw new Error(result.error);
                
                renderTeams(result.data || []);
            } catch (e) {
                console.error('加载战队失败:', e);
                document.getElementById('teamsGrid').innerHTML = '<div class="loading">加载失败</div>';
            }
        }
        
        function renderTeams(teams) {
            if (!teams.length) {
                document.getElementById('teamsGrid').innerHTML = '<div class="loading">暂无战队</div>';
                return;
            }
            
            const icons = { fire: '🔥', gold: '🏆', blue: '⭐', purple: '⚡' };
            const html = teams.map(t => `
                <a href="/team-detail.html?id=${t.id}" class="team-card">
                    <div class="team-header">
                        <div class="team-icon ${t.color || 'blue'}">${icons[t.color] || '⚔️'}</div>
                        <div>
                            <div class="team-name">${t.name}</div>
                            <span class="team-tag">${t.tag}</span>
                        </div>
                    </div>
                    <div class="team-stats">
                        <div class="team-stat">胜场 <strong>${t.wins}</strong></div>
                        <div class="team-stat">积分 <strong>${t.points}</strong></div>
                    </div>
                </a>
            `).join('');
            
            document.getElementById('teamsGrid').innerHTML = html;
        }
        
        loadTeams();
    </script>
</body>
</html>
