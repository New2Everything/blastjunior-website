<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>战队列表 - 兰星少年 HADO 俱乐部</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35;
            --primary-light: #FF8A5C;
            --secondary: #00B4D8;
            --accent: #90E0EF;
            --bg-light: #F8FAFC;
            --bg-white: #FFFFFF;
            --text-dark: #1E293B;
            --text-gray: #64748B;
            --border: #E2E8F0;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --radius: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-light); color: var(--text-dark); }
        
        nav { background: var(--bg-white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 64px; }
        .logo { display: flex; align-items: center; gap: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.25rem; text-decoration: none; color: var(--text-dark); }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.25rem; }
        .nav-links { display: flex; gap: 0.5rem; }
        .nav-link { padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; color: var(--text-gray); font-weight: 500; transition: all 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
        
        .page-header { margin-bottom: 2rem; }
        .page-title { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 900; margin-bottom: 0.5rem; }
        .page-subtitle { color: var(--text-gray); }
        
        .filters { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .filter-select { padding: 0.6rem 1rem; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-white); font-size: 0.9rem; min-width: 150px; }
        
        .teams-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; }
        
        .team-card { background: var(--bg-white); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); transition: transform 0.2s; text-decoration: none; color: inherit; display: block; }
        .team-card:hover { transform: translateY(-4px); }
        .team-banner { height: 100px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); position: relative; }
        .team-banner.fire { background: linear-gradient(135deg, #EF4444, #F97316); }
        .team-banner.ice { background: linear-gradient(135deg, #3B82F6, #60A5FA); }
        .team-banner.storm { background: linear-gradient(135deg, #8B5CF6, #A78BFA); }
        .team-banner.light { background: linear-gradient(135deg, #FBBF24, #FCD34D); }
        .team-logo-large { position: absolute; bottom: -30px; left: 1.5rem; width: 70px; height: 70px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .team-content { padding: 2.5rem 1.5rem 1.5rem; }
        .team-name { font-weight: 700; font-size: 1.25rem; margin-bottom: 0.25rem; }
        .team-tag { display: inline-block; background: var(--primary); color: white; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; margin-bottom: 1rem; }
        .team-stats { display: flex; gap: 1.5rem; margin-bottom: 1rem; }
        .team-stat { text-align: center; }
        .team-stat-value { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.25rem; color: var(--primary); }
        .team-stat-label { font-size: 0.75rem; color: var(--text-gray); }
        .team-members { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .member-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--bg-light); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; border: 2px solid white; }
        
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .teams-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
